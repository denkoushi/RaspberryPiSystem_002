name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop, 'feature/**', 'feat/**', 'fix/**', 'refactor/**', 'chore/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Fast feedback: lint, workspace builds, package-level tests (no Docker DB)
  lint-build-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Validate deployment scripts
        run: |
          bash -n scripts/update-all-clients.sh
          bash -n scripts/server/deploy.sh
          bash -n scripts/server/deploy-detached.sh
          bash scripts/update-all-clients.sh main infrastructure/ansible/inventory.yml --print-plan

      - name: Security scan (pnpm audit)
        run: |
          set -euo pipefail
          echo "=== pnpm audit: critical+ (required gate) ==="
          for attempt in 1 2 3; do
            if pnpm audit --audit-level=critical; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "pnpm audit (critical+) failed after retries"
              exit 1
            fi
            echo "pnpm audit (critical+) failed (attempt ${attempt}/3); retrying..."
            sleep 20
          done
          echo "=== pnpm audit: high+ (informational; fix tracked separately) ==="
          pnpm audit --audit-level=high || {
            echo "::warning::pnpm audit reported high severity issues; see log above"
            exit 0
          }

      - name: Run lint
        run: pnpm lint --max-warnings=0

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build

      - name: Run part-search-core tests
        run: pnpm --filter @raspi-system/part-search-core test

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        run: pnpm --filter @raspi-system/api build

      - name: Run web tests
        run: pnpm --filter @raspi-system/web test

      - name: Build Web
        run: pnpm --filter @raspi-system/web build

  # API + PostgreSQL + 統合テスト + 運用スクリプト（インフラ寄り）
  api-db-and-infra:
    runs-on: ubuntu-latest
    needs: lint-build-unit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        run: pnpm --filter @raspi-system/api build

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-test 60
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT version();"

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run API tests (coverage, single pass)
        run: |
          cd apps/api
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT 1;"
          BACKUP_CONFIG_PATH=/tmp/test-backup.json PROJECT_ROOT=$(pwd) \
            pnpm test:coverage -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          CAMERA_TYPE: mock
          PHOTO_STORAGE_DIR: /tmp/test-photo-storage
          BACKUP_STORAGE_DIR: /tmp/test-backups
          NODE_ENV: test
          PERF_RESPONSE_TIME_THRESHOLD_MS: '1800'

      - name: Upload API coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

      - name: Start API server for monitoring tests
        run: |
          cd apps/api
          NODE_ENV=production pnpm start > /tmp/api-server.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          echo "API server started with PID: $API_PID"
          sleep 2
          head -50 /tmp/api-server.log || echo "No log file yet"
          timeout=30
          elapsed=0
          until curl -s http://localhost:8080/api/system/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "API server failed to start within $timeout seconds"
              cat /tmp/api-server.log || true
              exit 1
            fi
            echo "Waiting for API server... ($elapsed/$timeout seconds)"
            sleep 1
            elapsed=$((elapsed + 1))
          done
          echo "API server is ready!"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: ci-prod-access-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          JWT_REFRESH_SECRET: ci-prod-refresh-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          PORT: 8080
          HOST: 0.0.0.0

      - name: Test backup/restore scripts
        run: |
          docker ps | grep postgres-test
          bash scripts/test/backup-restore.test.sh

      - name: Install Ansible
        run: |
          set -euo pipefail
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v ansible-playbook

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-community-general-v1

      - name: Ansible syntax check
        run: |
          set -euo pipefail
          cd infrastructure/ansible
          ansible-galaxy collection install community.general
          cp ansible.cfg /tmp/ansible.cfg.backup || true
          sed 's/^vault_password_file = .vault-pass/# vault_password_file = .vault-pass (disabled for CI syntax check)/' ansible.cfg > /tmp/ansible-ci.cfg
          export ANSIBLE_CONFIG=/tmp/ansible-ci.cfg
          export ANSIBLE_ROLES_PATH="$(pwd)/roles"
          PLAYBOOKS=(
            "playbooks/deploy.yml"
            "playbooks/update-clients.yml"
            "playbooks/health-check.yml"
            "playbooks/manage-system-configs.yml"
            "playbooks/manage-app-configs.yml"
            "playbooks/rollback.yml"
            "playbooks/restart-services.yml"
            "playbooks/ping.yml"
          )
          FAILED=0
          for playbook in "${PLAYBOOKS[@]}"; do
            echo "Checking syntax for $playbook..."
            if ansible-playbook --syntax-check "$playbook" -i inventory.yml > /tmp/ansible-syntax-check.log 2>&1; then
              echo "OK $playbook"
            else
              if grep -qE "(vault password|ERROR.*vault)" /tmp/ansible-syntax-check.log && ! grep -qE "(syntax error|YAML|parse error)" /tmp/ansible-syntax-check.log; then
                echo "WARN $playbook skipped (vault decrypt only)"
              else
                echo "FAIL $playbook"
                cat /tmp/ansible-syntax-check.log
                FAILED=1
              fi
            fi
          done
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Ansible dry-run check (deploy playbook only)
        run: |
          set -euo pipefail
          cd infrastructure/ansible
          ansible-galaxy collection install community.general
          sed 's/^vault_password_file = .vault-pass/# vault_password_file = .vault-pass (disabled for CI dry-run check)/' ansible.cfg > /tmp/ansible-ci.cfg
          export ANSIBLE_CONFIG=/tmp/ansible-ci.cfg
          export ANSIBLE_ROLES_PATH="$(pwd)/roles"
          ansible-playbook --check --diff playbooks/deploy.yml -i inventory.yml --limit nonexistent_host 2>&1 | tee /tmp/ansible-dryrun.log || true
          if grep -qE "(No hosts matched|leaves us with no hosts to target)" /tmp/ansible-dryrun.log; then
            echo "deploy.yml dry-run OK (no hosts matched)"
          elif grep -qE "(ERROR|error)" /tmp/ansible-dryrun.log && ! grep -qE "(No hosts matched|leaves us with no hosts|vault password)" /tmp/ansible-dryrun.log; then
            echo "deploy.yml dry-run failed"
            cat /tmp/ansible-dryrun.log
            exit 1
          else
            echo "deploy.yml dry-run OK"
          fi

      - name: Test monitoring scripts
        run: |
          API_URL=http://localhost:8080/api pnpm test:monitor || {
            cat /tmp/api-server.log || true
            exit 1
          }

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" || true
            sleep 2
            kill -9 "$API_PID" 2>/dev/null || true
          fi
          pkill -f "node dist/main.js" || true
          pkill -f "pnpm start" || true

      - name: Cleanup PostgreSQL
        if: always()
        run: docker stop postgres-test && docker rm postgres-test || true

  # セキュリティスキャンと Docker イメージビルド（lint 通過後、API ジョブと並列可能）
  security-docker:
    runs-on: ubuntu-latest
    needs: lint-build-unit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security scan (Trivy fs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          skip-dirs: |
            **/certs
            **/alerts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (Buildx) and load
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.api
          push: false
          load: true
          tags: raspisys-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image (Buildx) and load
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.web
          push: false
          load: true
          tags: raspisys-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan (Trivy image api)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'image'
          image-ref: 'raspisys-api:ci'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'

      - name: Security scan (Trivy image web)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'image'
          image-ref: 'raspisys-web:ci'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: lint-build-unit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start PostgreSQL (smoke)
        run: |
          docker run -d \
            --name postgres-e2e-smoke \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL (smoke)
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e-smoke 60

      - name: Generate Prisma Client (smoke)
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run Prisma migrations (smoke)
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database (smoke)
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build shared packages (smoke)
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build

      - name: Run E2E smoke tests
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          VITE_KIOSK_DEFAULT_MODE: TAG
        run: pnpm test:e2e:smoke

      - name: Cleanup PostgreSQL (smoke)
        if: always()
        run: docker stop postgres-e2e-smoke && docker rm postgres-e2e-smoke || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [e2e-smoke, api-db-and-infra]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        run: pnpm --filter @raspi-system/api build

      - name: Build Web
        run: pnpm --filter @raspi-system/web build

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-e2e \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e 60

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_WORKERS: '2'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          BACKUP_CONFIG_PATH: /tmp/e2e-backup.json
          BACKUP_STORAGE_DIR: /tmp/e2e-backups
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop postgres-e2e || true
          docker rm postgres-e2e || true

