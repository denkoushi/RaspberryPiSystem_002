name: CI

permissions:
  contents: read

concurrency:
  # Supersede stale PR heads, but let every main/merge-queue/full-suite run finish.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-v2
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    # 02:30 JST is 17:30 UTC on the previous calendar day.
    - cron: '30 17 * * *'

jobs:
  change-classification:
    name: change-classification
    runs-on: ubuntu-latest
    outputs:
      repo_policy: ${{ steps.classify.outputs.repo_policy }}
      workspace_quality: ${{ steps.classify.outputs.workspace_quality }}
      api: ${{ steps.classify.outputs.api }}
      web: ${{ steps.classify.outputs.web }}
      db_infra: ${{ steps.classify.outputs.db_infra }}
      deploy_contract: ${{ steps.classify.outputs.deploy_contract }}
      client: ${{ steps.classify.outputs.client }}
      e2e: ${{ steps.classify.outputs.e2e }}
      docker_security: ${{ steps.classify.outputs.docker_security }}
      full_suite: ${{ steps.classify.outputs.full_suite }}
    steps:
      - name: Checkout code with history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changes
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          changes_file="$(mktemp)"
          trap 'rm -f "$changes_file"' EXIT

          force_full_reason=""
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            force_full_reason="$EVENT_NAME always runs the full suite"
          elif [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            force_full_reason="event has no stable diff base"
          elif ! python3 scripts/ci/collect_changed_files.py \
            --event-name "$EVENT_NAME" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            > "$changes_file"; then
            force_full_reason="stable diff base is unavailable"
          fi

          classifier_args=()
          if [[ -n "$force_full_reason" ]]; then
            classifier_args+=(--force-full-reason "$force_full_reason")
          fi
          python3 scripts/ci/classify_changes.py \
            --format github-output \
            "${classifier_args[@]}" \
            < "$changes_file" >> "$GITHUB_OUTPUT"
          python3 scripts/ci/classify_changes.py \
            --format markdown \
            "${classifier_args[@]}" \
            < "$changes_file" >> "$GITHUB_STEP_SUMMARY"

  repo-policy:
    name: repo-policy
    needs: change-classification
    if: ${{ needs.change-classification.outputs.repo_policy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test classifier and workflow contracts
        run: python3 -m unittest discover -s scripts/ci/tests -p 'test_*.py'

  # Fast feedback shared by API, Web, and shared-package changes.
  workspace-quality:
    name: workspace-quality
    needs: change-classification
    if: ${{ needs.change-classification.outputs.workspace_quality == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Run lint
        run: pnpm lint --max-warnings=0

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Run part-search-core tests
        run: pnpm --filter @raspi-system/part-search-core test

      - name: Run shelf-layout-core tests
        run: pnpm --filter @raspi-system/shelf-layout-core test

      # pnpm 9 uses npm's retired audit endpoint. Keep the workspace toolchain
      # unchanged and isolate the bulk-advisory client after all Node 20 work.
      - name: Setup Node.js for bulk advisory audit
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Security scan (pnpm bulk audit)
        env:
          AUDIT_PNPM_VERSION: '11.4.0'
        run: |
          set -euo pipefail
          run_audit() {
            (
              # Running outside the repository prevents pnpm 11 from switching
              # back to the packageManager-pinned pnpm 9 audit client.
              cd /tmp
              npx --yes "pnpm@${AUDIT_PNPM_VERSION}" with "${AUDIT_PNPM_VERSION}" \
                --dir "$GITHUB_WORKSPACE" audit "$@"
            )
          }

          echo "=== pnpm bulk audit: critical+ (required gate) ==="
          for attempt in 1 2 3; do
            if run_audit --audit-level=critical; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "pnpm bulk audit (critical+) failed after retries"
              exit 1
            fi
            echo "pnpm bulk audit (critical+) failed (attempt ${attempt}/3); retrying..."
            sleep 20
          done
          echo "=== pnpm bulk audit: high+ (informational; fix tracked separately) ==="
          run_audit --audit-level=high || {
            echo "::warning::pnpm bulk audit reported high severity issues; see log above"
            exit 0
          }

  api:
    name: api (${{ matrix.shard }})
    needs: change-classification
    if: ${{ needs.change-classification.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'pull_request' && '[{"shard":"all","shard_id":"all","coverage":false,"build":true}]' || '[{"shard":"1/3","shard_id":"1-of-3","coverage":true,"build":true},{"shard":"2/3","shard_id":"2-of-3","coverage":true,"build":false},{"shard":"3/3","shard_id":"3-of-3","coverage":true,"build":false}]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        if: matrix.build
        run: pnpm --filter @raspi-system/api build

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-test 60
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT version();"

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run API tests (PR, no coverage)
        if: ${{ !matrix.coverage }}
        run: |
          cd apps/api
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT 1;"
          BACKUP_CONFIG_PATH=/tmp/test-backup.json PROJECT_ROOT=$(pwd) \
            pnpm test -- --fileParallelism=true --maxWorkers=1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          CAMERA_TYPE: mock
          PHOTO_STORAGE_DIR: /tmp/test-photo-storage
          BACKUP_STORAGE_DIR: /tmp/test-backups
          NODE_ENV: test
          PERF_RESPONSE_TIME_THRESHOLD_MS: '1800'

      - name: Run API tests (coverage shard)
        if: matrix.coverage
        run: |
          cd apps/api
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT 1;"
          BACKUP_CONFIG_PATH=/tmp/test-backup.json PROJECT_ROOT=$(pwd) \
            pnpm test:coverage -- --shard=${{ matrix.shard }} --fileParallelism=true --maxWorkers=1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          CAMERA_TYPE: mock
          PHOTO_STORAGE_DIR: /tmp/test-photo-storage
          BACKUP_STORAGE_DIR: /tmp/test-backups
          NODE_ENV: test
          PERF_RESPONSE_TIME_THRESHOLD_MS: '1800'

      - name: Upload API coverage artifact
        if: ${{ always() && matrix.coverage }}
        uses: actions/upload-artifact@v6
        with:
          name: api-coverage-${{ matrix.shard_id }}
          path: apps/api/coverage/
          retention-days: 7

      - name: Cleanup PostgreSQL
        if: always()
        run: docker stop postgres-test && docker rm postgres-test || true

  web:
    name: web
    needs: change-classification
    if: ${{ needs.change-classification.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Run Web tests
        run: pnpm --filter @raspi-system/web test

      - name: Build Web
        run: pnpm --filter @raspi-system/web build

  db-infra:
    name: db-infra
    needs: change-classification
    if: ${{ needs.change-classification.outputs.db_infra == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-test 60

      - name: Run and verify Prisma migrations
        run: |
          pnpm --filter @raspi-system/api exec prisma migrate deploy
          pnpm --filter @raspi-system/api exec prisma migrate status
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        run: pnpm --filter @raspi-system/api build

      - name: Start API server for monitoring tests
        run: |
          cd apps/api
          NODE_ENV=production pnpm start > /tmp/api-server.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          timeout=30
          elapsed=0
          until curl -s http://localhost:8080/api/system/health > /dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              cat /tmp/api-server.log || true
              exit 1
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: ci-prod-access-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          JWT_REFRESH_SECRET: ci-prod-refresh-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          PORT: 8080
          HOST: 0.0.0.0

      - name: Test backup and restore scripts
        run: bash scripts/test/backup-restore.test.sh

      - name: Test monitoring scripts
        run: |
          API_URL=http://localhost:8080/api pnpm test:monitor || {
            cat /tmp/api-server.log || true
            exit 1
          }

      - name: Cleanup DB/infra services
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" || true
          fi
          docker stop postgres-test || true
          docker rm postgres-test || true

  deploy-contract:
    name: deploy-contract
    needs: change-classification
    if: ${{ needs.change-classification.outputs.deploy_contract == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with migration base
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Validate deployment contracts
        run: |
          bash -n scripts/update-all-clients.sh
          bash -n scripts/server/deploy.sh
          bash -n scripts/server/deploy-detached.sh
          bash scripts/deploy/tests/test-single-deploy-entrypoint.sh
          bash -n scripts/deploy/pi5-blue-green.sh
          bash -n scripts/deploy/pi5-candidate-build.sh
          bash scripts/deploy/tests/test-pi5-image-deploy.sh
          bash scripts/deploy/tests/test-pi5-blue-green.sh
          bash scripts/deploy/tests/test-pi5-blue-green-maintenance-container.sh
          python3 -m unittest discover -s scripts/deploy/tests -p 'test_*.py'
          python3 scripts/deploy/tests/test-client-agent-lifecycle-selection.py
          bash scripts/deploy/tests/test-signage-deploy-maintenance.sh
          bash scripts/deploy/tests/test-deploy-status-postgres.sh

      - name: Install Ansible
        run: |
          set -euo pipefail
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v ansible-playbook

      - name: Cache Ansible collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-community-general-v1

      - name: Validate deploy safety contracts
        run: bash scripts/deploy/tests/test-deploy-safety-contracts.sh

      - name: Validate inventories and Ansible playbooks
        run: |
          set -euo pipefail
          cd infrastructure/ansible
          ansible-galaxy collection install community.general
          sed 's/^vault_password_file = .vault-pass/# vault_password_file = .vault-pass (disabled for CI)/' ansible.cfg > /tmp/ansible-ci.cfg
          export ANSIBLE_CONFIG=/tmp/ansible-ci.cfg
          export ANSIBLE_ROLES_PATH="$(pwd)/roles"
          READ_ONLY_ANSIBLE_CONFIG="$(pwd)/ansible-readonly.cfg"
          STATIC_PLAYBOOKS=(
            playbooks/deploy.yml
            playbooks/deploy-terminal-profile.yml
            playbooks/server-config-release.yml
            playbooks/update-clients.yml
            playbooks/health-check.yml
            playbooks/manage-system-configs.yml
            playbooks/manage-app-configs.yml
            playbooks/rollback.yml
            playbooks/restart-services.yml
            playbooks/ping.yml
            playbooks/recover-pi4.yml
            playbooks/recover-pi4-verify.yml
          )
          mapfile -t TERMINAL_PROFILE_PLAYBOOKS < <(
            python3 ../../scripts/deploy/terminal_profile_contracts.py --list-playbooks
          )
          python3 ../../scripts/deploy/tests/test_recover_pi4.py
          for inventory in inventory.yml inventory-talkplaza.yml; do
            ANSIBLE_CONFIG="$READ_ONLY_ANSIBLE_CONFIG" \
              ansible-inventory -i "$inventory" --list > "/tmp/${inventory%.yml}.json"
            python3 -m json.tool "/tmp/${inventory%.yml}.json" > /dev/null
          done
          python3 ../../scripts/deploy/terminal_profile_contracts.py \
            --inventory-json /tmp/inventory.json \
            --inventory-json /tmp/inventory-talkplaza.json
          for playbook in "${STATIC_PLAYBOOKS[@]}" "${TERMINAL_PROFILE_PLAYBOOKS[@]}"; do
            ansible-playbook --syntax-check "$playbook" -i inventory.yml
          done
          for playbook in playbooks/deploy-terminal-profile.yml "${TERMINAL_PROFILE_PLAYBOOKS[@]}"; do
            ansible-playbook --syntax-check "$playbook" -i inventory-talkplaza.yml
          done
          ansible-playbook --check \
            -i ../../scripts/deploy/tests/fixtures/recovery-check-inventory.yml \
            playbooks/recover-pi4-verify.yml \
            -e recovery_authorized=true

  client:
    name: client
    needs: change-classification
    if: ${{ needs.change-classification.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install client test runner
        run: python3 -m pip install --user pytest==8.4.2

      - name: Validate client scripts and tests
        env:
          PYTHONPATH: clients/haizen-agent:clients/nfc-agent
        run: |
          bash -n scripts/client/setup-kiosk.sh
          bash -n scripts/client/setup-nfc-agent.sh
          bash -n scripts/client/setup-signage-lite.sh
          bash -n scripts/client/setup-signage.sh
          python3 -m pytest clients/haizen-agent/tests clients/nfc-agent/tests
          python3 -m unittest discover -s clients/status-agent/tests -p 'test_*.py'

  docker-security:
    name: docker-security (${{ matrix.image }})
    needs: change-classification
    if: ${{ needs.change-classification.outputs.docker_security == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: ./infrastructure/docker/Dockerfile.api
            tag: raspisys-api:ci
          - image: web
            dockerfile: ./infrastructure/docker/Dockerfile.web
            tag: raspisys-web:ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Security scan (Trivy fs)
        if: matrix.image == 'api'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          skip-dirs: |
            **/certs
            **/alerts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} image (Buildx) and load
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Security scan (Trivy image ${{ matrix.image }})
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'image'
          image-ref: ${{ matrix.tag }}
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

  e2e-smoke:
    name: e2e-smoke
    needs: change-classification
    if: ${{ needs.change-classification.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start PostgreSQL (smoke)
        run: |
          docker run -d \
            --name postgres-e2e-smoke \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL (smoke)
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e-smoke 60

      - name: Generate Prisma Client (smoke)
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run Prisma migrations (smoke)
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database (smoke)
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build shared packages (smoke)
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Run E2E smoke tests
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          VITE_KIOSK_DEFAULT_MODE: TAG
        run: pnpm test:e2e:smoke

      - name: Cleanup PostgreSQL (smoke)
        if: always()
        run: docker stop postgres-e2e-smoke && docker rm postgres-e2e-smoke || true

  e2e-tests:
    name: e2e-tests
    needs: change-classification
    if: ${{ needs.change-classification.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-e2e \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e 60

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_WORKERS: '2'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          BACKUP_CONFIG_PATH: /tmp/e2e-backup.json
          BACKUP_STORAGE_DIR: /tmp/e2e-backups
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop postgres-e2e || true
          docker rm postgres-e2e || true

  ci-required:
    name: ci-required
    if: ${{ always() }}
    needs:
      - change-classification
      - repo-policy
      - workspace-quality
      - api
      - web
      - db-infra
      - deploy-contract
      - client
      - docker-security
      - e2e-smoke
      - e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aggregate validator
        uses: actions/checkout@v6

      - name: Require every selected CI job to pass
        env:
          CHANGE_CLASSIFICATION: ${{ needs['change-classification'].result }}
          REPO_POLICY_SELECTED: ${{ needs['change-classification'].outputs.repo_policy }}
          REPO_POLICY_RESULT: ${{ needs['repo-policy'].result }}
          WORKSPACE_QUALITY_SELECTED: ${{ needs['change-classification'].outputs.workspace_quality }}
          WORKSPACE_QUALITY_RESULT: ${{ needs['workspace-quality'].result }}
          API_SELECTED: ${{ needs['change-classification'].outputs.api }}
          API_RESULT: ${{ needs.api.result }}
          WEB_SELECTED: ${{ needs['change-classification'].outputs.web }}
          WEB_RESULT: ${{ needs.web.result }}
          DB_INFRA_SELECTED: ${{ needs['change-classification'].outputs.db_infra }}
          DB_INFRA_RESULT: ${{ needs['db-infra'].result }}
          DEPLOY_CONTRACT_SELECTED: ${{ needs['change-classification'].outputs.deploy_contract }}
          DEPLOY_CONTRACT_RESULT: ${{ needs['deploy-contract'].result }}
          CLIENT_SELECTED: ${{ needs['change-classification'].outputs.client }}
          CLIENT_RESULT: ${{ needs.client.result }}
          DOCKER_SECURITY_SELECTED: ${{ needs['change-classification'].outputs.docker_security }}
          DOCKER_SECURITY_RESULT: ${{ needs['docker-security'].result }}
          E2E_SELECTED: ${{ needs['change-classification'].outputs.e2e }}
          E2E_SMOKE: ${{ needs['e2e-smoke'].result }}
          E2E_TESTS: ${{ needs['e2e-tests'].result }}
        run: |
          python3 scripts/ci/validate_required_results.py \
            --classification-result "$CHANGE_CLASSIFICATION" \
            "repo-policy=$REPO_POLICY_SELECTED:$REPO_POLICY_RESULT" \
            "workspace-quality=$WORKSPACE_QUALITY_SELECTED:$WORKSPACE_QUALITY_RESULT" \
            "api=$API_SELECTED:$API_RESULT" \
            "web=$WEB_SELECTED:$WEB_RESULT" \
            "db-infra=$DB_INFRA_SELECTED:$DB_INFRA_RESULT" \
            "deploy-contract=$DEPLOY_CONTRACT_SELECTED:$DEPLOY_CONTRACT_RESULT" \
            "client=$CLIENT_SELECTED:$CLIENT_RESULT" \
            "docker-security=$DOCKER_SECURITY_SELECTED:$DOCKER_SECURITY_RESULT" \
            "e2e-smoke=$E2E_SELECTED:$E2E_SMOKE" \
            "e2e-tests=$E2E_SELECTED:$E2E_TESTS"
