name: CI

permissions:
  contents: read

concurrency:
  # Unblock when a prior run is stuck queued on the same group (GitHub Actions incident).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-v2
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  change-classification:
    name: change-classification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test change classifier
        run: python3 -m unittest discover -s scripts/ci/tests -p 'test_*.py'

      - name: Report shadow change classification
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          changes_file="$(mktemp)"
          trap 'rm -f "$changes_file"' EXIT

          force_full_reason=""
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            force_full_reason="workflow_dispatch has no stable diff base"
          elif [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            force_full_reason="event has no stable diff base"
          elif ! python3 scripts/ci/collect_changed_files.py \
            --event-name "$EVENT_NAME" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            > "$changes_file"; then
            force_full_reason="stable diff base is unavailable"
          fi

          if [[ -n "$force_full_reason" ]]; then
            python3 scripts/ci/classify_changes.py \
              --format markdown \
              --force-full-reason "$force_full_reason" \
              < "$changes_file" >> "$GITHUB_STEP_SUMMARY"
          else
            python3 scripts/ci/classify_changes.py \
              --format markdown \
              < "$changes_file" >> "$GITHUB_STEP_SUMMARY"
          fi

  # Fast feedback: lint, workspace builds, package-level tests (no Docker DB)
  lint-build-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # test-pi5-image-deploy.sh validates migration impact against HEAD^.
          fetch-depth: 2

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Validate deployment scripts
        run: |
          bash -n scripts/update-all-clients.sh
          bash -n scripts/server/deploy.sh
          bash -n scripts/server/deploy-detached.sh
          bash scripts/deploy/tests/test-single-deploy-entrypoint.sh
          bash -n scripts/deploy/pi5-blue-green.sh
          bash -n scripts/deploy/pi5-candidate-build.sh
          bash scripts/deploy/tests/test-pi5-image-deploy.sh
          bash scripts/deploy/tests/test-pi5-blue-green.sh
          bash scripts/deploy/tests/test-pi5-blue-green-maintenance-container.sh
          python3 -m unittest discover -s scripts/deploy/tests -p 'test_*.py'
          python3 scripts/deploy/tests/test-client-agent-lifecycle-baseline.py
          bash scripts/deploy/tests/test-signage-deploy-maintenance.sh
          bash scripts/deploy/tests/test-deploy-status-postgres.sh
          bash scripts/update-all-clients.sh main infrastructure/ansible/inventory.yml --print-plan

      - name: Run lint
        run: pnpm lint --max-warnings=0

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Run part-search-core tests
        run: pnpm --filter @raspi-system/part-search-core test

      - name: Run shelf-layout-core tests
        run: pnpm --filter @raspi-system/shelf-layout-core test

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        run: pnpm --filter @raspi-system/api build

      - name: Run web tests
        run: pnpm --filter @raspi-system/web test

      - name: Build Web
        run: pnpm --filter @raspi-system/web build

      # pnpm 9 uses npm's retired audit endpoint. Keep the workspace toolchain
      # unchanged and isolate the bulk-advisory client after all Node 20 work.
      - name: Setup Node.js for bulk advisory audit
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Security scan (pnpm bulk audit)
        env:
          AUDIT_PNPM_VERSION: '11.4.0'
        run: |
          set -euo pipefail
          run_audit() {
            (
              # Running outside the repository prevents pnpm 11 from switching
              # back to the packageManager-pinned pnpm 9 audit client.
              cd /tmp
              npx --yes "pnpm@${AUDIT_PNPM_VERSION}" with "${AUDIT_PNPM_VERSION}" \
                --dir "$GITHUB_WORKSPACE" audit "$@"
            )
          }

          echo "=== pnpm bulk audit: critical+ (required gate) ==="
          for attempt in 1 2 3; do
            if run_audit --audit-level=critical; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "pnpm bulk audit (critical+) failed after retries"
              exit 1
            fi
            echo "pnpm bulk audit (critical+) failed (attempt ${attempt}/3); retrying..."
            sleep 20
          done
          echo "=== pnpm bulk audit: high+ (informational; fix tracked separately) ==="
          run_audit --audit-level=high || {
            echo "::warning::pnpm bulk audit reported high severity issues; see log above"
            exit 0
          }

  # API + PostgreSQL + 統合テスト + 運用スクリプト（開始直後から並列実行）
  api-db-and-infra:
    name: api-db-and-infra (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1/3
            shard-id: 1-of-3
            run-infra: true
          - shard: 2/3
            shard-id: 2-of-3
            run-infra: false
          - shard: 3/3
            shard-id: 3-of-3
            run-infra: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build API
        # The production build remains a required gate in lint-build-unit. Only the
        # shard that starts the production server needs to repeat it here.
        if: matrix.run-infra
        run: pnpm --filter @raspi-system/api build

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-test 60
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT version();"

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run API tests (coverage, single pass)
        run: |
          cd apps/api
          docker exec postgres-test psql -U postgres -d borrow_return -c "SELECT 1;"
          BACKUP_CONFIG_PATH=/tmp/test-backup.json PROJECT_ROOT=$(pwd) \
            pnpm test:coverage -- --shard=${{ matrix.shard }} --fileParallelism=true --maxWorkers=1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          CAMERA_TYPE: mock
          PHOTO_STORAGE_DIR: /tmp/test-photo-storage
          BACKUP_STORAGE_DIR: /tmp/test-backups
          NODE_ENV: test
          PERF_RESPONSE_TIME_THRESHOLD_MS: '1800'

      - name: Upload API coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-coverage-${{ matrix.shard-id }}
          path: apps/api/coverage/
          retention-days: 7

      - name: Start API server for monitoring tests
        if: matrix.run-infra
        run: |
          cd apps/api
          NODE_ENV=production pnpm start > /tmp/api-server.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          echo "API server started with PID: $API_PID"
          sleep 2
          head -50 /tmp/api-server.log || echo "No log file yet"
          timeout=30
          elapsed=0
          until curl -s http://localhost:8080/api/system/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "API server failed to start within $timeout seconds"
              cat /tmp/api-server.log || true
              exit 1
            fi
            echo "Waiting for API server... ($elapsed/$timeout seconds)"
            sleep 1
            elapsed=$((elapsed + 1))
          done
          echo "API server is ready!"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: ci-prod-access-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          JWT_REFRESH_SECRET: ci-prod-refresh-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          PORT: 8080
          HOST: 0.0.0.0

      - name: Test backup/restore scripts
        if: matrix.run-infra
        run: |
          docker ps | grep postgres-test
          bash scripts/test/backup-restore.test.sh

      - name: Install Ansible
        if: matrix.run-infra
        run: |
          set -euo pipefail
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v ansible-playbook

      - name: Cache Ansible collections
        if: matrix.run-infra
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-community-general-v1

      - name: Validate deploy safety contracts
        if: matrix.run-infra
        run: bash scripts/deploy/tests/test-deploy-safety-contracts.sh

      - name: Ansible syntax check
        if: matrix.run-infra
        run: |
          set -euo pipefail
          cd infrastructure/ansible
          ansible-galaxy collection install community.general
          cp ansible.cfg /tmp/ansible.cfg.backup || true
          sed 's/^vault_password_file = .vault-pass/# vault_password_file = .vault-pass (disabled for CI syntax check)/' ansible.cfg > /tmp/ansible-ci.cfg
          export ANSIBLE_CONFIG=/tmp/ansible-ci.cfg
          export ANSIBLE_ROLES_PATH="$(pwd)/roles"
          PLAYBOOKS=(
            "playbooks/deploy.yml"
            "playbooks/deploy-staged.yml"
            "playbooks/update-clients.yml"
            "playbooks/health-check.yml"
            "playbooks/manage-system-configs.yml"
            "playbooks/manage-app-configs.yml"
            "playbooks/rollback.yml"
            "playbooks/restart-services.yml"
            "playbooks/ping.yml"
            "playbooks/recover-pi4.yml"
            "playbooks/recover-pi4-verify.yml"
          )
          python3 ../../scripts/deploy/tests/test_recover_pi4.py

          for inventory in inventory.yml inventory-talkplaza.yml; do
            echo "Parsing inventory $inventory..."
            ansible-inventory -i "$inventory" --list > "/tmp/${inventory%.yml}.json"
            python3 -m json.tool "/tmp/${inventory%.yml}.json" > /dev/null
          done

          FAILED=0
          for playbook in "${PLAYBOOKS[@]}"; do
            echo "Checking syntax for $playbook..."
            if ansible-playbook --syntax-check "$playbook" -i inventory.yml > /tmp/ansible-syntax-check.log 2>&1; then
              echo "OK $playbook"
            else
              if grep -qE "(vault password|ERROR.*vault)" /tmp/ansible-syntax-check.log && ! grep -qE "(syntax error|YAML|parse error)" /tmp/ansible-syntax-check.log; then
                echo "WARN $playbook skipped (vault decrypt only)"
              else
                echo "FAIL $playbook"
                cat /tmp/ansible-syntax-check.log
                FAILED=1
              fi
            fi
          done
          echo "Checking deploy-staged.yml with inventory-talkplaza.yml..."
          if ansible-playbook --syntax-check playbooks/deploy-staged.yml -i inventory-talkplaza.yml > /tmp/ansible-syntax-check.log 2>&1; then
            echo "OK playbooks/deploy-staged.yml (inventory-talkplaza.yml)"
          else
            if grep -qE "(vault password|ERROR.*vault)" /tmp/ansible-syntax-check.log && ! grep -qE "(syntax error|YAML|parse error)" /tmp/ansible-syntax-check.log; then
              echo "WARN playbooks/deploy-staged.yml skipped (vault decrypt only)"
            else
              echo "FAIL playbooks/deploy-staged.yml (inventory-talkplaza.yml)"
              cat /tmp/ansible-syntax-check.log
              FAILED=1
            fi
          fi
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Ansible dry-run check (deploy playbook only)
        if: matrix.run-infra
        run: |
          set -euo pipefail
          cd infrastructure/ansible
          ansible-galaxy collection install community.general
          sed 's/^vault_password_file = .vault-pass/# vault_password_file = .vault-pass (disabled for CI dry-run check)/' ansible.cfg > /tmp/ansible-ci.cfg
          export ANSIBLE_CONFIG=/tmp/ansible-ci.cfg
          export ANSIBLE_ROLES_PATH="$(pwd)/roles"
          ansible-playbook --check --diff playbooks/deploy.yml -i inventory.yml --limit nonexistent_host 2>&1 | tee /tmp/ansible-dryrun.log || true
          if grep -qE "(No hosts matched|leaves us with no hosts to target)" /tmp/ansible-dryrun.log; then
            echo "deploy.yml dry-run OK (no hosts matched)"
          elif grep -qE "(ERROR|error)" /tmp/ansible-dryrun.log && ! grep -qE "(No hosts matched|leaves us with no hosts|vault password)" /tmp/ansible-dryrun.log; then
            echo "deploy.yml dry-run failed"
            cat /tmp/ansible-dryrun.log
            exit 1
          else
            echo "deploy.yml dry-run OK"
          fi
          ansible-playbook --check \
            -i ../../scripts/deploy/tests/fixtures/recovery-check-inventory.yml \
            playbooks/recover-pi4-verify.yml \
            -e recovery_authorized=true

      - name: Test monitoring scripts
        if: matrix.run-infra
        run: |
          API_URL=http://localhost:8080/api pnpm test:monitor || {
            cat /tmp/api-server.log || true
            exit 1
          }

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" || true
            sleep 2
            kill -9 "$API_PID" 2>/dev/null || true
          fi
          pkill -f "node dist/main.js" || true
          pkill -f "pnpm start" || true

      - name: Cleanup PostgreSQL
        if: always()
        run: docker stop postgres-test && docker rm postgres-test || true

  # セキュリティスキャンと Docker イメージビルド（開始直後から並列実行）
  security-docker:
    name: security-docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: ./infrastructure/docker/Dockerfile.api
            tag: raspisys-api:ci
          - image: web
            dockerfile: ./infrastructure/docker/Dockerfile.web
            tag: raspisys-web:ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Security scan (Trivy fs)
        if: matrix.image == 'api'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          skip-dirs: |
            **/certs
            **/alerts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} image (Buildx) and load
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Security scan (Trivy image ${{ matrix.image }})
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'image'
          image-ref: ${{ matrix.tag }}
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start PostgreSQL (smoke)
        run: |
          docker run -d \
            --name postgres-e2e-smoke \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL (smoke)
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e-smoke 60

      - name: Generate Prisma Client (smoke)
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run Prisma migrations (smoke)
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database (smoke)
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Build shared packages (smoke)
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Run E2E smoke tests
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          VITE_KIOSK_DEFAULT_MODE: TAG
        run: pnpm test:e2e:smoke

      - name: Cleanup PostgreSQL (smoke)
        if: always()
        run: docker stop postgres-e2e-smoke && docker rm postgres-e2e-smoke || true

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-monorepo
        with:
          playwright-cache: 'true'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build shared packages
        run: |
          pnpm --filter @raspi-system/shared-types build
          pnpm --filter @raspi-system/part-search-core build
          pnpm --filter @raspi-system/shelf-layout-core build

      - name: Generate Prisma Client
        run: pnpm --filter @raspi-system/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-e2e \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=borrow_return \
            -p 5432:5432 \
            --health-cmd="pg_isready -U postgres" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=5 \
            pgvector/pgvector:pg15

      - name: Wait for PostgreSQL
        run: |
          chmod +x scripts/ci/wait-for-postgres.sh
          scripts/ci/wait-for-postgres.sh postgres-e2e 60

      - name: Run Prisma migrations
        run: pnpm --filter @raspi-system/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Seed database
        run: pnpm --filter @raspi-system/api exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_WORKERS: '2'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borrow_return
          JWT_ACCESS_SECRET: test-access-secret-1234567890
          JWT_REFRESH_SECRET: test-refresh-secret-1234567890
          BACKUP_CONFIG_PATH: /tmp/e2e-backup.json
          BACKUP_STORAGE_DIR: /tmp/e2e-backups
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop postgres-e2e || true
          docker rm postgres-e2e || true

  ci-required:
    name: ci-required
    if: ${{ always() }}
    needs:
      - change-classification
      - lint-build-unit
      - api-db-and-infra
      - security-docker
      - e2e-smoke
      - e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI job to pass
        env:
          CHANGE_CLASSIFICATION: ${{ needs['change-classification'].result }}
          LINT_BUILD_UNIT: ${{ needs['lint-build-unit'].result }}
          API_DB_AND_INFRA: ${{ needs['api-db-and-infra'].result }}
          SECURITY_DOCKER: ${{ needs['security-docker'].result }}
          E2E_SMOKE: ${{ needs['e2e-smoke'].result }}
          E2E_TESTS: ${{ needs['e2e-tests'].result }}
        run: |
          set -euo pipefail
          failed=0
          for result in \
            "change-classification=$CHANGE_CLASSIFICATION" \
            "lint-build-unit=$LINT_BUILD_UNIT" \
            "api-db-and-infra=$API_DB_AND_INFRA" \
            "security-docker=$SECURITY_DOCKER" \
            "e2e-smoke=$E2E_SMOKE" \
            "e2e-tests=$E2E_TESTS"; do
            echo "$result"
            if [[ "${result#*=}" != "success" ]]; then
              failed=1
            fi
          done
          exit "$failed"
