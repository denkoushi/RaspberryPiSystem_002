; Step E: single-task display probe (no avatar.init / no FreeRTOS drawLoop).
; Uses AI_StackChan_Ex vendored m5stack-avatar for Face::draw once in setup().

[platformio]
default_envs = m5stack-cores3-probe-stepe

[env:m5stack-cores3-probe-stepe]
platform = espressif32@6.3.2
board = esp32s3box
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.arduino.partitions = ../cores3-probe/my_cores3_16MB.csv
monitor_filters = esp32_exception_decoder
board_build.f_flash = 80000000L
board_build.filesystem = spiffs
monitor_speed = 115200
upload_speed = 1500000
build_flags =
	-DBOARD_HAS_PSRAM
	-DARDUINO_M5STACK_CORES3
lib_deps =
	m5stack/M5Unified @ 0.2.7
	file://${sysenv.STACKCHAN_AI_STACKCHAN_EX}/firmware/lib/m5stack-avatar
lib_ldf_mode = deep
