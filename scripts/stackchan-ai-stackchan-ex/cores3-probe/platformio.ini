; CoreS3 bring-up probe — mirrors AI_StackChan_Ex env:m5stack-cores3 board/toolchain only.
; Step B: SD YAML paths (/app/AiStackChanEx, /yaml). No Wi-Fi, Avatar, LLM, Servo, WakeWord.

[platformio]
default_envs = m5stack-cores3-probe

[env:m5stack-cores3-probe]
platform = espressif32@6.3.2
board = esp32s3box
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.arduino.partitions = my_cores3_16MB.csv
monitor_filters = esp32_exception_decoder
board_build.f_flash = 80000000L
board_build.filesystem = spiffs
monitor_speed = 115200
upload_speed = 1500000
build_flags =
	-DBOARD_HAS_PSRAM
	-DARDUINO_M5STACK_CORES3
	-DHAS_ARDUINOJSON
lib_deps =
	m5stack/M5Unified @ 0.2.7
	bblanchon/ArduinoJson @ ^7
	tobozo/YAMLDuino@^1.4.2
lib_ldf_mode = deep

; Optional: USB CDC serial on boot (CoreS3 serial troubleshooting)
[env:m5stack-cores3-probe-usbcdc]
extends = env:m5stack-cores3-probe
build_flags =
	${env:m5stack-cores3-probe.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
