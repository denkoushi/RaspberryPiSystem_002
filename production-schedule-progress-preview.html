<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進捗一覧プレビュー</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
      font-family: "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
    }
    .page {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.78);
      padding: 8px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .head-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .head h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .meta {
      margin: 0;
      color: rgba(248, 250, 252, 0.72);
      font-size: 11px;
      white-space: nowrap;
    }
    .refresh {
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 10px;
    }
    .section {
      margin-bottom: 8px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.56);
      padding: 7px;
      margin-bottom: 6px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      padding-bottom: 5px;
      margin-bottom: 5px;
    }
    .fseiban {
      font-family: "Courier New", monospace;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .machine {
      font-size: 11px;
      color: rgba(248, 250, 252, 0.72);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      text-align: left;
      padding: 5px 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      vertical-align: top;
    }
    th {
      color: rgba(248, 250, 252, 0.82);
      font-weight: 700;
      font-size: 11px;
    }
    th:nth-child(2), td:nth-child(2) {
      width: 84px;
      white-space: nowrap;
      padding-right: 2px;
    }
    th:nth-child(3), td:nth-child(3) {
      padding-left: 2px;
    }
    .progress-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip {
      border: 1px solid rgba(147, 197, 253, 0.85);
      background: rgba(59, 130, 246, 0.32);
      color: #dbeafe;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 6px;
    }
    .chip.done {
      border-color: rgba(148, 163, 184, 0.7);
      background: rgba(255, 255, 255, 0.1);
      color: rgba(248, 250, 252, 0.7);
      opacity: 0.55;
    }
    @media (max-width: 1280px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 900px) {
      .head {
        flex-wrap: wrap;
      }
      .head-main {
        width: 100%;
      }
      .meta {
        white-space: normal;
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="head">
      <div class="head-main">
        <h1>進捗一覧</h1>
        <p class="meta">最終更新: 2026/03/14 19:32:10</p>
      </div>
      <button class="refresh" type="button">手動更新</button>
    </div>

    <div class="section">
      <div class="cards">
        <article class="card">
          <div class="card-header">
            <span class="fseiban">SE-202603-001</span>
            <span class="machine">マシニングA-400</span>
          </div>
          <table>
            <tbody>
              <tr>
                <td>主軸ケース</td>
                <td>2026/03/20</td>
                <td>
                  <div class="progress-wrap">
                    <span class="chip done">503</span>
                    <span class="chip">584</span>
                    <span class="chip">587</span>
                  </div>
                </td>
              </tr>
              <tr>
                <td>固定プレート</td>
                <td>2026/03/20</td>
                <td>
                  <div class="progress-wrap">
                    <span class="chip done">503</span>
                    <span class="chip">587</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </article>

        <article class="card">
          <div class="card-header">
            <span class="fseiban">SE-202603-010</span>
            <span class="machine">旋盤ラインB-210</span>
          </div>
          <table>
            <tbody>
              <tr>
                <td>カバーリング</td>
                <td>2026/03/22</td>
                <td>
                  <div class="progress-wrap">
                    <span class="chip done">412</span>
                    <span class="chip done">418</span>
                    <span class="chip">505</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </article>
      </div>
    </div>
  </div>
</body>
</html>
