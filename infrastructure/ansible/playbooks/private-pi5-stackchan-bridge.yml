---
- name: Deploy private Pi5 StackChan bridge
  hosts: private-pi5-stackchan-bridge
  gather_facts: false
  become: true
  serial: 1
  vars:
    private_pi5_repo_root: "{{ playbook_dir | dirname | dirname | dirname | realpath }}"
    private_pi5_bridge_effective_user: "{{ private_pi5_bridge_user | default(ansible_user) }}"
    private_pi5_bridge_effective_group: "{{ private_pi5_bridge_group | default(private_pi5_bridge_effective_user) }}"
    private_pi5_bridge_effective_dir: "{{ private_pi5_bridge_dir | default('/home/' ~ private_pi5_bridge_effective_user ~ '/stackchan-bridge') }}"
    private_pi5_bridge_effective_service_name: "{{ private_pi5_bridge_service_name | default('stackchan-bridge') }}"
    private_pi5_bridge_unit_path: "/etc/systemd/system/{{ private_pi5_bridge_effective_service_name }}.service"
    private_pi5_bridge_env_path: "{{ private_pi5_bridge_effective_dir }}/.env"
    private_pi5_bridge_effective_port: "{{ (private_pi5_bridge_port | default(18080)) | int }}"
    private_pi5_bridge_python_path: "{{ private_pi5_bridge_python | default('/usr/bin/python3') }}"
    private_pi5_bridge_uv_bin: "{{ private_pi5_bridge_uv_path | default('/home/' ~ private_pi5_bridge_effective_user ~ '/.local/bin/uv') }}"
    private_pi5_bridge_venv_path: "{{ private_pi5_bridge_effective_dir }}/.venv"
    private_pi5_stackchan_compat_ip_effective: "{{ private_pi5_stackchan_compat_ip | default('') | trim }}"
    private_pi5_stackchan_compat_enabled: "{{ (private_pi5_stackchan_compat_ip_effective | length) > 0 }}"
    private_pi5_stackchan_compat_interface_effective: "{{ private_pi5_stackchan_compat_interface | default('wlan0') }}"
    private_pi5_stackchan_compat_prefix_effective: "{{ private_pi5_stackchan_compat_prefix | default(24) }}"
    private_pi5_stackchan_compat_effective_service_name: "{{ private_pi5_stackchan_compat_service_name | default('stackchan-bridge-compat-ip') }}"
    private_pi5_stackchan_compat_unit_path: "/etc/systemd/system/{{ private_pi5_stackchan_compat_effective_service_name }}.service"
    private_pi5_stackchan_compat_dispatcher_path: "/etc/NetworkManager/dispatcher.d/99-stackchan-bridge-compat-ip"
    private_pi5_bridge_files:
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/bridge_server.py"
        dest: "{{ private_pi5_bridge_effective_dir }}/bridge_server.py"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/stackchan_chat_core.py"
        dest: "{{ private_pi5_bridge_effective_dir }}/stackchan_chat_core.py"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/dgx_runtime_client.py"
        dest: "{{ private_pi5_bridge_effective_dir }}/dgx_runtime_client.py"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/stt_bridge_core.py"
        dest: "{{ private_pi5_bridge_effective_dir }}/stt_bridge_core.py"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/stt_runtime_client.py"
        dest: "{{ private_pi5_bridge_effective_dir }}/stt_runtime_client.py"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/pyproject.toml"
        dest: "{{ private_pi5_bridge_effective_dir }}/pyproject.toml"
        mode: "0644"
      - src: "{{ private_pi5_repo_root }}/scripts/private-pi5-stackchan-bridge/uv.lock"
        dest: "{{ private_pi5_bridge_effective_dir }}/uv.lock"
        mode: "0644"

  pre_tasks:
    - name: Run Tailscale preflight checks
      ansible.builtin.include_tasks: "../tasks/preflight-tailscale.yml"
      when:
        - network_mode | default('tailscale') == 'tailscale'
        - tailscale_enabled | default(false) | bool

    - name: Validate required bridge variables
      ansible.builtin.assert:
        that:
          - (private_pi5_dgx_base_url | default('') | trim) | length > 0
          - (private_pi5_dgx_model | default('') | trim) | length > 0
          - (private_pi5_dgx_llm_shared_token | default('') | trim) | length > 0
        fail_msg: >-
          private Pi5 bridge deploy requires
          private_pi5_dgx_base_url / private_pi5_dgx_model / private_pi5_dgx_llm_shared_token.

  tasks:
    - name: Ensure bridge directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ private_pi5_bridge_effective_user }}"
        group: "{{ private_pi5_bridge_effective_group }}"
        mode: "0750"
      loop:
        - "{{ private_pi5_bridge_effective_dir }}"
        - "{{ private_pi5_bridge_effective_dir }}/patches"

    - name: Copy bridge Python sources
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ private_pi5_bridge_effective_user }}"
        group: "{{ private_pi5_bridge_effective_group }}"
        mode: "{{ item.mode }}"
      loop: "{{ private_pi5_bridge_files }}"
      notify: Restart private Pi5 bridge

    - name: Check uv binary
      ansible.builtin.stat:
        path: "{{ private_pi5_bridge_uv_bin }}"
      register: private_pi5_bridge_uv_stat

    - name: Install uv for bridge user when missing
      ansible.builtin.shell: |
        set -euo pipefail
        curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ private_pi5_bridge_effective_user }}"
      when: not private_pi5_bridge_uv_stat.stat.exists

    - name: Sync bridge venv with uv (default deps)
      ansible.builtin.command:
        argv:
          - "{{ private_pi5_bridge_uv_bin }}"
          - sync
          - --frozen
          - --project
          - "{{ private_pi5_bridge_effective_dir }}"
          - --python
          - "{{ private_pi5_bridge_python_path }}"
      become: true
      become_user: "{{ private_pi5_bridge_effective_user }}"
      when: (private_pi5_stt_provider | default('upstream-openai')) != 'faster-whisper-local'
      notify: Restart private Pi5 bridge

    - name: Sync bridge venv with uv (include faster-whisper extra)
      ansible.builtin.command:
        argv:
          - "{{ private_pi5_bridge_uv_bin }}"
          - sync
          - --frozen
          - --extra
          - local-stt
          - --project
          - "{{ private_pi5_bridge_effective_dir }}"
          - --python
          - "{{ private_pi5_bridge_python_path }}"
      become: true
      become_user: "{{ private_pi5_bridge_effective_user }}"
      when: (private_pi5_stt_provider | default('upstream-openai')) == 'faster-whisper-local'
      notify: Restart private Pi5 bridge

    - name: Render bridge environment file
      ansible.builtin.template:
        src: "../templates/private-pi5-stackchan-bridge.env.j2"
        dest: "{{ private_pi5_bridge_env_path }}"
        owner: "{{ private_pi5_bridge_effective_user }}"
        group: "{{ private_pi5_bridge_effective_group }}"
        mode: "0600"
      notify: Restart private Pi5 bridge

    - name: Install bridge systemd unit
      ansible.builtin.template:
        src: "../templates/private-pi5-stackchan-bridge.service.j2"
        dest: "{{ private_pi5_bridge_unit_path }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd daemon
        - Restart private Pi5 bridge

    - name: Install StackChan compatibility IP unit
      ansible.builtin.template:
        src: "../templates/private-pi5-stackchan-compat-ip.service.j2"
        dest: "{{ private_pi5_stackchan_compat_unit_path }}"
        owner: root
        group: root
        mode: "0644"
      when: private_pi5_stackchan_compat_enabled | bool
      notify:
        - Reload systemd daemon
        - Restart private Pi5 StackChan compatibility IP

    - name: Ensure NetworkManager dispatcher directory exists (compat IP hook)
      ansible.builtin.file:
        path: /etc/NetworkManager/dispatcher.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: private_pi5_stackchan_compat_enabled | bool

    - name: Install NetworkManager dispatcher to re-apply StackChan compat IP on wlan renew/reconnect
      ansible.builtin.template:
        src: "../templates/private-pi5-stackchan-compat-ip-dispatcher.sh.j2"
        dest: "{{ private_pi5_stackchan_compat_dispatcher_path }}"
        owner: root
        group: root
        mode: "0755"
      when: private_pi5_stackchan_compat_enabled | bool

    - name: Remove StackChan compat IP NetworkManager dispatcher when disabled
      ansible.builtin.file:
        path: "{{ private_pi5_stackchan_compat_dispatcher_path }}"
        state: absent
      when: not (private_pi5_stackchan_compat_enabled | bool)

    - name: Remove StackChan compatibility IP unit when disabled
      ansible.builtin.file:
        path: "{{ private_pi5_stackchan_compat_unit_path }}"
        state: absent
      when: not (private_pi5_stackchan_compat_enabled | bool)
      notify: Reload systemd daemon

    - name: Stop StackChan compatibility IP service when disabled
      ansible.builtin.systemd:
        name: "{{ private_pi5_stackchan_compat_effective_service_name }}"
        enabled: false
        state: stopped
      when: not (private_pi5_stackchan_compat_enabled | bool)
      failed_when: false

    - name: Flush handlers before health check
      ansible.builtin.meta: flush_handlers

    - name: Ensure StackChan compatibility IP service is enabled and started
      ansible.builtin.systemd:
        name: "{{ private_pi5_stackchan_compat_effective_service_name }}"
        enabled: true
        state: started
      when: private_pi5_stackchan_compat_enabled | bool

    - name: Ensure bridge service is enabled and started
      ansible.builtin.systemd:
        name: "{{ private_pi5_bridge_effective_service_name }}"
        enabled: true
        state: started

    - name: Wait for bridge listen port
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ private_pi5_bridge_effective_port }}"
        timeout: 30

    - name: Probe bridge health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ private_pi5_bridge_effective_port }}/healthz"
        method: GET
        status_code: 200
        return_content: true
      register: private_pi5_bridge_health
      changed_when: false

    - name: Verify StackChan compatibility IP is present
      ansible.builtin.command:
        argv:
          - ip
          - -brief
          - addr
          - show
          - "{{ private_pi5_stackchan_compat_interface_effective }}"
      register: private_pi5_stackchan_compat_addr
      changed_when: false
      when: private_pi5_stackchan_compat_enabled | bool

    - name: Summarize bridge deployment
      ansible.builtin.debug:
        msg:
          - "service={{ private_pi5_bridge_effective_service_name }}"
          - >-
            health={{
              (private_pi5_bridge_health.content | trim)
              if (private_pi5_bridge_health is defined and private_pi5_bridge_health.content is defined)
              else 'skipped(check mode)'
            }}
          - "port={{ private_pi5_bridge_effective_port }}"
          - >-
            compat_ip={{
              private_pi5_stackchan_compat_ip_effective
              if (private_pi5_stackchan_compat_enabled | bool)
              else 'disabled'
            }}

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart private Pi5 bridge
      ansible.builtin.systemd:
        name: "{{ private_pi5_bridge_effective_service_name }}"
        state: restarted

    - name: Restart private Pi5 StackChan compatibility IP
      ansible.builtin.systemd:
        name: "{{ private_pi5_stackchan_compat_effective_service_name }}"
        enabled: true
        state: restarted
