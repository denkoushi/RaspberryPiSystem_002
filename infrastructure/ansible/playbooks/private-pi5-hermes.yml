---
# 私用 Pi5: Hermes Agent（セキュリティ準備 → インストール → 検証）
# 在庫: inventory-private-pi5-stackchan-bridge-fragment.yml（ローカル非追跡）
- name: Private Pi5 Hermes Agent (security-first)
  hosts: private-pi5-stackchan-bridge
  gather_facts: false
  become: true
  serial: 1
  vars:
    private_pi5_repo_root: "{{ playbook_dir | dirname | dirname | dirname | realpath }}"
    private_pi5_hermes_user: hermes
    private_pi5_hermes_group: hermes
    private_pi5_hermes_home: "/home/{{ private_pi5_hermes_user }}"
    private_pi5_hermes_data_dir: "{{ private_pi5_hermes_home }}/.hermes"
    private_pi5_hermes_tools_data_dir: "{{ private_pi5_hermes_home }}/.hermes-tools"
    private_pi5_hermes_tools_home: "{{ private_pi5_hermes_tools_data_dir }}/home"
    private_pi5_hermes_tools_config_dir: "{{ private_pi5_hermes_tools_home }}/.hermes"
    private_pi5_hermes_novel_data_dir: "{{ private_pi5_hermes_home }}/.hermes-novel"
    private_pi5_hermes_novel_home: "{{ private_pi5_hermes_novel_data_dir }}/home"
    private_pi5_hermes_novel_config_dir: "{{ private_pi5_hermes_novel_home }}/.hermes"
    private_pi5_hermes_novel_model_profile_id: "qwen36_35b_uncensored"
    private_pi5_hermes_life_data_dir: "{{ private_pi5_hermes_home }}/.hermes-life"
    private_pi5_hermes_life_reminder_scheduler_active: >-
      {{
        (private_pi5_hermes_life_pilot_enabled | default(false) | bool)
        and (private_pi5_hermes_life_reminder_scheduler_enabled | default(true) | bool)
        and ((private_pi5_hermes_discord_bot_token | default('') | trim) | length > 0)
      }}
    private_pi5_hermes_life_proactive_loop_active: >-
      {{
        (private_pi5_hermes_life_pilot_enabled | default(false) | bool)
        and (private_pi5_hermes_life_proactive_loop_enabled | default(true) | bool)
        and ((private_pi5_hermes_discord_bot_token | default('') | trim) | length > 0)
      }}
    private_pi5_hermes_life_followup_loop_active: >-
      {{
        private_pi5_hermes_life_proactive_loop_active
        and (private_pi5_hermes_life_followup_loop_enabled | default(true) | bool)
      }}
    private_pi5_hermes_life_discord_ui_relay_active: >-
      {{
        private_pi5_hermes_life_proactive_loop_active
        and (private_pi5_hermes_life_discord_ui_relay_enabled | default(true) | bool)
      }}
    private_pi5_hermes_bin: "{{ private_pi5_hermes_home }}/.local/bin/hermes"
    hermes_terminal_mount_cwd_to_workspace: false
    hermes_terminal_docker_volumes: >-
      {{
        [private_pi5_hermes_tools_data_dir ~ '/workspace:/workspace']
        if (private_pi5_hermes_tools_file_enabled | default(false) | bool)
        else []
      }}
    private_pi5_hermes_install_skip_browser: true
    private_pi5_hermes_enable_ufw: true
    private_pi5_hermes_lan_cidr: "192.168.128.0/24"
    private_pi5_hermes_bridge_port: 18080
    private_pi5_hermes_dgx_base_url: "{{ private_pi5_dgx_base_url | default('http://100.118.82.72:38081') }}"
    private_pi5_hermes_dgx_model: "{{ private_pi5_dgx_model | default('system-prod-primary') }}"
    private_pi5_hermes_dgx_keep_warm_dir: "{{ private_pi5_hermes_data_dir }}/dgx-keep-warm"
    private_pi5_hermes_dgx_keep_warm_env_path: "{{ private_pi5_hermes_data_dir }}/dgx-keep-warm.env"
    private_pi5_hermes_dgx_keep_warm_active: >-
      {{
        (private_pi5_hermes_dgx_keep_warm_enabled | default(true) | bool)
        and ((private_pi5_dgx_runtime_control_token | default('') | trim) | length > 0)
      }}
    # Discord / gateway_enabled / tools_* は inventory fragment のみ（play 側に空既定を置くと host 変数が潰れる）
    private_pi5_hermes_install_argv:
      - /bin/bash
      - /tmp/hermes-agent-install.sh
      - --skip-setup
      - --skip-browser

  pre_tasks:
    - name: Run Tailscale preflight checks
      ansible.builtin.include_tasks: "../tasks/preflight-tailscale.yml"
      when:
        - network_mode | default('tailscale') == 'tailscale'
        - tailscale_enabled | default(false) | bool

    - name: Resolve Hermes chat DGX token from inventory
      ansible.builtin.set_fact:
        private_pi5_hermes_chat_dgx_llm_token: >-
          {{ hostvars[inventory_hostname].get('private_pi5_hermes_chat_dgx_llm_token', '')
          | default(hostvars[inventory_hostname].get('private_pi5_dgx_llm_shared_token', ''), true)
          | trim }}

    - name: Resolve Hermes default DGX model profile id from inventory
      ansible.builtin.set_fact:
        private_pi5_hermes_dgx_default_model_profile_id: >-
          {{ hostvars[inventory_hostname].get('private_pi5_hermes_dgx_default_model_profile_id', 'business_qwen36_27b_nvfp4') | trim }}

    - name: Resolve Hermes tools DGX token from inventory
      ansible.builtin.set_fact:
        private_pi5_hermes_tools_dgx_llm_token_resolved: >-
          {{ hostvars[inventory_hostname].get('private_pi5_hermes_tools_dgx_llm_token', '') | trim }}
        private_pi5_hermes_tools_effective_dgx_llm_token: >-
          {{ hostvars[inventory_hostname].get('private_pi5_hermes_tools_dgx_llm_token', '') | trim }}
      when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

    - name: Validate Hermes tools profile token is configured
      ansible.builtin.assert:
        that:
          - (private_pi5_hermes_tools_dgx_llm_token_resolved | default('') | trim) | length > 0
          - private_pi5_hermes_tools_dgx_llm_token_resolved != private_pi5_hermes_chat_dgx_llm_token
        fail_msg: >-
          Set private_pi5_hermes_tools_dgx_llm_token in the inventory fragment (dedicated token,
          must differ from private_pi5_hermes_chat_dgx_llm_token).
      when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

    - name: Validate Hermes tools Phase D2 requires tools gateway
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_tools_gateway_enabled | default(false) | bool
        fail_msg: >-
          Phase D2 (private_pi5_hermes_tools_file_enabled: true) requires
          private_pi5_hermes_tools_gateway_enabled: true on the tools profile.
      when:
        - private_pi5_hermes_tools_profile_enabled | default(false) | bool
        - private_pi5_hermes_tools_file_enabled | default(false) | bool

    - name: Validate Hermes tools Phase D3 requires file and gateway
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_tools_file_enabled | default(false) | bool
          - private_pi5_hermes_tools_gateway_enabled | default(false) | bool
        fail_msg: >-
          Phase D3 (private_pi5_hermes_tools_web_enabled: true) requires
          private_pi5_hermes_tools_file_enabled: true and
          private_pi5_hermes_tools_gateway_enabled: true.
      when:
        - private_pi5_hermes_tools_profile_enabled | default(false) | bool
        - private_pi5_hermes_tools_web_enabled | default(false) | bool

    - name: Validate Hermes tools Phase D4 requires file, web, and gateway
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_tools_file_enabled | default(false) | bool
          - private_pi5_hermes_tools_web_enabled | default(false) | bool
          - private_pi5_hermes_tools_gateway_enabled | default(false) | bool
        fail_msg: >-
          Phase D4 (private_pi5_hermes_tools_browser_enabled: true) requires
          private_pi5_hermes_tools_file_enabled, private_pi5_hermes_tools_web_enabled,
          and private_pi5_hermes_tools_gateway_enabled on the tools profile.
      when:
        - private_pi5_hermes_tools_profile_enabled | default(false) | bool
        - private_pi5_hermes_tools_browser_enabled | default(false) | bool

    - name: Validate Hermes Phase D5 bridge requires D4 tools profile
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_tools_profile_enabled | default(false) | bool
          - private_pi5_hermes_tools_file_enabled | default(false) | bool
          - private_pi5_hermes_tools_web_enabled | default(false) | bool
          - private_pi5_hermes_tools_browser_enabled | default(false) | bool
          - private_pi5_hermes_tools_gateway_enabled | default(false) | bool
          - private_pi5_hermes_gateway_enabled | default(false) | bool
        fail_msg: >-
          Phase D5 (private_pi5_hermes_discord_tools_bridge_enabled: true) requires
          D4 tools flags, tools gateway, and chat gateway (Discord) enabled.
      when: private_pi5_hermes_discord_tools_bridge_enabled | default(false) | bool

    - name: Validate Hermes Discord task bridge requires DGX runtime control token
      ansible.builtin.assert:
        that:
          - (private_pi5_dgx_runtime_control_token | default('') | trim) | length > 0
        fail_msg: >-
          Discord /task bridge requires private_pi5_dgx_runtime_control_token for
          on-demand DGX model profile start (POST /start with modelProfileId) before
          tools profile execution.
      when: private_pi5_hermes_discord_tools_bridge_enabled | default(false) | bool

    - name: Resolve Hermes novel DGX token from inventory
      ansible.builtin.set_fact:
        private_pi5_hermes_novel_dgx_llm_token_resolved: >-
          {{ hostvars[inventory_hostname].get('private_pi5_hermes_novel_dgx_llm_token', '') | trim }}
        private_pi5_hermes_novel_effective_dgx_llm_token: >-
          {{
            hostvars[inventory_hostname].get('private_pi5_hermes_novel_dgx_llm_token', '') | trim
            if (hostvars[inventory_hostname].get('private_pi5_hermes_novel_dgx_llm_token', '') | trim) | length > 0
            else private_pi5_hermes_chat_dgx_llm_token
          }}
      when: private_pi5_hermes_novel_profile_enabled | default(false) | bool

    - name: Validate Hermes novel profile requires runtime control token
      ansible.builtin.assert:
        that:
          - (private_pi5_dgx_runtime_control_token | default('') | trim) | length > 0
        fail_msg: >-
          Novel profile requires private_pi5_dgx_runtime_control_token for on-demand
          DGX model profile start (POST /start with modelProfileId).
      when: private_pi5_hermes_novel_profile_enabled | default(false) | bool

    - name: Validate Hermes Discord novel bridge prerequisites
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_novel_profile_enabled | default(false) | bool
          - private_pi5_hermes_gateway_enabled | default(false) | bool
        fail_msg: >-
          Discord novel bridge (private_pi5_hermes_discord_novel_bridge_enabled: true)
          requires novel profile and chat gateway (Discord) enabled.
      when: private_pi5_hermes_discord_novel_bridge_enabled | default(false) | bool

    - name: Validate Hermes daily pilot prerequisites
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_gateway_enabled | default(false) | bool
        fail_msg: >-
          D6-pre daily pilot (private_pi5_hermes_daily_pilot_enabled: true)
          requires chat gateway (Discord) enabled.
      when: private_pi5_hermes_daily_pilot_enabled | default(false) | bool

    - name: Validate Hermes Life Pilot prerequisites
      ansible.builtin.assert:
        that:
          - private_pi5_hermes_gateway_enabled | default(false) | bool
        fail_msg: >-
          D6-life pilot (private_pi5_hermes_life_pilot_enabled: true)
          requires chat gateway (Discord) enabled.
      when: private_pi5_hermes_life_pilot_enabled | default(false) | bool

    - name: Validate Hermes prerequisites
      ansible.builtin.assert:
        that:
          - (private_pi5_hermes_chat_dgx_llm_token | default('') | trim) | length > 0
        fail_msg: >-
          Set private_pi5_hermes_chat_dgx_llm_token or private_pi5_dgx_llm_shared_token
          in the local inventory fragment.

  tasks:
    - name: Install Hermes user and CLI
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/install.yml"

    - name: Configure UFW for private Pi5 Hermes host
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/ufw.yml"

    - name: Deploy Hermes chat profile
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/deploy-chat-profile.yml"

    - name: Deploy Hermes Discord gateway plugins (task + novel bridges)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/deploy-discord-task-bridge.yml"
      when: >
        private_pi5_hermes_discord_tools_bridge_enabled | default(false) | bool or
        private_pi5_hermes_discord_novel_bridge_enabled | default(false) | bool or
        private_pi5_hermes_daily_pilot_enabled | default(false) | bool or
        private_pi5_hermes_life_pilot_enabled | default(false) | bool

    - name: Sync Hermes Discord daily and life slash commands
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/sync-discord-daily-command.yml"
      when: (private_pi5_hermes_discord_bot_token | default('') | trim) | length > 0

    - name: Configure Hermes Life Pilot reminder scheduler
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/life-reminder-scheduler.yml"

    - name: Configure Hermes Life Pilot proactive loop
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/life-proactive-loop.yml"

    - name: Deploy Hermes tools profile skeleton
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/deploy-tools-profile.yml"
      when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

    - name: Deploy Hermes novel profile skeleton
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/deploy-novel-profile.yml"
      when: private_pi5_hermes_novel_profile_enabled | default(false) | bool

    - name: Install Hermes browser tooling (Phase D4)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/install-browser-tooling.yml"
      when:
        - private_pi5_hermes_tools_profile_enabled | default(false) | bool
        - private_pi5_hermes_tools_browser_enabled | default(false) | bool

    - name: Configure Hermes DGX keep-warm
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/keep-warm.yml"

    - name: Patch Hermes gateway plugin discovery (Phase D5 / D5.1)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/deploy-hermes-gateway-plugin-discover-fix.yml"
      when: private_pi5_hermes_gateway_enabled | default(false) | bool

    - name: Restart Hermes chat gateway after deploy
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/restart-chat-gateway.yml"

    - name: Verify Hermes deployment
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify.yml"

    - name: Verify Hermes tools profile deployment
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-tools-profile.yml"
      when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

    - name: Verify Hermes Discord task bridge (Phase D5)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-discord-task-bridge.yml"
      when: private_pi5_hermes_discord_tools_bridge_enabled | default(false) | bool

    - name: Verify Hermes Discord approval relay (Phase D5.1)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-discord-approval-relay.yml"
      when: private_pi5_hermes_discord_tools_bridge_enabled | default(false) | bool

    - name: Verify Hermes Discord daily pilot (D6-pre)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-discord-daily-pilot.yml"
      when: private_pi5_hermes_daily_pilot_enabled | default(false) | bool

    - name: Verify Hermes Discord Life Pilot (D6-life)
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-discord-life-pilot.yml"
      when: private_pi5_hermes_life_pilot_enabled | default(false) | bool

    - name: Verify Hermes novel profile deployment
      ansible.builtin.include_tasks: "../tasks/private-pi5-hermes/verify-novel-profile.yml"
      when: private_pi5_hermes_novel_profile_enabled | default(false) | bool

    - name: Summarize Hermes deployment
      ansible.builtin.debug:
        msg:
          - "hermes_user={{ private_pi5_hermes_user }}"
          - "hermes_bin={{ private_pi5_hermes_bin }}"
          - "dgx_health={{ private_pi5_hermes_dgx_health.content | default('n/a') | trim }}"
          - "gateway_enabled={{ private_pi5_hermes_gateway_enabled }}"
          - "tools_profile_enabled={{ private_pi5_hermes_tools_profile_enabled | default(false) }}"
          - "tools_file_enabled={{ private_pi5_hermes_tools_file_enabled | default(false) }}"
          - "tools_web_enabled={{ private_pi5_hermes_tools_web_enabled | default(false) }}"
          - "tools_browser_enabled={{ private_pi5_hermes_tools_browser_enabled | default(false) }}"
          - "tools_gateway_enabled={{ private_pi5_hermes_tools_gateway_enabled | default(false) }}"
          - "discord_tools_bridge_enabled={{ private_pi5_hermes_discord_tools_bridge_enabled | default(false) }}"
          - "novel_profile_enabled={{ private_pi5_hermes_novel_profile_enabled | default(false) }}"
          - "discord_novel_bridge_enabled={{ private_pi5_hermes_discord_novel_bridge_enabled | default(false) }}"
          - "daily_pilot_enabled={{ private_pi5_hermes_daily_pilot_enabled | default(false) }}"
          - "life_pilot_enabled={{ private_pi5_hermes_life_pilot_enabled | default(false) }}"
          - "life_reminder_scheduler_active={{ private_pi5_hermes_life_reminder_scheduler_active }}"
          - "life_proactive_loop_active={{ private_pi5_hermes_life_proactive_loop_active }}"
          - "life_followup_loop_active={{ private_pi5_hermes_life_followup_loop_active }}"
          - "life_discord_ui_relay_active={{ private_pi5_hermes_life_discord_ui_relay_active }}"
          - "dgx_keep_warm_active={{ private_pi5_hermes_dgx_keep_warm_active }}"
          - "discord_configured={{ (private_pi5_hermes_discord_bot_token | default('') | trim) | length > 0 }}"

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
