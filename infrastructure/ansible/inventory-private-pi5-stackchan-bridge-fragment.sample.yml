# 私用 Pi5 StackChan bridge 用インベントリ断片（サンプル・コミット可）
#
# 使い方:
#   1. コピー:
#        cp infrastructure/ansible/inventory-private-pi5-stackchan-bridge-fragment.sample.yml \
#           infrastructure/ansible/inventory-private-pi5-stackchan-bridge-fragment.yml
#   2. 接続先と secret をローカル断片へ設定
#   3. リポジトリ直下で:
#        ./scripts/private-pi5-stackchan-bridge/deploy-private-pi5-stackchan-bridge.sh
#
# 参照: docs/runbooks/private-pi5-stackchan-bridge-deploy.md

all:
  hosts:
    private-pi5-stackchan-bridge:
      ansible_host: "100.x.x.x"
      ansible_user: "raspi5-private"
      ansible_python_interpreter: /usr/bin/python3
      ansible_command_timeout: 600
      ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      network_mode: "tailscale"
      tailscale_enabled: true

      # 鍵ログインや NOPASSWD sudo が未整備ならローカル断片のみに設定する。
      # ansible_password: "replace-me"
      # ansible_become_password: "replace-me"

      private_pi5_bridge_user: "raspi5-private"
      private_pi5_bridge_host: "0.0.0.0"
      private_pi5_bridge_port: 18080
      # 任意: uv / Python パスを変更したい場合のみ上書き
      # private_pi5_bridge_python: "/usr/bin/python3"
      # private_pi5_bridge_uv_path: "/home/raspi5-private/.local/bin/uv"
      # 任意: StackChan ファームが旧 bridge IP を見ている間の互換 alias
      # private_pi5_stackchan_compat_ip: "192.168.128.112"
      # private_pi5_stackchan_compat_interface: "wlan0"
      # private_pi5_stackchan_compat_prefix: 24

      private_pi5_dgx_base_url: "http://100.118.82.72:38081"
      private_pi5_dgx_model: "system-prod-primary"
      private_pi5_dgx_llm_shared_token: "replace-me"
      private_pi5_dgx_runtime_auto_start: false
      # Hermes keep-warm（/start）にも必要。未設定時は timer 無効。
      private_pi5_dgx_runtime_control_token: ""
      # chat /tools の通常 DGX profile（/novel 後の復帰・/task 前の ensure に使用）
      # private_pi5_hermes_dgx_default_model_profile_id: "business_qwen36_27b_nvfp4"
      private_pi5_dgx_runtime_start_path: "/start"
      private_pi5_dgx_runtime_ready_path: "/v1/models"
      private_pi5_dgx_runtime_ready_timeout_sec: 600
      private_pi5_dgx_runtime_ready_poll_sec: 1

      # 任意: StackChan -> bridge の簡易認証
      private_pi5_stackchan_token: ""

      # 任意: STT 等大きめ POST の本文読取に上限秒（0=無制限・既定）
      # private_pi5_stackchan_request_read_timeout_sec: 60

      private_pi5_upstream_timeout_sec: 45

      # Low-latency chat defaults for StackChan voice interaction
      private_pi5_stackchan_chat_default_max_tokens: 160
      private_pi5_stackchan_chat_max_tokens_cap: 192
      private_pi5_stackchan_chat_max_messages: 8
      private_pi5_stackchan_chat_allow_thinking: false

      # Optional read-only Home Assistant context for LLM replies.
      # Keep the token in the local non-tracked fragment only.
      private_pi5_home_assistant_context_enabled: false
      private_pi5_home_assistant_base_url: "http://homeassistant.local:8123"
      private_pi5_home_assistant_token: ""
      private_pi5_home_assistant_context_entities: []
      private_pi5_home_assistant_timeout_sec: 5

      # STT routing (default: DGX/OpenAI-compatible transcription endpoint)
      private_pi5_stt_provider: "upstream-openai"
      private_pi5_stt_upstream_base_url: "http://100.118.82.72:38081"
      private_pi5_stt_upstream_path: "/v1/audio/transcriptions"
      private_pi5_stt_upstream_auth_mode: "x-llm-token"
      private_pi5_stt_upstream_token: "replace-me"
      private_pi5_stt_upstream_model: "whisper-1"
      private_pi5_stt_upstream_timeout_sec: 60

      # --- Hermes Agent（任意・Discord 雑談）---
      # デプロイ: ./scripts/private-pi5-hermes/deploy-private-pi5-hermes.sh
      # 正本: docs/runbooks/private-pi5-hermes-deploy.md
      # private_pi5_hermes_gateway_enabled: false
      # private_pi5_hermes_dgx_keep_warm_enabled: true
      # private_pi5_hermes_dgx_keep_warm_interval_min: 10
      # private_pi5_hermes_max_tokens: 128
      # トークン分離（Phase D0）: 省略時は private_pi5_dgx_llm_shared_token を chat も使用
      # private_pi5_hermes_chat_dgx_llm_token: ""
      # private_pi5_hermes_tools_dgx_llm_token: ""
      # DGX gateway に LLM_SHARED_ADDITIONAL_TOKENS として登録すること
      # Phase D1: tools profile skeleton (gateway stays off)
      # private_pi5_hermes_tools_profile_enabled: true
      # private_pi5_hermes_tools_dgx_llm_token: "<dedicated-tools-token>"
      # private_pi5_hermes_tools_gateway_enabled: false
      # Phase D2: file toolset only (workspace bind + tools gateway on)
      # private_pi5_hermes_tools_file_enabled: true
      # private_pi5_hermes_tools_gateway_enabled: true
      # Phase D3: file + web (website_blocklist synced from boundary-policy.tools.yaml)
      # private_pi5_hermes_tools_web_enabled: true
      # (requires file_enabled + gateway_enabled above)
      # Phase D4: file + web + browser (local agent-browser; conditional install-browser-tooling)
      # private_pi5_hermes_tools_browser_enabled: true
      # (requires file + web + gateway above)
      # private_pi5_hermes_browser_agent_args: "--no-sandbox,--disable-dev-shm-usage"
      # Phase D5: Discord /task → tools profile (requires D4 flags + gateway_enabled)
      # private_pi5_hermes_discord_tools_bridge_enabled: true
      # D6-pre: Discord /daily → Markdown-only daily handoff (requires gateway_enabled)
      # private_pi5_hermes_daily_pilot_enabled: true
      # D6/D7-life: Discord /memo /digest /remind /recommend + reminder timer
      # private_pi5_hermes_life_pilot_enabled: true
      # private_pi5_hermes_life_reminder_scheduler_enabled: true
      # private_pi5_hermes_life_reminder_interval_min: 1
      # D8-life: proactive check-ins (morning enabled by default with Life Pilot + token; evening opt-in)
      # private_pi5_hermes_life_proactive_loop_enabled: true
      # private_pi5_hermes_life_proactive_morning_enabled: true
      # private_pi5_hermes_life_proactive_evening_enabled: false
      # D9-life: Discord button/free-text UI relay for proactive check-ins
      # private_pi5_hermes_life_discord_ui_relay_enabled: true
      # private_pi5_hermes_life_proactive_morning_time: "07:30:00"
      # private_pi5_hermes_life_proactive_evening_time: "21:30:00"
      # Set true only when operator diagnostics should be visible in Discord messages.
      # private_pi5_hermes_life_discord_debug_lines_enabled: false
      # Optional fixed Discord target; otherwise Hermes uses the last Life Pilot channel context.
      # private_pi5_hermes_life_proactive_channel_id: ""
      # D12-life: Obsidian inbox input. Sync Android
      # Documents/Obsidian/HermesLife to this path with Syncthing receive-only on Pi5.
      # private_pi5_hermes_life_obsidian_vault_dir: "/home/hermes/.hermes-life/obsidian/HermesLife"
      # D13-life: Discord shared inbox. Link/image shares are captured automatically.
      # Optional: set channel IDs to capture every non-command message in dedicated inbox channels.
      # private_pi5_hermes_life_discord_inbox_enabled: true
      # private_pi5_hermes_life_discord_inbox_channel_ids: ""
      # private_pi5_hermes_life_discord_inbox_capture_all: false
      # D19-life: Daily Interest Digest. Enables /interest, deploys skill,
      # and safely unlocks Hermes memory/skills/cronjob while keeping terminal/file/git/deploy disabled.
      # private_pi5_hermes_life_interest_digest_enabled: true
      # private_pi5_hermes_life_interest_digest_memory_enabled: true
      # private_pi5_hermes_life_interest_digest_time: "08:10:00"
      # Optional fixed Discord target; otherwise Hermes uses the last Life Pilot channel context.
      # private_pi5_hermes_life_interest_digest_channel_id: ""
      # Novel profile: creative writing via /novel (on-demand DGX qwen36_35b_uncensored)
      # private_pi5_hermes_novel_profile_enabled: true
      # private_pi5_hermes_discord_novel_bridge_enabled: true
      # private_pi5_hermes_novel_max_tokens: 2048
      # private_pi5_hermes_novel_runtime_ready_timeout_sec: 900
      # optional dedicated novel DGX token (defaults to chat token)
      # private_pi5_hermes_novel_dgx_llm_token: ""
      # private_pi5_hermes_ssh_ufw_tailscale_only: false
      # private_pi5_hermes_system_prompt: |
      #   （fragment で agent.system_prompt を上書きする場合）
      # private_pi5_hermes_discord_bot_token: ""
      # private_pi5_hermes_discord_allowed_users: ""

      # For private_pi5_stt_provider="faster-whisper-local"
      private_pi5_stt_local_model: "small"
      private_pi5_stt_local_device: "cpu"
      private_pi5_stt_local_compute_type: "int8"
      private_pi5_stt_local_language_default: "ja"
      private_pi5_stt_local_vad_filter: true
      private_pi5_stt_local_retry_without_vad: true
      private_pi5_stt_local_fallback_to_upstream_on_empty: false
