[defaults]
inventory = inventory.yml
remote_user = pi
host_key_checking = False
retry_files_enabled = False
forks = 5
transport = smart
interpreter_python = auto
# `community.general.yaml` was removed in community.general 12.  Keep the
# human-readable YAML output with Ansible's built-in callback instead.
stdout_callback = default
callback_result_format = yaml
roles_path = ./roles
vault_password_file = .vault-pass

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
