all:
  children:
    server:
      hosts:
        raspberrypi5:
          ansible_host: "{{ server_ip }}"
          ansible_user: denkon5sd02
          ansible_connection: local  # ローカル実行のため
          ansible_python_interpreter: /usr/bin/python3
          ansible_command_timeout: 900
          tailscale_enabled: true
          # キオスクお問い合わせ（Slack通知）
          # NOTE: vaultで管理し、Ansibleで /opt/RaspberryPiSystem_002/infrastructure/docker/.env に反映する
          slack_kiosk_support_webhook_url: "{{ vault_slack_kiosk_support_webhook_url | default('') }}"
          # Dropbox OAuth 2.0設定
          # NOTE: vaultで管理し、Ansibleで /opt/RaspberryPiSystem_002/infrastructure/docker/.env に反映する
          dropbox_app_key: "{{ vault_dropbox_app_key | default('') }}"
          dropbox_app_secret: "{{ vault_dropbox_app_secret | default('') }}"
          dropbox_refresh_token: "{{ vault_dropbox_refresh_token | default('') }}"
          dropbox_access_token: "{{ vault_dropbox_access_token | default('') }}"
          # Alerts Dispatcher設定
          # NOTE: vaultで管理し、Ansibleで /opt/RaspberryPiSystem_002/infrastructure/docker/.env に反映する
          alerts_dispatcher_enabled: "{{ vault_alerts_dispatcher_enabled | default('true') }}"
          # Alerts Dispatcher Slack Webhooks (route-based)
          # NOTE: vaultで管理し、Ansibleで /opt/RaspberryPiSystem_002/infrastructure/docker/.env に反映する
          # 未設定（空文字）の場合は、そのrouteKeyのアラートはSlackに送信されません（ファイル生成のみ）
          alerts_slack_webhook_deploy: "{{ vault_alerts_slack_webhook_deploy | default('') }}"
          alerts_slack_webhook_ops: "{{ vault_alerts_slack_webhook_ops | default('') }}"
          alerts_slack_webhook_security: "{{ vault_alerts_slack_webhook_security | default('') }}"
          alerts_slack_webhook_support: "{{ vault_alerts_slack_webhook_support | default('') }}"
          # API環境変数
          api_database_url: "postgresql://postgres:postgres@db:5432/borrow_return"
          api_jwt_access_secret: "{{ vault_api_jwt_access_secret | default('change-me-in-production') }}"
          api_jwt_refresh_secret: "{{ vault_api_jwt_refresh_secret | default('change-me-in-production') }}"
          api_local_llm_base_url: "http://100.118.82.72:38081"
          api_local_llm_shared_token: "{{ vault_api_local_llm_shared_token | default('') }}"
          api_local_llm_model: "system-prod-primary"
          api_local_llm_timeout_ms: "60000"
          # llama-server オンデマンド（DGX system-prod の /start /stop）
          # 制御トークンは vault_api_local_llm_runtime_control_token で分離可。未設定なら API は LOCAL_LLM_SHARED_TOKEN を流用
          api_local_llm_runtime_mode: "on_demand"
          api_local_llm_runtime_control_start_url: "http://100.118.82.72:38081/start"
          api_local_llm_runtime_control_stop_url: "http://100.118.82.72:38081/stop"
          api_local_llm_runtime_control_token: "{{ vault_api_local_llm_runtime_control_token | default('') }}"
          api_local_llm_runtime_health_base_url: ""
          # blue(vLLM+NVFP4) は cold start が 10分超になることがあるため ready timeout を延長
          api_local_llm_runtime_ready_timeout_ms: "900000"
          inference_providers_json: >-
            [{"id":"dgx_primary","baseUrl":"http://100.118.82.72:38081","sharedToken":"{{ vault_api_local_llm_shared_token | default('') }}","defaultModel":"system-prod-primary","timeoutMs":60000,"runtimeControl":{"mode":"on_demand","startUrl":"http://100.118.82.72:38081/start","stopUrl":"http://100.118.82.72:38081/stop","controlToken":"{{ vault_api_local_llm_runtime_control_token | default('') }}","healthBaseUrl":"http://100.118.82.72:38081"}}]
          inference_admin_provider_id: "dgx_primary"
          inference_admin_model: "system-prod-primary"
          inference_document_summary_provider_id: "dgx_primary"
          inference_document_summary_model: "system-prod-primary"
          inference_photo_label_provider_id: "dgx_primary"
          inference_photo_label_model: "system-prod-primary"
          kiosk_document_summary_inference_enabled: "true"
          # 持出カードグリッドは Pi5 API 側で HTML/CSS → Playwright 描画を有効化する
          api_signage_loan_grid_engine: "playwright_html"
          api_signage_playwright_device_scale_factor: "1"
          # 写真持出 GOOD 類似ギャラリー（埋め込み）。vault で true + URL/model を設定して有効化
          photo_tool_embedding_enabled: "{{ vault_photo_tool_embedding_enabled | default('false') }}"
          photo_tool_embedding_url: "{{ vault_photo_tool_embedding_url | default('') }}"
          photo_tool_embedding_api_key: "{{ vault_photo_tool_embedding_api_key | default('') }}"
          photo_tool_embedding_model_id: "{{ vault_photo_tool_embedding_model_id | default('') }}"
          photo_tool_embedding_timeout_ms: "{{ vault_photo_tool_embedding_timeout_ms | default('30000') }}"
          photo_tool_embedding_dimension: "{{ vault_photo_tool_embedding_dimension | default('512') }}"
          photo_tool_similarity_max_candidates: "{{ vault_photo_tool_similarity_max_candidates | default('5') }}"
          photo_tool_similarity_max_cosine_distance: "{{ vault_photo_tool_similarity_max_cosine_distance | default('0.22') }}"
          photo_tool_similarity_pipeline_version: "{{ vault_photo_tool_similarity_pipeline_version | default('vision_jpeg_v1') }}"
          photo_tool_label_assist_shadow_enabled: "{{ vault_photo_tool_label_assist_shadow_enabled | default('false') }}"
          photo_tool_label_assist_max_cosine_distance: "{{ vault_photo_tool_label_assist_max_cosine_distance | default('0.14') }}"
          photo_tool_label_assist_min_neighbors: "{{ vault_photo_tool_label_assist_min_neighbors | default('2') }}"
          photo_tool_label_assist_convergence_top_k: "{{ vault_photo_tool_label_assist_convergence_top_k | default('2') }}"
          photo_tool_label_assist_query_neighbor_limit: "{{ vault_photo_tool_label_assist_query_neighbor_limit | default('40') }}"
          photo_tool_label_assist_prompt_max_labels: "{{ vault_photo_tool_label_assist_prompt_max_labels | default('3') }}"
          # VLM アクティブ補助（2回目推論の本番保存。vault で true にし server ロールで docker .env 再生成後、api に反映）
          photo_tool_label_assist_active_enabled: "{{ vault_photo_tool_label_assist_active_enabled | default('false') }}"
          photo_tool_label_assist_active_min_gallery_rows: "{{ vault_photo_tool_label_assist_active_min_gallery_rows | default('5') }}"
          # Web環境変数
          web_api_base_url: "/api"
          web_ws_base_url: "/ws"
          web_agent_ws_url: "{{ websocket_agent_url }}"
          # 実績基準時間: actor locationに特徴量が無い場合はshared-global-rankへフォールバック
          actual_hours_shared_fallback_enabled: "true"
          # kiosk増台に備え、kiosk端末では localhost のNFC Agentを優先（失敗時は従来経路へフォールバック）
          web_agent_ws_mode: "local"
          # 納期管理キオスク新レイアウト（V2）有効化（実機検証後 true に切り替え）
          web_kiosk_due_mgmt_layout_v2_enabled: "true"
          # Docker Compose環境変数はgroup_vars/all.ymlで定義済み
          # status-agent設定
          status_agent_client_id: raspberrypi5-server
          status_agent_location: "ラズパイ5 - サーバー"
          status_agent_tls_skip_verify: "1"
          status_agent_client_key: "{{ vault_status_agent_client_key | default('client-key-raspberrypi5-server') }}"
          status_agent_api_base_url: "{{ api_base_url }}"
    clients:
      # clientsは子グループ（kiosk/signage）に分割して管理する。
      # 目的: 段階展開（カナリア→全台）と、Pi4並行 / Pi3単独運用を安全に実現する。
      children:
        kiosk:
          hosts:
            raspberrypi4:
              ansible_host: "{{ kiosk_ip }}"
              ansible_user: tools03
              kiosk_browser_engine: "firefox"
              kiosk_browser_mode: "app-like"
              # IBus 単一オーナー化（KB-287: 日本語入力不安定の解消。robodrill01 で有効だった設定を kensakuMain にも適用）
              ibus_owner_mode: "single-owner"
              ibus_disable_competing_autostart: true
              tailscale_enabled: true
              ansible_command_timeout: 600
              status_agent_client_id: raspberrypi4-kiosk1
              status_agent_client_key: "{{ vault_status_agent_client_key | default('client-key-raspberrypi4-kiosk1') }}"
              status_agent_location: "第2工場 - kensakuMain"
              kiosk_url: "{{ kiosk_full_url }}?clientKey={{ status_agent_client_key }}"
              # kiosk-browser.serviceを管理対象にする
              manage_kiosk_browser: true
              # このホストで再起動するサービスリスト
              services_to_restart:
                - kiosk-browser.service
                - status-agent.service
                - status-agent.timer
              sudo_nopasswd_commands:
                - /usr/bin/systemctl start kiosk-browser.service
                - /usr/bin/systemctl stop kiosk-browser.service
                - /usr/bin/systemctl restart kiosk-browser.service
                - /usr/bin/systemctl reboot
                - /usr/bin/systemctl poweroff
                - /usr/bin/systemctl start status-agent.service
                - /usr/bin/systemctl stop status-agent.service
                - /usr/bin/systemctl restart status-agent.service
                - /usr/bin/systemctl start status-agent.timer
                - /usr/bin/systemctl stop status-agent.timer
                - /usr/bin/systemctl restart status-agent.timer
              # NFCエージェント環境変数
              nfc_agent_api_base_url: "{{ api_base_url }}"
              nfc_agent_client_id: "raspberrypi4-kiosk1"
              nfc_agent_client_secret: "{{ vault_nfc_agent_client_secret | default('client-key-raspberrypi4-kiosk1') }}"
            raspi4-robodrill01:
              # RoboDrill01 キオスク（Pi4増設）
              # NOTE: group_vars/all.yml の local_network / tailscale_network に raspi4_robodrill01_ip を追加済み
              ansible_host: "{{ current_network.raspi4_robodrill01_ip | default(local_network.raspi4_robodrill01_ip) }}"
              ansible_user: tools04
              kiosk_browser_engine: "firefox"
              kiosk_browser_mode: "app-like"
              # IBus 単一オーナー化は robodrill 先行で段階導入する
              ibus_owner_mode: "single-owner"
              ibus_disable_competing_autostart: true
              tailscale_enabled: true
              ansible_command_timeout: 600
              status_agent_client_id: raspi4-robodrill01-kiosk1
              # 登録スクリプト（scripts/register-clients.sh）でそのまま使えるよう、キーは文字列で固定する
              status_agent_client_key: "client-key-raspi4-robodrill01-kiosk1"
              status_agent_location: "第2工場 - RoboDrill01"
              kiosk_url: "{{ kiosk_full_url }}?clientKey={{ status_agent_client_key }}"
              manage_kiosk_browser: true
              services_to_restart:
                - kiosk-browser.service
                - status-agent.service
                - status-agent.timer
              sudo_nopasswd_commands:
                - /usr/bin/systemctl start kiosk-browser.service
                - /usr/bin/systemctl stop kiosk-browser.service
                - /usr/bin/systemctl restart kiosk-browser.service
                - /usr/bin/systemctl reboot
                - /usr/bin/systemctl poweroff
                - /usr/bin/systemctl start status-agent.service
                - /usr/bin/systemctl stop status-agent.service
                - /usr/bin/systemctl restart status-agent.service
                - /usr/bin/systemctl start status-agent.timer
                - /usr/bin/systemctl stop status-agent.timer
                - /usr/bin/systemctl restart status-agent.timer
              nfc_agent_api_base_url: "{{ api_base_url }}"
              nfc_agent_client_id: "raspi4-robodrill01-kiosk1"
              nfc_agent_client_secret: "client-key-raspi4-robodrill01-kiosk1"
            raspi4-fjv60-80:
              # FJV60/80 キオスク（Pi4 3台目）
              # NOTE: group_vars/all.yml の local_network / tailscale_network に raspi4_fjv60_80_ip を定義
              ansible_host: "{{ current_network.raspi4_fjv60_80_ip | default(local_network.raspi4_fjv60_80_ip) }}"
              ansible_user: raspi4-fjv60-80
              kiosk_browser_engine: "firefox"
              kiosk_browser_mode: "app-like"
              ibus_owner_mode: "single-owner"
              ibus_disable_competing_autostart: true
              tailscale_enabled: true
              ansible_command_timeout: 600
              status_agent_client_id: raspi4-fjv60-80-kiosk1
              status_agent_client_key: "client-key-raspi4-fjv60-80-kiosk1"
              status_agent_location: "第2工場 - FJV60/80"
              kiosk_url: "{{ kiosk_full_url }}?clientKey={{ status_agent_client_key }}"
              manage_kiosk_browser: true
              services_to_restart:
                - kiosk-browser.service
                - status-agent.service
                - status-agent.timer
              sudo_nopasswd_commands:
                - /usr/bin/systemctl start kiosk-browser.service
                - /usr/bin/systemctl stop kiosk-browser.service
                - /usr/bin/systemctl restart kiosk-browser.service
                - /usr/bin/systemctl reboot
                - /usr/bin/systemctl poweroff
                - /usr/bin/systemctl start status-agent.service
                - /usr/bin/systemctl stop status-agent.service
                - /usr/bin/systemctl restart status-agent.service
                - /usr/bin/systemctl start status-agent.timer
                - /usr/bin/systemctl stop status-agent.timer
                - /usr/bin/systemctl restart status-agent.timer
              nfc_agent_api_base_url: "{{ api_base_url }}"
              nfc_agent_client_id: "raspi4-fjv60-80-kiosk1"
              nfc_agent_client_secret: "client-key-raspi4-fjv60-80-kiosk1"
            raspi4-kensaku-stonebase01:
              # Kensaku StoneBase01 キオスク（Pi4 4台目）
              # NOTE: Pi5 から LAN 直が無い場合は新 Pi4 で Tailscale 参加後、group_vars/all.yml の tailscale_network に 100.x を追加
              ansible_host: "{{ current_network.raspi4_kensaku_stonebase01_ip | default(local_network.raspi4_kensaku_stonebase01_ip) }}"
              ansible_user: raspi4-kensaku-stonebase01
              kiosk_browser_engine: "firefox"
              kiosk_browser_mode: "app-like"
              ibus_owner_mode: "single-owner"
              ibus_disable_competing_autostart: true
              tailscale_enabled: true
              ansible_command_timeout: 600
              status_agent_client_id: raspi4-kensaku-stonebase01-kiosk1
              status_agent_client_key: "client-key-raspi4-kensaku-stonebase01-kiosk1"
              status_agent_location: "第2工場 - StoneBase01"
              kiosk_url: "{{ kiosk_full_url }}?clientKey={{ status_agent_client_key }}"
              manage_kiosk_browser: true
              services_to_restart:
                - kiosk-browser.service
                - status-agent.service
                - status-agent.timer
              sudo_nopasswd_commands:
                - /usr/bin/systemctl start kiosk-browser.service
                - /usr/bin/systemctl stop kiosk-browser.service
                - /usr/bin/systemctl restart kiosk-browser.service
                - /usr/bin/systemctl reboot
                - /usr/bin/systemctl poweroff
                - /usr/bin/systemctl start status-agent.service
                - /usr/bin/systemctl stop status-agent.service
                - /usr/bin/systemctl restart status-agent.service
                - /usr/bin/systemctl start status-agent.timer
                - /usr/bin/systemctl stop status-agent.timer
                - /usr/bin/systemctl restart status-agent.timer
              nfc_agent_api_base_url: "{{ api_base_url }}"
              nfc_agent_client_id: "raspi4-kensaku-stonebase01-kiosk1"
              nfc_agent_client_secret: "client-key-raspi4-kensaku-stonebase01-kiosk1"
              # USB シリアル(CDC ACM)バーコードリーダー → localhost WebSocket（profile=barcode）
              barcode_agent_enabled: true
              barcode_agent_serial_device: "/dev/ttyACM0"
              barcode_agent_serial_baud: 9600
              barcode_agent_rest_port: 7072
        signage:
          hosts:
            raspberrypi3:
              ansible_host: "{{ signage_ip }}"
              ansible_user: signageras3
              # Pi3 は負荷時に sudo 応答が遅れ、既定の become 待ちで UNREACHABLE になり得る
              ansible_become_timeout: 120
              tailscale_enabled: true
              ansible_command_timeout: 1800
              # デバイスタイプ: Pi3（メモリ416MB、lightdm停止が必要）
              device_type: "pi3"
              status_agent_client_id: raspberrypi3-signage1
              status_agent_client_key: "{{ vault_status_agent_client_key | default('client-key-raspberrypi3-signage1') }}"
              status_agent_location: "第2工場 - signageMakoRoom"
              signage_server_url: "{{ server_base_url }}"
              signage_client_key: "{{ vault_signage_client_key | default('client-key-raspberrypi3-signage1') }}"
              # signage-lite.serviceを管理対象にする
              manage_signage_lite: true
              # このホストで再起動するサービスリスト
              services_to_restart:
                - signage-lite.service
                - signage-lite-update.timer
                - status-agent.service
                - status-agent.timer
              sudo_nopasswd_commands:
                - /usr/bin/systemctl start signage-lite.service
                - /usr/bin/systemctl stop signage-lite.service
                - /usr/bin/systemctl restart signage-lite.service
                - /usr/bin/systemctl start signage-lite-update.timer
                - /usr/bin/systemctl stop signage-lite-update.timer
                - /usr/bin/systemctl restart signage-lite-update.timer
                - /usr/bin/systemctl start status-agent.service
                - /usr/bin/systemctl stop status-agent.service
                - /usr/bin/systemctl restart status-agent.service
                - /usr/bin/systemctl start status-agent.timer
                - /usr/bin/systemctl stop status-agent.timer
                - /usr/bin/systemctl restart status-agent.timer
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        ansible_python_interpreter: /usr/bin/python3
        status_agent_api_base_url: "{{ api_base_url }}"
        status_agent_tls_skip_verify: "1"

    # 段階展開用グループ（初期は各1台）
    # NOTE: 台数増加時はここを“カナリア1台”に固定し、ロールアウトで除外できるようにする。
    kiosk_canary:
      hosts:
        raspberrypi4:
    signage_canary:
      hosts:
        raspberrypi3:
