---
- name: restart api
  ansible.builtin.shell: |
    set -euo pipefail
    {{ repo_path }}/scripts/deploy/pi5-phase3-legacy-guard.sh
    cd {{ repo_path }}/infrastructure/docker
    docker compose -f docker-compose.server.yml up -d --force-recreate api
  args:
    executable: /bin/bash
  when: server_release_mode | default('full') == 'full'

- name: restart web
  ansible.builtin.shell: |
    set -euo pipefail
    {{ repo_path }}/scripts/deploy/pi5-phase3-legacy-guard.sh
    cd {{ repo_path }}/infrastructure/docker
    docker compose -f docker-compose.server.yml up -d --force-recreate web
  args:
    executable: /bin/bash
  when: server_release_mode | default('full') == 'full'

- name: restart docker compose services
  ansible.builtin.shell: |
    set -euo pipefail
    {{ repo_path }}/scripts/deploy/pi5-phase3-legacy-guard.sh
    cd {{ repo_path }}/infrastructure/docker
    docker compose -f docker-compose.server.yml up -d --force-recreate api
  args:
    executable: /bin/bash
  ignore_errors: true
  when: server_release_mode | default('full') == 'full'

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: restart security monitor
  ansible.builtin.systemd:
    name: security-monitor.timer
    state: restarted
    enabled: true

- name: reload ssh
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: restart wayvnc
  ansible.builtin.systemd:
    name: wayvnc
    state: restarted
