- name: Create ibus autostart directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/autostart"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  when: terminal_release_mode | default('full') == 'full'

- name: Check ibus autostart directory before release
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/.config/autostart"
  register: ibus_autostart_directory
  when: terminal_release_mode | default('full') == 'release-only'

- name: Require ibus autostart directory before release
  ansible.builtin.assert:
    that:
      - ibus_autostart_directory.stat.exists | default(false)
      - ibus_autostart_directory.stat.isdir | default(false)
    fail_msg: IBus autostart directory is missing; provision the kiosk before release.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Deploy ibus autostart desktop file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ibus-autostart.desktop.j2"
    dest: "/home/{{ ansible_user }}/.config/autostart/ibus.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Deploy ibus process owner reconcile script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ibus-process-owner.sh.j2"
    dest: "{{ ibus_process_owner_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Enable IBus process owner autostart in single-owner mode
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.config/autostart/ibus-owner.desktop"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=IBus Process Owner
      Comment=Reconcile ibus-daemon to single owner process
      Exec=bash -lc {{ ibus_process_owner_script_path }}
      Terminal=false
      Categories=System;Utility;
      X-GNOME-Autostart-enabled=true
  when: ibus_single_owner_enabled | bool

- name: Disable IBus process owner autostart in legacy mode
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/autostart/ibus-owner.desktop"
    state: absent
  when: not (ibus_single_owner_enabled | bool)

- name: Disable competing global IME autostart entries for kiosk user
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.config/autostart/{{ item }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Hidden=true
  loop: "{{ ibus_competing_autostart_entries }}"
  when:
    - ibus_single_owner_enabled | bool
    - ibus_disable_competing_autostart | bool

- name: Reconcile IBus owner process in active user session
  ansible.builtin.shell: |
    set -eu
    uid="$(id -u)"
    bus="/run/user/${uid}/bus"
    if [ ! -S "${bus}" ]; then
      echo "skip:no-user-bus"
      exit 0
    fi
    "{{ ibus_process_owner_script_path }}"
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{ ansible_user }}"
  register: ibus_owner_result
  changed_when: "'changed:ibus-owner' in ibus_owner_result.stdout"
  when:
    - terminal_release_mode | default('full') == 'full'
    - ibus_single_owner_enabled | bool
    - ibus_reconcile_on_deploy | bool

- name: Verify IBus process ownership without reconciling it
  ansible.builtin.shell: |
    set -euo pipefail
    processes="$(pgrep -x -a ibus-daemon || true)"
    desired_signature={{ ibus_desired_daemon_flag_signature | quote }}
    competing_pattern={{ ibus_competing_daemon_pattern | quote }}
    desired_count="$(printf '%s\n' "${processes}" | awk -v pattern="${desired_signature}" 'index($0, pattern) { count++ } END { print count + 0 }')"
    competing_count="$(printf '%s\n' "${processes}" | awk -v pattern="${competing_pattern}" 'index($0, pattern) { count++ } END { print count + 0 }')"
    test "${desired_count}" -eq 1
    test "${competing_count}" -eq 0
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  changed_when: false
  when:
    - terminal_release_mode | default('full') == 'release-only'
    - ibus_single_owner_enabled | bool
