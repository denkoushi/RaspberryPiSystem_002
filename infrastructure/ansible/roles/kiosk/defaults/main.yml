---
repo_path: /opt/RaspberryPiSystem_002

# Browser launch defaults (host override via inventory)
kiosk_browser_engine: "chromium"
kiosk_browser_mode: "app-like"
kiosk_browser_chromium_binary: "/usr/bin/chromium-browser"
kiosk_browser_firefox_binary: "/usr/bin/firefox-esr"
kiosk_browser_firefox_fallback_binary: "/usr/bin/firefox"
kiosk_browser_flags_common:
  - "--start-maximized"
kiosk_browser_flags_chromium:
  # Chromium 135+ で IBus/IME が壊れるリグレッション対策（issue 408309963）
  - "--ozone-platform=x11"
  # 実機からの原因調査用（localhost のみで待ち受け）
  - "--remote-debugging-address=127.0.0.1"
  - "--remote-debugging-port=9222"
  - "--noerrdialogs"
  - "--disable-session-crashed-bubble"
  - "--autoplay-policy=no-user-gesture-required"
  - "--disable-translate"
  - "--overscroll-history-navigation=0"
  - "--use-fake-ui-for-media-stream"
  - "--allow-insecure-localhost"
  - "--allow-running-insecure-content"
  - "--ignore-certificate-errors"
  # 警告バーを非表示にする（--ignore-certificate-errorsの警告も抑制）
  - "--disable-infobars"
  # テストモードとして実行（コマンドラインフラグの警告を抑制）
  - "--test-type"
  # キーリングを無効化（パスワードストアをbasicに設定）
  - "--password-store=basic"
  # アクセシビリティヒント（「tabキーで選択」など）を無効化
  - "--disable-features=AccessibilityFocusHighlight,AccessibilityFocusAlert"
kiosk_browser_flags_firefox_app_like:
  - "--new-window"
kiosk_browser_flags_firefox_kiosk:
  - "--kiosk"

# Firefox kiosk: dedicated profile + userChrome to minimize tabs/URL bar (keep app-like; do not use --kiosk).
# Separate from IBus tasks and labwc panel shortcuts for maintainability.
kiosk_firefox_minimize_chrome_enabled: true
kiosk_firefox_profile_dirname: "kiosk-system"

# IBus kiosk defaults (KB-276 follow-up)
ibus_engines_order: "['mozc-jp', 'xkb:jp::jpn']"
ibus_hotkey_triggers: "['<Control>space', 'Zenkaku_Hankaku']"
ibus_panel_show_im_name: false
ibus_panel_show: 0
ibus_engine_retry_count: 5
ibus_daemon_args: "-drx --replace --single --panel=disable --config=disable --emoji-extension=disable"
ibus_desired_daemon_flag_signature: "--replace --single --panel=disable"
ibus_competing_daemon_pattern: "--daemonize --xim"

# IBus 起動戦略:
# - legacy: 既存挙動（autostart による起動のみ）
# - single-owner: 競合プロセスを収束する reconcile を有効化
ibus_owner_mode: "legacy"
ibus_single_owner_enabled: "{{ ibus_owner_mode == 'single-owner' }}"
ibus_process_owner_script_path: "/usr/local/bin/ibus-process-owner.sh"
ibus_reconcile_on_deploy: "{{ ibus_single_owner_enabled }}"
ibus_disable_competing_autostart: false
ibus_competing_autostart_entries:
  - im-launch.desktop
