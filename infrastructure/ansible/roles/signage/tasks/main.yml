---
# Full provisioning quiesces only the unit files that already exist in
# prestage-signage-runtime.yml. This role can therefore create a fresh unit set.

- name: Stop signage runtime temporarily for release
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - signage-lite-update.timer
    - signage-lite-watchdog.timer
    - signage-daily-reboot.timer
    - signage-lite-update.service
    - signage-lite-watchdog.service
    - signage-lite.service
  when: terminal_release_mode | default('full') == 'release-only'

# NOTE:
# - Pi3/Pi4のsignage-liteは feh + shell scripts で動作するため、pnpm依存のインストールは不要。
# - 過去互換のため“オプション”として残すが、デフォルトでは実行しない（安全性/正確性のため）。
- name: Install signage-lite-client production dependencies (optional, disabled by default)
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v pnpm >/dev/null 2>&1; then
      echo "[WARN] pnpm not found. Skipping dependency install."
      exit 0
    fi
    cd {{ repo_path }} && pnpm install --filter signage-lite-client --prod
  args:
    executable: /bin/bash
  register: install_result
  changed_when: "'added' in (install_result.stdout | default('')) or 'audited' in (install_result.stdout | default(''))"
  failed_when: false
  become: false
  become_user: "{{ ansible_user }}"
  when:
    - terminal_release_mode | default('full') == 'full'
    - signage_lite_client_deps_enabled | default(false) | bool

- name: Install tmpfiles configuration for /run/signage
  ansible.builtin.template:
    src: signage-lite.tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/signage-lite.conf
    owner: root
    group: root
    mode: '0644'

- name: Install renderer for the signage maintenance screen
  ansible.builtin.apt:
    name: librsvg2-bin
    state: present
    update_cache: true
  when: terminal_release_mode | default('full') == 'full'

- name: Verify signage maintenance renderer is installed before release
  ansible.builtin.command:
    argv:
      - rsvg-convert
      - --version
  changed_when: false
  when: terminal_release_mode | default('full') == 'release-only'

- name: Deploy signage maintenance screen source
  ansible.builtin.template:
    src: signage-maintenance.svg.j2
    dest: /usr/local/share/signage-maintenance.svg
    owner: root
    group: root
    mode: '0644'

- name: Ensure /run/signage directory exists (via tmpfiles)
  ansible.builtin.command:
    cmd: systemd-tmpfiles --create /etc/tmpfiles.d/signage-lite.conf
  changed_when: true
  when: terminal_release_mode | default('full') == 'full'

- name: Check signage runtime directory before release
  ansible.builtin.stat:
    path: /run/signage
  register: signage_runtime_directory
  when: terminal_release_mode | default('full') == 'release-only'

- name: Require signage runtime directory before release
  ansible.builtin.assert:
    that:
      - signage_runtime_directory.stat.exists | default(false)
      - signage_runtime_directory.stat.isdir | default(false)
      - signage_runtime_directory.stat.pw_name | default('') == ansible_user
      - signage_runtime_directory.stat.gr_name | default('') == ansible_user
      - signage_runtime_directory.stat.mode | default('') == '0755'
    fail_msg: >-
      /run/signage must already exist with the provisioned owner, group, and
      0755 mode; run full provisioning before retrying this release.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Deploy signage-update.sh script
  ansible.builtin.template:
    src: signage-update.sh.j2
    dest: /usr/local/bin/signage-update.sh
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Deploy signage-display.sh script
  ansible.builtin.template:
    src: signage-display.sh.j2
    dest: /usr/local/bin/signage-display.sh
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Deploy signage-stop.sh script
  ansible.builtin.template:
    src: signage-stop.sh.j2
    dest: /usr/local/bin/signage-stop.sh
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Deploy signage-lite-watchdog.sh script
  ansible.builtin.template:
    src: signage-lite-watchdog.sh.j2
    dest: /usr/local/bin/signage-lite-watchdog.sh
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Deploy signage-lite.service
  ansible.builtin.template:
    src: signage-lite.service.j2
    dest: /etc/systemd/system/signage-lite.service
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-lite-update.service
  ansible.builtin.template:
    src: signage-lite-update.service.j2
    dest: /etc/systemd/system/signage-lite-update.service
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-lite-update.timer
  ansible.builtin.template:
    src: signage-lite-update.timer.j2
    dest: /etc/systemd/system/signage-lite-update.timer
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-lite-watchdog.service
  ansible.builtin.template:
    src: signage-lite-watchdog.service.j2
    dest: /etc/systemd/system/signage-lite-watchdog.service
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-lite-watchdog.timer
  ansible.builtin.template:
    src: signage-lite-watchdog.timer.j2
    dest: /etc/systemd/system/signage-lite-watchdog.timer
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-daily-reboot.service
  ansible.builtin.template:
    src: signage-daily-reboot.service.j2
    dest: /etc/systemd/system/signage-daily-reboot.service
    mode: '0644'
  notify: systemd-reload

- name: Deploy signage-daily-reboot.timer
  ansible.builtin.template:
    src: signage-daily-reboot.timer.j2
    dest: /etc/systemd/system/signage-daily-reboot.timer
    mode: '0644'
  notify: systemd-reload

- name: Ensure systemd units are reloaded
  ansible.builtin.systemd:
    daemon_reload: true

- name: Unmask signage-lite service (ensure it can be started after preflight runtime mask)
  ansible.builtin.shell: systemctl unmask signage-lite.service
  register: unmask_result
  changed_when: unmask_result.rc == 0
  failed_when: false
  when: terminal_release_mode | default('full') == 'full'
  # Note: systemctl unmask removes both runtime and persistent masks

- name: Re-enable signage-lite service (ensure enabled state convergence)
  ansible.builtin.systemd:
    name: signage-lite.service
    enabled: true
  when: terminal_release_mode | default('full') == 'full'

- name: Re-enable signage-lite update timer (ensure enabled state convergence)
  ansible.builtin.systemd:
    name: signage-lite-update.timer
    enabled: true
  when: terminal_release_mode | default('full') == 'full'

- name: Re-enable signage-lite watchdog timer (ensure enabled state convergence)
  ansible.builtin.systemd:
    name: signage-lite-watchdog.timer
    enabled: true
  when: terminal_release_mode | default('full') == 'full'

- name: Re-enable signage-daily-reboot timer (ensure enabled state convergence)
  ansible.builtin.systemd:
    name: signage-daily-reboot.timer
    enabled: true
  when: terminal_release_mode | default('full') == 'full'

- name: Require persistent signage units to be enabled before release
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - "{{ item }}"
  loop:
    - signage-lite.service
    - signage-lite-update.timer
    - signage-lite-watchdog.timer
    - signage-daily-reboot.timer
  register: signage_enabled_unit
  changed_when: false
  failed_when: >-
    signage_enabled_unit.rc != 0
    or signage_enabled_unit.stdout | trim != 'enabled'
  when: terminal_release_mode | default('full') == 'release-only'

# Pi3のメモリ節約のためlightdmを停止している場合、サービス起動はスキップ
# post_tasksでPi3を再起動した後、サービスは自動的に起動する
- name: Skip service start if lightdm was stopped for memory savings
  ansible.builtin.debug:
    msg: "Skipping signage service starts - lightdm was stopped for deployment. Services will auto-start after reboot."
  when: lightdm_stopped is defined and lightdm_stopped is changed

# 以下のタスクはlightdmが停止していない場合のみ実行
- name: Start signage-lite update timer
  ansible.builtin.systemd:
    name: signage-lite-update.timer
    state: started
  when: lightdm_stopped is not defined or lightdm_stopped is not changed

- name: Start signage-lite watchdog timer
  ansible.builtin.systemd:
    name: signage-lite-watchdog.timer
    state: started
  when: lightdm_stopped is not defined or lightdm_stopped is not changed

- name: Start signage-daily-reboot timer
  ansible.builtin.systemd:
    name: signage-daily-reboot.timer
    state: started
  when: lightdm_stopped is not defined or lightdm_stopped is not changed

- name: Start signage-lite service
  ansible.builtin.systemd:
    name: signage-lite.service
    state: started
  when: lightdm_stopped is not defined or lightdm_stopped is not changed
