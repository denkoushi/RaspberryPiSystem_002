---
- name: Validate terminal release mutation profile
  ansible.builtin.assert:
    that:
      - terminal_release_mode | default('full') in ['full', 'release-only']
      - terminal_release_mode | default('full') != 'release-only' or 'server' not in group_names
      - terminal_release_transport | default('ssh-ansible') in ['ssh-ansible', 'local-artifact']
      - terminal_release_transport | default('ssh-ansible') != 'local-artifact' or terminal_release_mode | default('full') == 'release-only'
    fail_msg: >-
      terminal_release_mode must be full for provisioning/server convergence or
      release-only for one coordinator-owned terminal release.

- name: Ensure repository parent directory exists
  ansible.builtin.file:
    path: "{{ repo_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  when: terminal_release_mode | default('full') == 'full'

- name: Check repository directory
  ansible.builtin.stat:
    path: "{{ repo_path }}"
  register: repo_path_stat

- name: Check if repository exists
  ansible.builtin.stat:
    path: "{{ repo_path }}/.git"
  register: repo_git_stat

- name: Require an existing repository for a terminal release
  ansible.builtin.assert:
    that:
      - repo_path_stat.stat.exists | default(false)
      - repo_path_stat.stat.isdir | default(false)
      - repo_git_stat.stat.exists | default(false)
      - repo_git_stat.stat.isdir | default(false)
      - repo_version is match('^[0-9a-f]{40}$')
    fail_msg: >-
      release-only requires an existing Git repository and an immutable
      lowercase 40-hex repo_version. Provision the host separately before retrying.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Fix .git directory ownership before reading the current revision
  ansible.builtin.file:
    path: "{{ repo_path }}/.git"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true
    state: directory
  when:
    - terminal_release_mode | default('full') == 'full'
    - repo_git_stat.stat.exists | default(false)
    - ansible_user is defined
  changed_when: false
  # The previous revision must be readable before sync. If it is not, the
  # agent classifier cannot compute a diff and safely falls back to --build.

- name: Check host_vars directory exists
  ansible.builtin.stat:
    path: "{{ repo_path }}/infrastructure/ansible/host_vars"
  register: host_vars_stat
  when:
    - terminal_release_mode | default('full') == 'full'
    - repo_git_stat.stat.exists | default(false)

- name: Find vault.yml files in host_vars
  ansible.builtin.find:
    paths: "{{ repo_path }}/infrastructure/ansible/host_vars"
    patterns: "vault.yml"
    file_type: file
  register: vault_files
  when:
    - terminal_release_mode | default('full') == 'full'
    - repo_git_stat.stat.exists | default(false)
    - host_vars_stat.stat.exists | default(false)

- name: Fix vault.yml ownership if needed
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  loop: "{{ vault_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - terminal_release_mode | default('full') == 'full'
    - repo_git_stat.stat.exists | default(false)
    - host_vars_stat.stat.exists | default(false)
    - (vault_files.matched | default(0)) | int > 0
    - ansible_user is defined
  become: true

- name: Capture current repo HEAD for provisioning
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}"
    git rev-parse HEAD
  args:
    executable: /bin/bash
  register: repo_prev_head_full_result
  changed_when: false
  failed_when: false
  when:
    - terminal_release_mode | default('full') == 'full'
    - repo_git_stat.stat.exists | default(false)

- name: Verify terminal repository is clean and capture current HEAD
  ansible.builtin.shell: |
    set -euo pipefail
    safe_home="$(/usr/bin/getent passwd {{ ansible_user | quote }} | /usr/bin/cut -d: -f6)"
    [[ "${safe_home}" == /* && -d "${safe_home}" ]]
    ssh_command={{ (git_environment | default({})).get('GIT_SSH_COMMAND', '') | quote }}
    git() {
      local -a safe_environment=(
        "PATH=/usr/bin:/bin"
        "HOME=${safe_home}"
        "LANG=C"
        "LC_ALL=C"
        "GIT_CONFIG_NOSYSTEM=1"
        "GIT_CONFIG_GLOBAL=/dev/null"
        "GIT_ATTR_NOSYSTEM=1"
        "GIT_TERMINAL_PROMPT=0"
        "GIT_OPTIONAL_LOCKS=0"
      )
      if [[ -n "${ssh_command}" ]]; then
        safe_environment+=("GIT_SSH_COMMAND=${ssh_command}")
      fi
      /usr/bin/env -i "${safe_environment[@]}" /usr/bin/git \
        -c core.fsmonitor=false \
        -c core.ignoreStat=false \
        -c core.trustctime=true \
        -c core.hooksPath=/dev/null \
        -c maintenance.auto=false \
        "$@"
    }
    verify_index_policy() {
      git ls-files -v -z | /usr/bin/python3 -c '
    import sys
    entries = sys.stdin.buffer.read().split(b"\0")
    bad = [entry for entry in entries if entry and (entry[:1] == b"S" or entry[:1].islower())]
    if bad:
        print("terminal repository contains skip-worktree or assume-unchanged entries", file=sys.stderr)
        raise SystemExit(1)
    '
      git ls-files -u -z | /usr/bin/python3 -c '
    import sys
    if sys.stdin.buffer.read(1):
        print("terminal repository contains unmerged index entries", file=sys.stderr)
        raise SystemExit(1)
    '
    }
    cd "{{ repo_path }}"
    verify_index_policy
    git diff --quiet
    git diff --cached --quiet
    test -z "$(git status --porcelain --untracked-files=all)"
    head="$(git rev-parse --verify HEAD)"
    [[ "${head}" =~ ^[0-9a-f]{40}$ ]]
    printf '%s\n' "${head}"
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  register: repo_prev_head_release_result
  changed_when: false
  when:
    - terminal_release_mode | default('full') == 'release-only'
    - terminal_release_transport | default('ssh-ansible') == 'ssh-ansible'

- name: Verify incremental bundle and reset existing terminal repository without network
  ansible.builtin.shell: |
    set -euo pipefail
    safe_home="$(/usr/bin/getent passwd {{ ansible_user | quote }} | /usr/bin/cut -d: -f6)"
    [[ "${safe_home}" == /* && -d "${safe_home}" ]]
    git() {
      /usr/bin/env -i \
        PATH=/usr/bin:/bin \
        HOME="${safe_home}" \
        LANG=C LC_ALL=C \
        GIT_CONFIG_NOSYSTEM=1 \
        GIT_CONFIG_GLOBAL=/dev/null \
        GIT_ATTR_NOSYSTEM=1 \
        GIT_TERMINAL_PROMPT=0 \
        GIT_OPTIONAL_LOCKS=0 \
        /usr/bin/git \
          -c safe.directory={{ repo_path | quote }} \
          -c core.fsmonitor=false \
          -c core.ignoreStat=false \
          -c core.trustctime=true \
          -c core.hooksPath=/dev/null \
          -c maintenance.auto=false \
          "$@"
    }
    cd {{ repo_path | quote }}
    expected_previous={{ local_execution_previous_sha | quote }}
    target={{ repo_version | quote }}
    [[ "${expected_previous}" =~ ^[0-9a-f]{40}$ ]]
    [[ "${target}" =~ ^[0-9a-f]{40}$ ]]
    [[ "$(git rev-parse --verify HEAD)" == "${expected_previous}" ]]
    git diff --quiet
    git diff --cached --quiet
    test -z "$(git status --porcelain --untracked-files=all)"
    if [[ "${expected_previous}" == "${target}" ]]; then
      [[ ! -e {{ local_execution_bundle_path | quote }} ]]
    else
      [[ -f {{ local_execution_bundle_path | quote }} && ! -L {{ local_execution_bundle_path | quote }} ]]
      git bundle verify {{ local_execution_bundle_path | quote }} >/dev/null
      [[ "$(git bundle list-heads {{ local_execution_bundle_path | quote }})" == "${target} HEAD" ]]
      git fetch --no-tags {{ local_execution_bundle_path | quote }} HEAD
      [[ "$(git rev-parse --verify FETCH_HEAD^{commit})" == "${target}" ]]
      git cat-file -e "${target}^{commit}"
      git reset --hard "${target}"
    fi
    [[ "$(git rev-parse --verify HEAD)" == "${target}" ]]
    git diff --quiet
    git diff --cached --quiet
    test -z "$(git status --porcelain --untracked-files=all)"
    printf '%s\n' "${expected_previous}"
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  register: git_local_result
  when:
    - terminal_release_mode | default('full') == 'release-only'
    - terminal_release_transport | default('ssh-ansible') == 'local-artifact'

- name: Sync repository for provisioning (with retries)
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -d "{{ repo_path }}/.git" ]; then
      rm -rf "{{ repo_path }}"
      git clone {{ repo_remote | quote }} "{{ repo_path }}"
    fi
    cd "{{ repo_path }}"
    git remote set-url origin {{ repo_remote | quote }}
    git fetch --all --prune --tags
    git checkout {{ repo_version | quote }}
    # A rolling release resolves its branch once to a full SHA.  Do not turn
    # that immutable target back into a moving origin/<branch> reference.
    if git show-ref --verify --quiet "refs/remotes/origin/{{ repo_version }}"; then
      git reset --hard "origin/{{ repo_version }}"
    else
      git cat-file -e "{{ repo_version }}^{commit}"
      git reset --hard "{{ repo_version }}"
    fi
  args:
    executable: /bin/bash
  environment: "{{ git_environment }}"
  register: git_full_result
  retries: 3
  delay: 10
  until: git_full_result.rc == 0
  when: terminal_release_mode | default('full') == 'full'

- name: Fetch and reset existing terminal repository to immutable release
  ansible.builtin.shell: |
    set -euo pipefail
    safe_home="$(/usr/bin/getent passwd {{ ansible_user | quote }} | /usr/bin/cut -d: -f6)"
    [[ "${safe_home}" == /* && -d "${safe_home}" ]]
    ssh_command={{ (git_environment | default({})).get('GIT_SSH_COMMAND', '') | quote }}
    git() {
      local -a safe_environment=(
        "PATH=/usr/bin:/bin"
        "HOME=${safe_home}"
        "LANG=C"
        "LC_ALL=C"
        "GIT_CONFIG_NOSYSTEM=1"
        "GIT_CONFIG_GLOBAL=/dev/null"
        "GIT_ATTR_NOSYSTEM=1"
        "GIT_TERMINAL_PROMPT=0"
        "GIT_OPTIONAL_LOCKS=0"
      )
      if [[ -n "${ssh_command}" ]]; then
        safe_environment+=("GIT_SSH_COMMAND=${ssh_command}")
      fi
      /usr/bin/env -i "${safe_environment[@]}" /usr/bin/git \
        -c safe.directory="{{ repo_path }}" \
        -c core.fsmonitor=false \
        -c core.ignoreStat=false \
        -c core.trustctime=true \
        -c core.hooksPath=/dev/null \
        -c maintenance.auto=false \
        "$@"
    }
    verify_index_policy() {
      git ls-files -v -z | /usr/bin/python3 -c '
    import sys
    entries = sys.stdin.buffer.read().split(b"\0")
    bad = [entry for entry in entries if entry and (entry[:1] == b"S" or entry[:1].islower())]
    if bad:
        print("terminal repository contains skip-worktree or assume-unchanged entries", file=sys.stderr)
        raise SystemExit(1)
    '
      git ls-files -u -z | /usr/bin/python3 -c '
    import sys
    if sys.stdin.buffer.read(1):
        print("terminal repository contains unmerged index entries", file=sys.stderr)
        raise SystemExit(1)
    '
    }
    cd "{{ repo_path }}"
    target={{ repo_version | quote }}
    git fetch --no-tags origin "${target}"
    git cat-file -e "${target}^{commit}"
    resolved="$(git rev-parse "${target}^{commit}")"
    [[ "${resolved}" == "${target}" ]]
    expected_head={{ repo_prev_head_release_result.stdout | quote }}
    [[ "$(git rev-parse --verify HEAD)" == "${expected_head}" ]]
    git diff --quiet
    git diff --cached --quiet
    test -z "$(git status --porcelain --untracked-files=all)"
    verify_index_policy
    git reset --hard "${target}"
    [[ "$(git rev-parse --verify HEAD)" == "${target}" ]]
  args:
    executable: /bin/bash
  become: true
  register: git_release_result
  retries: 3
  delay: 10
  until: git_release_result.rc == 0
  when:
    - terminal_release_mode | default('full') == 'release-only'
    - terminal_release_transport | default('ssh-ansible') == 'ssh-ansible'

- name: Select repository synchronization result
  ansible.builtin.set_fact:
    repo_prev_head_result: >-
      {{
        git_local_result
        if terminal_release_transport | default('ssh-ansible') == 'local-artifact'
        else (
          repo_prev_head_release_result
          if terminal_release_mode | default('full') == 'release-only'
          else repo_prev_head_full_result
        )
      }}
    git_result: >-
      {{
        git_local_result
        if terminal_release_transport | default('ssh-ansible') == 'local-artifact'
        else (
          git_release_result
          if terminal_release_mode | default('full') == 'release-only'
          else git_full_result
        )
      }}

- name: Capture repo HEAD after sync
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}"
    git rev-parse HEAD
  args:
    executable: /bin/bash
  become_user: "{{ ansible_user }}"
  register: repo_new_head_result
  changed_when: false

- name: Determine if repo changed
  ansible.builtin.set_fact:
    repo_prev_head: "{{ repo_prev_head_result.stdout | default('') }}"
    repo_new_head: "{{ repo_new_head_result.stdout | default('') }}"
    repo_changed: >-
      {{
        (repo_prev_head_result.stdout | default(''))
        != (repo_new_head_result.stdout | default(''))
      }}

- name: Collect repo diff file list (for docker build decision)
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}"
    git diff --name-only "{{ repo_prev_head }}" "{{ repo_new_head }}"
  args:
    executable: /bin/bash
  register: repo_diff_files_raw
  changed_when: false
  failed_when: false
  when:
    - (repo_prev_head | default('')) != ''
    - (repo_new_head | default('')) != ''

- name: Determine if docker build is needed on server
  ansible.builtin.set_fact:
    repo_changed_files: "{{ repo_diff_files_raw.stdout_lines | default([]) }}"
    repo_diff_unavailable: >-
      {{
        (repo_prev_head | default('')) == ''
        or (repo_new_head | default('')) == ''
        or (repo_diff_files_raw.rc | default(0)) != 0
      }}

- name: Classify client agent image changes
  ansible.builtin.set_fact:
    nfc_agent_image_build_needed: >-
      {{
        repo_diff_unavailable | bool
        or (repo_changed_files | select('match', '^clients/nfc-agent/') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/Dockerfile\.nfc-agent$') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/docker-compose\.client\.yml$') | list | length > 0)
      }}
    barcode_agent_image_build_needed: >-
      {{
        repo_diff_unavailable | bool
        or (repo_changed_files | select('match', '^clients/barcode-agent/') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/Dockerfile\.barcode-agent$') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/docker-compose\.client\.yml$') | list | length > 0)
      }}
    torque_agent_image_build_needed: >-
      {{
        repo_diff_unavailable | bool
        or (repo_changed_files | select('match', '^clients/torque-agent/') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/Dockerfile\.torque-agent$') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/docker/docker-compose\.client\.yml$') | list | length > 0)
      }}

- name: Classify client agent runtime changes
  ansible.builtin.set_fact:
    nfc_agent_runtime_recreate_needed: >-
      {{
        nfc_agent_image_build_needed | bool
        or (repo_changed_files | select('match', '^infrastructure/ansible/(roles/client/(tasks/nfc-agent|templates/.*nfc|handlers)|group_vars/).*') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/ansible/templates/nfc-agent\.env\.j2$') | list | length > 0)
        or (repo_changed_files | select('match', '^\.env') | list | length > 0)
      }}
    barcode_agent_runtime_recreate_needed: >-
      {{
        barcode_agent_image_build_needed | bool
        or (repo_changed_files | select('match', '^infrastructure/ansible/(roles/client/(tasks/barcode-agent|templates/.*barcode|handlers)|group_vars/).*') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/ansible/templates/barcode-agent\.env\.j2$') | list | length > 0)
        or (repo_changed_files | select('match', '^\.env') | list | length > 0)
      }}
    torque_agent_runtime_recreate_needed: >-
      {{
        torque_agent_image_build_needed | bool
        or (repo_changed_files | select('match', '^infrastructure/ansible/(roles/client/(tasks/torque-agent|templates/.*torque|handlers)|group_vars/).*') | list | length > 0)
        or (repo_changed_files | select('match', '^infrastructure/ansible/templates/torque-agent\.env\.j2$') | list | length > 0)
        or (repo_changed_files | select('match', '^\.env') | list | length > 0)
      }}
    server_docker_build_needed: >-
      {{
        (repo_prev_head | default('')) == ''
        or (repo_new_head | default('')) == ''
        or (repo_diff_files_raw.rc | default(0)) != 0
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^apps/(api|web)/') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^packages/') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^pnpm-lock\\.yaml$') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^package\\.json$') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^pnpm-workspace\\.yaml$') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^infrastructure/docker/') | list | length > 0)
        or (repo_diff_files_raw.stdout_lines | default([]) | select('match', '^apps/api/prisma/') | list | length > 0)
      }}

- name: Configure Tailscale when enabled
  ansible.builtin.import_tasks: tailscale.yml
  when:
    - terminal_release_mode | default('full') == 'full'
    - tailscale_enabled | default(false)
