---
- name: reload client systemd daemon after release unit change
  ansible.builtin.systemd:
    daemon_reload: true
  when: terminal_release_mode | default('full') == 'release-only'

- name: restart status-agent service after release configuration change
  ansible.builtin.systemd:
    name: status-agent.service
    state: restarted
  when: terminal_release_mode | default('full') == 'release-only'

- name: restart status-agent timer after release configuration change
  ansible.builtin.systemd:
    name: status-agent.timer
    state: restarted
  when: terminal_release_mode | default('full') == 'release-only'

- name: restart haizen-agent
  ansible.builtin.systemd:
    name: haizen-agent.service
    state: restarted
    daemon_reload: true
