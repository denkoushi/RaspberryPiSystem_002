---
repo_path: /opt/RaspberryPiSystem_002
client_default_services_to_restart:
  - status-agent.service
  - status-agent.timer
haizen_agent_enabled: false
torque_agent_enabled: false
torque_agent_local_port: 7073
torque_agent_heartbeat_ttl_seconds: 8
torque_agent_browser_origins: []
torque_agent_bluetooth_adapter: {}
torque_agent_hid_links: []
haizen_agent_install_evdev: true
# insecure: 自己署名 Pi5 TLS 向け / system: OS 検証（Caddy 等で正規証明書を載せた環境）
haizen_agent_tls_verify_mode: "insecure"
client_sudo_user: "{{ ansible_user | default('') }}"
client_sudo_nopasswd_commands: "{{ sudo_nopasswd_commands | default([]) }}"
client_sudoers_services_file: "{{ client_sudo_user }}-client-services"
