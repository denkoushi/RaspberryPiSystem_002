---
# バーコードエージェント設定の配布（責務: 設定生成のみ）
# 対象: barcode_agent_enabled が true のホスト
# 起動保証は barcode-agent-lifecycle.yml

- name: Ensure barcode agent .env directory exists
  ansible.builtin.file:
    path: "{{ repo_path }}/clients/barcode-agent"
    state: directory
    mode: '0755'
  when: terminal_release_mode | default('full') == 'full'

- name: Check barcode agent directory before release
  ansible.builtin.stat:
    path: "{{ repo_path }}/clients/barcode-agent"
  register: barcode_agent_directory
  when: terminal_release_mode | default('full') == 'release-only'

- name: Require barcode agent directory before release
  ansible.builtin.assert:
    that:
      - barcode_agent_directory.stat.exists | default(false)
      - barcode_agent_directory.stat.isdir | default(false)
    fail_msg: barcode-agent directory is missing; provision the terminal before release.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Deploy barcode agent environment variables
  ansible.builtin.template:
    src: "{{ role_path }}/../../templates/barcode-agent.env.j2"
    dest: "{{ repo_path }}/clients/barcode-agent/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  register: barcode_agent_env_result
  notify: restart barcode-agent

- name: Include barcode environment changes in lifecycle selection
  ansible.builtin.set_fact:
    barcode_agent_runtime_recreate_needed: >-
      {{
        barcode_agent_runtime_recreate_needed | default(true) | bool
        or barcode_agent_env_result.changed | default(false) | bool
      }}
