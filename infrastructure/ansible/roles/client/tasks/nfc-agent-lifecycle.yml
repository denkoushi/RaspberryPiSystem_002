---
# NFCエージェント起動保証（責務分離: ライフサイクル制御）
# 対象: nfc_agent_client_id が定義されているホスト（Pi4キオスク等）
# docker compose で nfc-agent コンテナを起動・維持する

- name: Ensure PC/SC runtime packages are installed for NFC reader
  ansible.builtin.apt:
    name:
      - pcscd
      - pcsc-tools
    state: present
    update_cache: true
  register: pcsc_runtime_install_result
  when: terminal_release_mode | default('full') == 'full'

- name: Ensure PC/SC socket activation is enabled and running
  ansible.builtin.systemd:
    name: pcscd.socket
    enabled: true
    state: started
  register: pcscd_service_result
  when: terminal_release_mode | default('full') == 'full'

- name: Verify PC/SC packages are already installed for release
  ansible.builtin.shell: |
    set -euo pipefail
    dpkg-query -W -f='${Status}\n' pcscd pcsc-tools \
      | grep -c '^install ok installed$' \
      | grep -qx '2'
  args:
    executable: /bin/bash
  changed_when: false
  when: terminal_release_mode | default('full') == 'release-only'

- name: Verify PC/SC socket activation and communication endpoint for release
  ansible.builtin.shell: |
    set -euo pipefail
    systemctl is-enabled --quiet pcscd.socket
    systemctl is-active --quiet pcscd.socket
    test -S /run/pcscd/pcscd.comm
  args:
    executable: /bin/bash
  changed_when: false
  when: terminal_release_mode | default('full') == 'release-only'

- name: Ensure Docker is available for nfc-agent
  ansible.builtin.command: docker --version
  register: docker_version_check
  changed_when: false
  failed_when: false

- name: Fail if Docker is not available (nfc-agent requires Docker)
  ansible.builtin.fail:
    msg: "nfc-agent には Docker が必要です。{{ inventory_hostname }} に Docker をインストールしてください。"
  when: docker_version_check.rc != 0

- name: Ensure nfc-agent container is up
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}"
    {% if nfc_agent_image_build_needed | default(true) %}
    docker compose -f infrastructure/docker/docker-compose.client.yml up -d --build nfc-agent
    {% elif nfc_agent_runtime_recreate_needed | default(true) %}
    docker compose -f infrastructure/docker/docker-compose.client.yml up -d --force-recreate --no-build nfc-agent
    {% else %}
    docker compose -f infrastructure/docker/docker-compose.client.yml up -d --no-build nfc-agent
    {% endif %}
  args:
    executable: /bin/bash
  register: nfc_agent_up_result

- name: Restart nfc-agent when PC/SC runtime state changed
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}" && docker compose -f infrastructure/docker/docker-compose.client.yml restart nfc-agent
  args:
    executable: /bin/bash
  register: nfc_agent_restart_after_pcsc_result
  when:
    - terminal_release_mode | default('full') == 'full'
    - pcsc_runtime_install_result.changed or pcscd_service_result.changed

- name: Wait for nfc-agent to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:7071/api/agent/status"
    method: GET
    status_code: [200]
    timeout: 10
  register: nfc_agent_status_check
  retries: 5
  delay: 3
  until: nfc_agent_status_check.status == 200

- name: Capture docker compose ps for nfc-agent (diagnostics on failure)
  ansible.builtin.shell: |
    cd "{{ repo_path }}" && docker compose -f infrastructure/docker/docker-compose.client.yml ps -a
  register: nfc_agent_ps_result
  changed_when: false
  failed_when: false
  when: nfc_agent_status_check.status | default(0) != 200

- name: Emit nfc-agent status for diagnostics on failure
  ansible.builtin.debug:
    msg:
      - "nfc-agent status API: {{ nfc_agent_status_check.json | default({}) }}"
      - "docker compose ps: {{ nfc_agent_ps_result.stdout | default('') }}"
  when: nfc_agent_status_check.status | default(0) != 200
