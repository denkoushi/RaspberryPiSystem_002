---
- name: Install trusted StoneBase local executor runner
  ansible.builtin.copy:
    src: "{{ repo_path }}/scripts/deploy/stonebase-local-ansible-runner.py"
    dest: /usr/local/libexec/raspi-local-ansible-runner
    remote_src: true
    owner: root
    group: root
    mode: '0755'

- name: Install trusted StoneBase local executor contract module
  ansible.builtin.copy:
    src: "{{ repo_path }}/scripts/deploy/rolling_release/local_execution.py"
    dest: /usr/local/libexec/raspi_local_execution.py
    remote_src: true
    owner: root
    group: root
    mode: '0644'

- name: Install trusted StoneBase candidate ready probe
  ansible.builtin.copy:
    src: "{{ repo_path }}/scripts/deploy/terminal-ready-probe.py"
    dest: /usr/local/libexec/raspi-terminal-ready-probe
    remote_src: true
    owner: root
    group: root
    mode: '0755'

- name: Install trusted StoneBase maintenance probe
  ansible.builtin.copy:
    src: "{{ repo_path }}/scripts/deploy/terminal-local-maintenance-probe.py"
    dest: /usr/local/libexec/raspi-terminal-maintenance-probe
    remote_src: true
    owner: root
    group: root
    mode: '0755'

- name: Install trusted StoneBase local runtime installer
  ansible.builtin.copy:
    src: "{{ repo_path }}/scripts/deploy/stonebase-local-runtime-install.py"
    dest: /usr/local/libexec/raspi-local-runtime-install
    remote_src: true
    owner: root
    group: root
    mode: '0755'

- name: Install StoneBase local executor runtime lock
  ansible.builtin.copy:
    src: "{{ repo_path }}/infrastructure/ansible/files/stonebase-local-ansible/runtime-lock.json"
    dest: /usr/local/libexec/raspi-local-runtime-lock.json
    remote_src: true
    owner: root
    group: root
    mode: '0644'

- name: Install StoneBase local executor Python requirements lock
  ansible.builtin.copy:
    src: "{{ repo_path }}/infrastructure/ansible/files/stonebase-local-ansible/requirements-aarch64-py311.lock"
    dest: /usr/local/libexec/raspi-local-requirements-aarch64-py311.lock
    remote_src: true
    owner: root
    group: root
    mode: '0644'

- name: Bootstrap pinned StoneBase local executor runtime when needed
  ansible.builtin.command:
    argv:
      - /usr/local/libexec/raspi-local-runtime-install
  register: stonebase_local_runtime_install
  changed_when: >-
    stonebase_local_runtime_install.rc == 0
    and 'RUNTIME_INSTALL_CHANGED' in stonebase_local_runtime_install.stdout
  failed_when: false
  no_log: true

- name: Read bounded StoneBase local runtime bootstrap observation
  ansible.builtin.command:
    argv:
      - /usr/local/libexec/raspi-local-runtime-install
      - status
  register: stonebase_local_runtime_status
  changed_when: false
  failed_when: false
  no_log: true

- name: Validate bounded StoneBase local runtime bootstrap observation
  ansible.builtin.set_fact:
    stonebase_local_runtime_bootstrap_outcome: >-
      {{
        stonebase_local_runtime_status.stdout
        if stonebase_local_runtime_status.rc == 0
        and stonebase_local_runtime_status.stdout is match(
          '^RUNTIME_INSTALL_OBSERVATION:'
          ~ '(running|changed|current|failed):'
          ~ '(initializing|host-preflight|lock-validate|staging-prepare|python-download|python-extract|python-packages|collection-download|collection-install|runtime-verify|runtime-publish|active-link|cleanup|complete|internal):'
          ~ '(host-ineligible|lock-invalid|requirements-missing|staging-preparation-failed|python-download-failed|python-extract-failed|python-packages-failed|collection-download-failed|collection-install-failed|runtime-verification-failed|runtime-publish-conflict|active-link-failed|cleanup-failed|internal-error|none):'
          ~ '(pending|complete|failed):[0-9a-f]{32}:(sha256:[0-9a-f]{64}|none)$'
        )
        else 'RUNTIME_INSTALL_OBSERVATION:unavailable'
      }}
  no_log: true

- name: Report bounded StoneBase local runtime bootstrap outcome
  ansible.builtin.debug:
    msg: "{{ stonebase_local_runtime_bootstrap_outcome }}"
