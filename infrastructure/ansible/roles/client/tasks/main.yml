---
- name: Validate manifest-backed client destinations for release
  ansible.builtin.assert:
    that:
      - ansible_user is match('^[a-z_][a-z0-9_-]{0,31}$')
      - client_sudo_user == ansible_user
      - client_sudoers_services_file == ansible_user ~ '-client-services'
    fail_msg: >-
      release-only supports only the coordinator manifest destinations derived
      from ansible_user. Use full provisioning for custom sudoers paths.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Verify NetworkManager release baseline
  ansible.builtin.import_tasks: network-preflight.yml
  when: terminal_release_mode | default('full') == 'release-only'

- name: Ensure client restart summary fact exists
  ansible.builtin.set_fact:
    client_restart_results: "{{ client_restart_results | default([]) }}"

- name: Hide desktop panel during full terminal provisioning
  ansible.builtin.shell: |
    set -euo pipefail
    changed=false
    if /usr/bin/pgrep -f '^lwrespawn /usr/bin/wf-panel-pi( |$)' >/dev/null 2>&1; then
      /usr/bin/pkill -f '^lwrespawn /usr/bin/wf-panel-pi( |$)'
      changed=true
    fi
    if /usr/bin/pgrep -x wf-panel-pi >/dev/null 2>&1; then
      /usr/bin/pkill -x wf-panel-pi
      changed=true
    fi
    printf '%s\n' "${changed}"
  args:
    executable: /bin/bash
  register: terminal_panel_provisioning
  changed_when: terminal_panel_provisioning.stdout | trim == 'true'
  when:
    - terminal_release_mode | default('full') == 'full'
    - >-
      manage_kiosk_browser | default(false) | bool
      or manage_signage_lite | default(false) | bool

- name: Create status-agent configuration file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/status-agent.conf.j2"
    dest: /etc/raspi-status-agent.conf
    owner: root
    group: root
    mode: '0644'
  when: status_agent_client_id is defined
  register: status_agent_config_result

- name: Copy status-agent systemd service file
  ansible.builtin.copy:
    src: "{{ repo_path }}/clients/status-agent/status-agent.service"
    dest: /etc/systemd/system/status-agent.service
    owner: root
    group: root
    mode: '0644'
    remote_src: true
  register: status_agent_service_result

- name: Copy status-agent systemd timer file
  ansible.builtin.copy:
    src: "{{ repo_path }}/clients/status-agent/status-agent.timer"
    dest: /etc/systemd/system/status-agent.timer
    owner: root
    group: root
    mode: '0644'
    remote_src: true
  register: status_agent_timer_result

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: status_agent_service_result.changed or status_agent_timer_result.changed

- name: Enable and start status-agent timer
  ansible.builtin.systemd:
    name: status-agent.timer
    enabled: true
    state: started
    daemon_reload: true
  register: status_agent_timer_enable_result
  when: terminal_release_mode | default('full') == 'full'

- name: Require status-agent timer to be enabled before release
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - status-agent.timer
  register: status_agent_timer_enabled
  changed_when: false
  failed_when: >-
    status_agent_timer_enabled.rc != 0
    or status_agent_timer_enabled.stdout | trim != 'enabled'
  when: terminal_release_mode | default('full') == 'release-only'

- name: Ensure polkit rules directory exists
  ansible.builtin.file:
    path: /etc/polkit-1/rules.d
    state: directory
    mode: '0755'
  when: terminal_release_mode | default('full') == 'full'

- name: Check polkit rules directory before release
  ansible.builtin.stat:
    path: /etc/polkit-1/rules.d
  register: client_polkit_rules_dir
  when: terminal_release_mode | default('full') == 'release-only'

- name: Require polkit rules directory before release
  ansible.builtin.assert:
    that:
      - client_polkit_rules_dir.stat.exists | default(false)
      - client_polkit_rules_dir.stat.isdir | default(false)
    fail_msg: /etc/polkit-1/rules.d is missing; provision the terminal before release.
  when: terminal_release_mode | default('full') == 'release-only'

- name: Deploy polkit rule for pcscd access
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/polkit-50-pcscd-allow-all.rules.j2"
    dest: /etc/polkit-1/rules.d/50-pcscd-allow-all.rules
    owner: root
    group: root
    mode: '0644'

- name: Deploy NFC agent configuration (Pi4 kiosk)
  ansible.builtin.include_tasks: nfc-agent.yml
  when: nfc_agent_client_id is defined

- name: Ensure nfc-agent is running (Pi4 kiosk)
  ansible.builtin.include_tasks: nfc-agent-lifecycle.yml
  when: nfc_agent_client_id is defined

- name: Deploy barcode agent configuration (Pi4 kiosk, optional)
  ansible.builtin.include_tasks: barcode-agent.yml
  when: barcode_agent_enabled | default(false) | bool

- name: Ensure barcode-agent is running (Pi4 kiosk, optional)
  ansible.builtin.include_tasks: barcode-agent-lifecycle.yml
  when: barcode_agent_enabled | default(false) | bool

- name: Deploy torque-agent configuration (assembly kiosk, optional)
  ansible.builtin.include_tasks: torque-agent.yml
  when: torque_agent_enabled | default(false) | bool

- name: Ensure torque-agent is running (assembly kiosk, optional)
  ansible.builtin.include_tasks: torque-agent-lifecycle.yml
  when: torque_agent_enabled | default(false) | bool

- name: Deploy haizen-agent (Zero2W edge, optional)
  ansible.builtin.include_tasks: haizen-agent.yml
  when: haizen_agent_enabled | default(false) | bool

- name: Check legacy client sudoers file
  ansible.builtin.stat:
    path: "/etc/sudoers.d/{{ client_sudo_user }}"
  register: client_legacy_sudoers_stat
  when:
    - client_sudo_user | length > 0
    - client_sudoers_services_file != client_sudo_user

- name: Read legacy client sudoers file
  ansible.builtin.slurp:
    src: "/etc/sudoers.d/{{ client_sudo_user }}"
  register: client_legacy_sudoers_content
  when:
    - client_sudo_user | length > 0
    - client_sudoers_services_file != client_sudo_user
    - client_legacy_sudoers_stat.stat.exists | default(false)

- name: Remove legacy Ansible-managed client sudoers file
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ client_sudo_user }}"
    state: absent
  when:
    - client_sudo_user | length > 0
    - client_sudoers_services_file != client_sudo_user
    - client_legacy_sudoers_stat.stat.exists | default(false)
    - "'# Ansible managed: allow required systemctl commands' in (client_legacy_sudoers_content.content | b64decode)"

- name: Ensure sudoers overrides for client services
  ansible.builtin.template:
    src: "{{ role_path }}/templates/sudoers-client.j2"
    dest: "/etc/sudoers.d/{{ client_sudoers_services_file }}"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  when:
    - client_sudo_user | length > 0
    - client_sudo_nopasswd_commands | length > 0

- name: Ensure services_to_restart is defined
  ansible.builtin.set_fact:
    services_to_restart: "{{ client_default_services_to_restart }}"
  when: services_to_restart is not defined

# Signage unit lifecycle belongs to the signage role. In particular, a fresh
# provisioning host has no unit files until that role installs them.
- name: Filter out signage services for signage role convergence
  ansible.builtin.set_fact:
    services_to_restart_filtered: "{{ services_to_restart | reject('match', 'signage-lite.*') | list }}"
  when: manage_signage_lite | default(false) | bool

- name: Use original services list on non-signage terminals
  ansible.builtin.set_fact:
    services_to_restart_filtered: "{{ services_to_restart }}"
  when: not (manage_signage_lite | default(false) | bool)

- name: Restart required services (clients) with retry
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/restart-client-service.yml"
  loop: "{{ services_to_restart_filtered }}"
  loop_control:
    loop_var: service_name

- name: Verify restarted client services and timers are healthy
  ansible.builtin.shell: |
    set -euo pipefail
    sleep 2
    unit={{ item | quote }}
    if [[ "${unit}" == "status-agent.service" ]]; then
      # status-agent is Type=oneshot, so a successful invocation is inactive.
      [[ "$(systemctl show --property=Result --value "${unit}")" == "success" ]]
      exit 0
    fi
    systemctl is-active --quiet "${unit}"
    if systemctl is-failed --quiet "${unit}"; then
      echo "${unit} is in failed state"
      exit 1
    fi
  args:
    executable: /bin/bash
  loop: "{{ services_to_restart_filtered | select('match', '\\.(service|timer)$') | list }}"
  loop_control:
    label: "{{ item }}"
  register: client_service_health
  retries: 3
  delay: 5
  until: client_service_health.rc == 0

- name: Configure NetworkManager to prevent WiFi password dialogs
  ansible.builtin.import_tasks: network.yml
  when: terminal_release_mode | default('full') == 'full'
