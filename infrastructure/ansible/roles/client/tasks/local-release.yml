---
- name: Require the fixed StoneBase local release contract
  ansible.builtin.assert:
    that:
      - inventory_hostname == 'raspi4-kensaku-stonebase01'
      - local_execution_mode == 'stonebase-local-ansible-poc'
      - local_execution_run_id is match('^[A-Za-z0-9][A-Za-z0-9_-]{2,79}$')
      - local_execution_candidate_sha is match('^[0-9a-f]{40}$')
      - local_execution_previous_sha is match('^[0-9a-f]{40}$')
      - local_execution_status_client_id is match('^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$')
      - terminal_release_mode == 'release-only'
      - terminal_release_transport == 'local-artifact'
    quiet: true

- name: Verify existing status-agent configuration without reading it into Ansible output
  ansible.builtin.shell: |
    /usr/bin/python3 - <<'PY'
    import os, re, stat
    path = '/etc/raspi-status-agent.conf'
    fd = os.open(path, os.O_RDONLY | getattr(os, 'O_NOFOLLOW', 0))
    try:
        info = os.fstat(fd)
        if not stat.S_ISREG(info.st_mode) or info.st_uid != 0 or stat.S_IMODE(info.st_mode) != 0o644 or info.st_size > 65536:
            raise SystemExit(1)
        data = os.read(fd, 65537).decode('utf-8')
    finally:
        os.close(fd)
    expected = {{ local_execution_status_client_id | to_json }}
    values = []
    pattern = re.compile(r'^\s*CLIENT_ID\s*=\s*["\']?([A-Za-z0-9][A-Za-z0-9._:-]{0,127})["\']?\s*(?:#.*)?$')
    for line in data.splitlines():
        match = pattern.fullmatch(line)
        if match:
            values.append(match.group(1))
    if values != [expected]:
        raise SystemExit(1)
    PY
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Build enabled local agent environment path list
  ansible.builtin.set_fact:
    local_agent_environment_paths: >-
      {{
        ([] if not (nfc_agent_enabled_local | bool) else [repo_path ~ '/clients/nfc-agent/.env'])
        + ([] if not (barcode_agent_enabled | bool) else [repo_path ~ '/clients/barcode-agent/.env'])
        + ([] if not (torque_agent_enabled | bool) else [repo_path ~ '/clients/torque-agent/.env'])
      }}
  no_log: true

- name: Inspect existing local agent environment files without reading values
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
  loop: "{{ local_agent_environment_paths }}"
  register: local_agent_environment_stats
  no_log: true

- name: Require existing root-bounded local agent environment files
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
      - item.stat.isreg | default(false)
      - not (item.stat.islnk | default(false))
      - item.stat.pw_name | default('') == ansible_user
      - item.stat.mode | default('') == '0600'
      - (item.stat.size | default(1048577) | int) <= 1048576
    quiet: true
  loop: "{{ local_agent_environment_stats.results | default([]) }}"
  no_log: true

- name: Run NFC agent lifecycle with the existing environment
  ansible.builtin.include_tasks: nfc-agent-lifecycle.yml
  when: nfc_agent_enabled_local | bool

- name: Run barcode agent lifecycle with the existing environment
  ansible.builtin.include_tasks: barcode-agent-lifecycle.yml
  when: barcode_agent_enabled | bool

- name: Run torque agent lifecycle with the existing environment
  ansible.builtin.include_tasks: torque-agent-lifecycle.yml
  when: torque_agent_enabled | bool

- name: Verify local release systemd services and timers
  ansible.builtin.shell: |
    set -euo pipefail
    unit={{ item | quote }}
    if [[ "${unit}" == "status-agent.service" ]]; then
      [[ "$(systemctl show --property=Result --value "${unit}")" == "success" ]]
    else
      systemctl is-active --quiet "${unit}"
      ! systemctl is-failed --quiet "${unit}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ services_to_restart | select('match', '\\.(service|timer)$') | list }}"
  changed_when: false
  register: local_release_systemd_health
  retries: 3
  delay: 5
  until: local_release_systemd_health.rc == 0
