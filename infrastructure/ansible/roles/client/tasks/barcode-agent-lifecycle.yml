---
# バーコードエージェント起動保証（責務: ライフサイクル）
# profile=barcode で docker compose 起動（他ホストでは .env 不要）

- name: Ensure Docker is available for barcode-agent
  ansible.builtin.command: docker --version
  register: barcode_docker_version_check
  changed_when: false
  failed_when: false

- name: Fail if Docker is not available (barcode-agent requires Docker)
  ansible.builtin.fail:
    msg: "barcode-agent には Docker が必要です。{{ inventory_hostname }} に Docker をインストールしてください。"
  when: barcode_docker_version_check.rc != 0

- name: Probe barcode-agent health before conditional Compose convergence
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ barcode_agent_rest_port | default(7072) }}/api/agent/status"
    method: GET
    status_code: [200]
    timeout: 10
  register: barcode_agent_pre_lifecycle_health
  changed_when: false
  failed_when: false

- name: Determine whether barcode-agent Compose convergence is required
  ansible.builtin.set_fact:
    barcode_agent_compose_converge_needed: >-
      {{
        barcode_agent_image_build_needed | default(true) | bool
        or barcode_agent_runtime_recreate_needed | default(true) | bool
        or (barcode_agent_pre_lifecycle_health.status | default(-1) | int) != 200
      }}
  changed_when: false

- name: Converge barcode-agent container when build, runtime, config, or health requires it
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ repo_path }}"
    compose_container_id() {
      docker compose -f infrastructure/docker/docker-compose.client.yml --profile barcode ps -q barcode-agent \
        2>/dev/null | head -n 1 || true
    }
    container_state() {
      local container_id="$1"
      if [[ -z "${container_id}" ]]; then
        return 0
      fi
      docker inspect --format \{\{.State.Status\}\} "${container_id}" 2>/dev/null || true
    }
    before_id="$(compose_container_id)"
    before_state="$(container_state "${before_id}")"
    {% if barcode_agent_image_build_needed | default(true) %}
    docker compose -f infrastructure/docker/docker-compose.client.yml --profile barcode up -d --build barcode-agent
    {% elif barcode_agent_runtime_recreate_needed | default(true) %}
    docker compose -f infrastructure/docker/docker-compose.client.yml --profile barcode up -d --force-recreate --no-build barcode-agent
    {% else %}
    docker compose -f infrastructure/docker/docker-compose.client.yml --profile barcode up -d --no-build barcode-agent
    {% endif %}
    after_id="$(compose_container_id)"
    after_state="$(container_state "${after_id}")"
    changed=false
    if [[ -z "${after_id}" || "${before_id}" != "${after_id}" || "${before_state}" != "running" ]]; then
      changed=true
    fi
    printf '%s\n' "${changed}"
  args:
    executable: /bin/bash
  register: barcode_agent_up_result
  changed_when: barcode_agent_up_result.stdout_lines | last | default('') == 'true'
  when: barcode_agent_compose_converge_needed | bool

- name: Wait for barcode-agent to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ barcode_agent_rest_port | default(7072) }}/api/agent/status"
    method: GET
    status_code: [200]
    timeout: 10
  register: barcode_agent_status_check
  retries: 5
  delay: 3
  until: barcode_agent_status_check.status == 200

- name: Capture docker compose ps for barcode-agent (diagnostics on failure)
  ansible.builtin.shell: |
    cd "{{ repo_path }}" && docker compose -f infrastructure/docker/docker-compose.client.yml ps -a
  register: barcode_agent_ps_result
  changed_when: false
  failed_when: false
  when: barcode_agent_status_check.status | default(0) != 200

- name: Emit barcode-agent status for diagnostics on failure
  ansible.builtin.debug:
    msg:
      - "barcode-agent status API: {{ barcode_agent_status_check.json | default({}) }}"
      - "docker compose ps: {{ barcode_agent_ps_result.stdout | default('') }}"
  when: barcode_agent_status_check.status | default(0) != 200
