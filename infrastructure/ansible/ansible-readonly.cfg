# Local inventory parsing for rolling-release --print-plan only.
#
# This configuration intentionally has no vault_password_file.  It must never
# be used for ansible-playbook or a mutating release; those operations continue
# to use ansible.cfg and its required deployment Vault access.
[defaults]
inventory = inventory.yml
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto
roles_path = ./roles

