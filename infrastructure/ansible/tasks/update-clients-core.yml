# journalctl 出力に無効なUTF-8（サロゲート等）が含まれると Ansible の MODULE_STRICT_UTF8 で失敗する。
# raspi4-robodrill01 で再発（KB-291, miscellaneous.md）。iconv -c で無効文字を除去する。
- name: Collect health check info
  ansible.builtin.shell: |
    set -euo pipefail
    echo "=== systemctl status signage-lite ==="
    systemctl status signage-lite --no-pager 2>/dev/null | head -n 20 | iconv -f utf-8 -t utf-8 -c 2>/dev/null || true
    echo "=== recent kiosk-browser logs ==="
    journalctl -u kiosk-browser.service -n 50 2>/dev/null | iconv -f utf-8 -t utf-8 -c 2>/dev/null || true
  args:
    executable: /bin/bash
  register: health_info
  changed_when: false

- name: Summarize deployment result
  ansible.builtin.debug:
    msg:
      - "Git: {{ 'changed' if git_result.changed else 'up-to-date' }}"
      - "Client service restart summary: {{ client_restart_results | default([]) }}"
      - "Docker restart summary: {{ docker_restart_summary | default([]) }}"

- name: Attach health info to run output
  ansible.builtin.debug:
    var: health_info.stdout_lines

- name: Verify authenticated signage endpoints with the host-local credential
  ansible.builtin.script:
    cmd: >-
      {{ playbook_dir }}/../../../scripts/deploy/signage-runtime-proof.py
      --check-endpoints
  changed_when: false
  register: signage_health
  retries: 3
  delay: 3
  until: signage_health.rc == 0
  when:
    - '"server" not in group_names'
    - signage_server_url is defined
    - signage_client_key is defined
    - manage_signage_lite | default(false) | bool
