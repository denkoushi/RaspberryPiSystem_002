---
- name: Validate Hermes tools boundary policy (repo smoke)
  ansible.builtin.command:
    argv:
      - python3
      - "{{ private_pi5_repo_root }}/scripts/private-pi5-hermes/validate_boundary_policy.py"
      - --check-docker-volumes
      - --emit-hermes-security
      - --emit-browser-env
  delegate_to: localhost
  become: false
  register: private_pi5_hermes_boundary_policy_validation
  changed_when: false

- name: Check Hermes tools profile paths exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ private_pi5_hermes_tools_data_dir }}/boundary-policy.tools.yaml"
    - "{{ private_pi5_hermes_tools_data_dir }}/workspace"
    - "{{ private_pi5_hermes_tools_data_dir }}/.env"
    - "{{ private_pi5_hermes_tools_config_dir }}/config.yaml"
  register: private_pi5_hermes_tools_path_stat
  failed_when: not private_pi5_hermes_tools_path_stat.stat.exists

- name: Read deployed Hermes tools config.yaml
  ansible.builtin.slurp:
    src: "{{ private_pi5_hermes_tools_config_dir }}/config.yaml"
  register: private_pi5_hermes_tools_config_slurp

- name: Set expected Hermes tools workspace docker mount
  ansible.builtin.set_fact:
    private_pi5_hermes_tools_workspace_mount: >-
      {{ private_pi5_hermes_tools_data_dir ~ '/workspace:/workspace' }}

- name: Parse emitted Hermes security contract
  ansible.builtin.set_fact:
    private_pi5_hermes_boundary_policy_contract: >-
      {{ private_pi5_hermes_boundary_policy_validation.stdout | from_json }}

- name: Validate Hermes tools config aligns with Phase D1/D2 contract
  ansible.builtin.assert:
    that:
      - >-
        {{
          (private_pi5_hermes_tools_file_enabled | default(false) | bool)
          == (
            (
              private_pi5_hermes_tools_workspace_mount
            )
            in (private_pi5_hermes_tools_config_slurp.content | b64decode)
          )
        }}
      - >-
        {{
          (
            private_pi5_hermes_tools_file_enabled | default(false) | bool
          )
          ==
          (
            not (
              '\n    - file\n'
              in (private_pi5_hermes_tools_config_slurp.content | b64decode)
            )
          )
        }}
    fail_msg: >-
      tools config.yaml does not match private_pi5_hermes_tools_file_enabled
      (expected workspace docker mount and file not in disabled_toolsets when D2).
  when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

- name: Validate Hermes tools config aligns with Phase D3 web contract
  ansible.builtin.assert:
    that:
      - >-
        {{
          (private_pi5_hermes_tools_web_enabled | default(false) | bool)
          ==
          (
            not (
              '\n    - web\n'
              in (private_pi5_hermes_tools_config_slurp.content | b64decode)
            )
          )
        }}
      - >-
        {{
          not (private_pi5_hermes_tools_web_enabled | default(false) | bool)
          or (
            'website_blocklist:' in (private_pi5_hermes_tools_config_slurp.content | b64decode)
            and 'enabled: true' in (private_pi5_hermes_tools_config_slurp.content | b64decode)
          )
        }}
      - >-
        {{
          not (private_pi5_hermes_tools_web_enabled | default(false) | bool)
          or (
            (
              (private_pi5_hermes_tools_config_slurp.content | b64decode)
              .splitlines()
              | select('equalto', 'security:')
              | list
              | length
            ) == 1
          )
        }}
    fail_msg: >-
      tools config.yaml does not match private_pi5_hermes_tools_web_enabled
      (expected web not in disabled_toolsets, single security block, and website_blocklist enabled when D3).
  when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

- name: Validate Hermes tools website_blocklist domains in config (Phase D3)
  ansible.builtin.assert:
    that:
      - >-
        {{
          (
            ('"' ~ item ~ '"')
            in (private_pi5_hermes_tools_config_slurp.content | b64decode)
          )
        }}
    fail_msg: >-
      tools config.yaml missing website_blocklist domain {{ item }}
      (expected quoted domain from boundary-policy.tools.yaml).
  loop: >-
    {{
      private_pi5_hermes_boundary_policy_contract.hermes_security.website_blocklist.domains
      | default([])
    }}
  when:
    - private_pi5_hermes_tools_profile_enabled | default(false) | bool
    - private_pi5_hermes_tools_web_enabled | default(false) | bool

- name: Ensure Hermes tools gateway is not running (Phase D1)
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-tools-gateway
  register: private_pi5_hermes_tools_gateway_active
  changed_when: false
  failed_when: private_pi5_hermes_tools_gateway_active.rc == 0
  when:
    - private_pi5_hermes_tools_profile_enabled | default(false) | bool
    - not (private_pi5_hermes_tools_file_enabled | default(false) | bool)
    - not (private_pi5_hermes_tools_web_enabled | default(false) | bool)

- name: Ensure Hermes tools gateway is running (Phase D2, D3, or D4)
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-tools-gateway
  register: private_pi5_hermes_tools_gateway_active_d2
  changed_when: false
  failed_when: private_pi5_hermes_tools_gateway_active_d2.rc != 0
  when:
    - private_pi5_hermes_tools_profile_enabled | default(false) | bool
    - >-
      (private_pi5_hermes_tools_file_enabled | default(false) | bool)
      or (private_pi5_hermes_tools_web_enabled | default(false) | bool)
      or (private_pi5_hermes_tools_browser_enabled | default(false) | bool)

- name: Read deployed Hermes tools .env
  ansible.builtin.slurp:
    src: "{{ private_pi5_hermes_tools_data_dir }}/.env"
  register: private_pi5_hermes_tools_env_slurp
  when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

- name: Validate Hermes tools Docker disk quota disabled for Pi5 ext4
  ansible.builtin.assert:
    that:
      - "'container_disk: 0' in (private_pi5_hermes_tools_config_slurp.content | b64decode)"
    fail_msg: >-
      tools config.yaml must set container_disk: 0 (Hermes default 51200 uses Docker
      --storage-opt which fails on Pi5 ext4 overlay).
  when: private_pi5_hermes_tools_profile_enabled | default(false) | bool

- name: Validate Hermes tools config aligns with Phase D4 browser contract
  ansible.builtin.assert:
    that:
      - >-
        {{
          (private_pi5_hermes_tools_browser_enabled | default(false) | bool)
          ==
          (
            not (
              '\n    - browser\n'
              in (private_pi5_hermes_tools_config_slurp.content | b64decode)
            )
          )
        }}
      - >-
        {{
          not (private_pi5_hermes_tools_browser_enabled | default(false) | bool)
          or (
            'auto_local_for_private_urls: true' in (private_pi5_hermes_tools_config_slurp.content | b64decode)
          )
        }}
      - >-
        {{
          not (private_pi5_hermes_tools_browser_enabled | default(false) | bool)
          or (
            'AGENT_BROWSER_ARGS=' in (private_pi5_hermes_tools_env_slurp.content | b64decode)
          )
        }}
      - >-
        {{
          not (private_pi5_hermes_tools_browser_enabled | default(false) | bool)
          or (
            (
              private_pi5_hermes_boundary_policy_contract.hermes_browser
              .forbidden_cloud_browser_env_keys
              | default([])
              | reject(
                  'in',
                  (
                    private_pi5_hermes_boundary_policy_contract.hermes_browser
                    .forbidden_cloud_browser_env_keys
                    | select(
                        'match',
                        (
                          '^('
                          ~ (
                            (
                              private_pi5_hermes_tools_env_slurp.content | b64decode
                            )
                            | regex_findall('^([A-Z0-9_]+)=', multiline=True)
                            | join('|')
                          )
                          ~ ')$'
                        )
                      )
                    | list
                  )
                )
              | list
              | length
            ) == (
              private_pi5_hermes_boundary_policy_contract.hermes_browser
              .forbidden_cloud_browser_env_keys
              | default([])
              | length
            )
          )
        }}
    fail_msg: >-
      tools config/.env does not match private_pi5_hermes_tools_browser_enabled
      (expected browser not in disabled_toolsets, browser.auto_local_for_private_urls,
      AGENT_BROWSER_ARGS in tools .env, and no cloud browser API keys when D4).
  when:
    - private_pi5_hermes_tools_profile_enabled | default(false) | bool
    - private_pi5_hermes_tools_env_slurp is defined

- name: Verify DGX accepts tools profile Bearer token
  ansible.builtin.shell:
    cmd: >-
      set -a && source {{ private_pi5_hermes_tools_data_dir }}/.env && set +a &&
      curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $OPENAI_API_KEY"
      {{ private_pi5_hermes_dgx_base_url }}/v1/models
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ private_pi5_hermes_user }}"
  register: private_pi5_hermes_tools_dgx_models
  changed_when: false
  failed_when: private_pi5_hermes_tools_dgx_models.stdout | trim != '200'
