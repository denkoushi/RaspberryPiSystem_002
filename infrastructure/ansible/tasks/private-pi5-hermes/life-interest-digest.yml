---
# D19-life: Daily Interest Digest notification timer.
- name: Install Hermes Life Pilot Daily Interest Digest systemd units
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: "../templates/private-pi5-hermes-life-interest-digest.service.j2"
      dest: /etc/systemd/system/hermes-life-interest-digest.service
    - src: "../templates/private-pi5-hermes-life-interest-digest.timer.j2"
      dest: /etc/systemd/system/hermes-life-interest-digest.timer
  notify: Reload systemd daemon

- name: Enable Hermes Life Pilot Daily Interest Digest timer
  ansible.builtin.systemd:
    name: hermes-life-interest-digest.timer
    enabled: true
    state: started
    daemon_reload: true
  when: private_pi5_hermes_life_interest_digest_active | bool

- name: Disable Hermes Life Pilot Daily Interest Digest timer when inactive
  ansible.builtin.systemd:
    name: hermes-life-interest-digest.timer
    enabled: false
    state: stopped
    daemon_reload: true
  when: not (private_pi5_hermes_life_interest_digest_active | bool)

- name: Warn when Daily Interest Digest timer is inactive
  ansible.builtin.debug:
    msg: >-
      hermes-life-interest-digest is inactive: enable Life Pilot, set
      private_pi5_hermes_life_interest_digest_enabled, and configure
      private_pi5_hermes_discord_bot_token in the local inventory fragment.
  when:
    - private_pi5_hermes_life_pilot_enabled | default(false) | bool
    - private_pi5_hermes_life_interest_digest_enabled | default(false) | bool
    - not (private_pi5_hermes_life_interest_digest_active | bool)
