---
# D8-life: proactive Life Pilot morning/evening check-ins.
- name: Install Hermes Life Pilot proactive systemd units
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: "../templates/private-pi5-hermes-life-proactive@.service.j2"
      dest: /etc/systemd/system/hermes-life-proactive@.service
    - src: "../templates/private-pi5-hermes-life-proactive-morning.timer.j2"
      dest: /etc/systemd/system/hermes-life-proactive-morning.timer
    - src: "../templates/private-pi5-hermes-life-proactive-evening.timer.j2"
      dest: /etc/systemd/system/hermes-life-proactive-evening.timer
    - src: "../templates/private-pi5-hermes-life-followup.service.j2"
      dest: /etc/systemd/system/hermes-life-followup.service
    - src: "../templates/private-pi5-hermes-life-followup.timer.j2"
      dest: /etc/systemd/system/hermes-life-followup.timer
    - src: "../templates/private-pi5-hermes-life-discord-ui.service.j2"
      dest: /etc/systemd/system/hermes-life-discord-ui.service
  notify: Reload systemd daemon

- name: Enable Hermes Life Pilot proactive timers
  ansible.builtin.systemd:
    name: "{{ item.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - name: hermes-life-proactive-morning.timer
      active: "{{ private_pi5_hermes_life_proactive_morning_active }}"
    - name: hermes-life-proactive-evening.timer
      active: "{{ private_pi5_hermes_life_proactive_evening_active }}"
  when: item.active | bool

- name: Disable Hermes Life Pilot proactive timers when inactive
  ansible.builtin.systemd:
    name: "{{ item.name }}"
    enabled: false
    state: stopped
    daemon_reload: true
  loop:
    - name: hermes-life-proactive-morning.timer
      active: "{{ private_pi5_hermes_life_proactive_morning_active }}"
    - name: hermes-life-proactive-evening.timer
      active: "{{ private_pi5_hermes_life_proactive_evening_active }}"
  when: not (item.active | bool)

- name: Enable Hermes Life Pilot follow-up timer
  ansible.builtin.systemd:
    name: hermes-life-followup.timer
    enabled: true
    state: started
    daemon_reload: true
  when: private_pi5_hermes_life_followup_loop_active | bool

- name: Disable Hermes Life Pilot follow-up timer when inactive
  ansible.builtin.systemd:
    name: hermes-life-followup.timer
    enabled: false
    state: stopped
    daemon_reload: true
  when: not (private_pi5_hermes_life_followup_loop_active | bool)

- name: Warn when Life Pilot proactive loop is inactive
  ansible.builtin.debug:
    msg: >-
      hermes-life-proactive is inactive: enable Life Pilot and set
      private_pi5_hermes_discord_bot_token in the local inventory fragment.
  when:
    - private_pi5_hermes_life_pilot_enabled | default(false) | bool
    - not (private_pi5_hermes_life_proactive_loop_active | bool)

- name: Enable Hermes Life Pilot Discord UI relay
  ansible.builtin.systemd:
    name: hermes-life-discord-ui.service
    enabled: true
    state: started
    daemon_reload: true
  when: private_pi5_hermes_life_discord_ui_relay_active | bool

- name: Disable Hermes Life Pilot Discord UI relay when inactive
  ansible.builtin.systemd:
    name: hermes-life-discord-ui.service
    enabled: false
    state: stopped
    daemon_reload: true
  when: not (private_pi5_hermes_life_discord_ui_relay_active | bool)
