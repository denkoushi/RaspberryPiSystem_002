---
# D6-pre: reconcile only the Discord global /daily slash command.
- name: Sync Discord daily pilot slash command
  ansible.builtin.command:
    argv:
      - python3
      - "{{ private_pi5_repo_root }}/scripts/private-pi5-hermes/sync-discord-commands.py"
      - --daily-state
      - "{{ 'present' if (private_pi5_hermes_daily_pilot_enabled | default(false) | bool) else 'absent' }}"
  environment:
    DISCORD_BOT_TOKEN: "{{ private_pi5_hermes_discord_bot_token }}"
  register: private_pi5_hermes_daily_command_sync
  changed_when: '"\"changed\": true" in private_pi5_hermes_daily_command_sync.stdout'
  delegate_to: localhost
  become: false
  no_log: true
