---
# D6-pre / D6-life: reconcile Discord global pilot slash commands.
- name: Sync Discord daily and life pilot slash commands
  ansible.builtin.command:
    argv:
      - python3
      - "{{ private_pi5_repo_root }}/scripts/private-pi5-hermes/sync-discord-commands.py"
      - --daily-state
      - "{{ 'present' if (private_pi5_hermes_daily_pilot_enabled | default(false) | bool) else 'absent' }}"
      - --life-state
      - "{{ 'present' if (private_pi5_hermes_life_pilot_enabled | default(false) | bool) else 'absent' }}"
      - --research-state
      - "{{ 'present' if (private_pi5_hermes_discord_research_bridge_enabled | default(false) | bool) else 'absent' }}"
  environment:
    DISCORD_BOT_TOKEN: "{{ private_pi5_hermes_discord_bot_token }}"
  register: private_pi5_hermes_daily_command_sync
  changed_when: '"\"changed\": true" in private_pi5_hermes_daily_command_sync.stdout'
  delegate_to: localhost
  become: false
  no_log: true
