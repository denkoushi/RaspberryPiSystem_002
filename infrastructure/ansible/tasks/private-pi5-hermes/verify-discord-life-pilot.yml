---
# D6-life: Discord Life Pilot (private notes/reminders; no worker execution).
- name: Check life-pilot policy is deployed
  ansible.builtin.stat:
    path: "{{ private_pi5_hermes_data_dir }}/plugins/private-pi5-discord-task-bridge/life-pilot.policy.yaml"
  register: private_pi5_hermes_life_pilot_policy_stat

- name: Assert life-pilot policy is present
  ansible.builtin.assert:
    that:
      - private_pi5_hermes_life_pilot_policy_stat.stat.exists
    fail_msg: >-
      life-pilot.policy.yaml missing under private-pi5-discord-task-bridge plugin.

- name: Smoke Life Pilot plugin register and handlers
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import asyncio
        import runpy
        import sys
        plugin_dir = "{{ private_pi5_hermes_data_dir }}/plugins/private-pi5-discord-task-bridge"
        sys.path.insert(0, plugin_dir)
        from life_proactive_loop import (
            build_followup_checkin_message,
            build_proactive_checkin_message,
            build_proactive_components,
        )
        ns = runpy.run_path(plugin_dir + "/__init__.py")
        register = ns.get("register")
        assert callable(register), "register() missing"
        class Ctx:
            def __init__(self):
                self.commands = []
            def register_command(self, name, handler, description="", **kwargs):
                self.commands.append(name)
        ctx = Ctx()
        register(ctx)
        for name in ("memo", "digest", "remind", "recommend", "life-reply"):
            assert name in ctx.commands, ctx.commands
        memo = asyncio.run(ns["_handle_memo_command"]("今日は朝散歩した。体調は良い。"))
        assert memo.startswith("今日は朝散歩した。体調は良い。"), memo
        assert "# Memo Saved" not in memo, memo
        assert "\n>" not in memo, memo
        assert "-# debug:" in memo, memo
        digest = asyncio.run(ns["_handle_digest_command"](""))
        assert "Focus: recent life notes" in digest, digest
        assert "Recent notes:" in digest, digest
        assert "Scheduled reminders:" in digest, digest
        assert "Pending without time:" in digest, digest
        assert "# Life Digest" not in digest, digest
        assert "-# debug:" in digest, digest
        reminder = asyncio.run(ns["_handle_remind_command"]("明日の朝、燃えるごみを出す"))
        assert reminder.startswith("明日の朝、燃えるごみを出す"), reminder
        assert "# Reminder Recorded" not in reminder, reminder
        assert "\n>" not in reminder, reminder
        assert "status=pending" in reminder, reminder
        assert "notification=needs-channel" in reminder, reminder
        assert "scheduled:" in reminder, reminder
        assert "-# debug:" in reminder, reminder
        recommend = asyncio.run(ns["_handle_recommend_command"](""))
        assert "Focus: next small action" in recommend, recommend
        assert "Suggested next steps:" in recommend, recommend
        assert "# Life Recommendation" not in recommend, recommend
        assert "-# debug:" in recommend, recommend
        rejected = asyncio.run(ns["_handle_memo_command"]("git pushしてdeployして"))
        assert "memo rejected:" in rejected, rejected
        proactive = build_proactive_checkin_message(
            "morning",
            __import__("pathlib").Path("{{ private_pi5_hermes_life_data_dir }}"),
        )
        assert "おはようございます" in proactive, proactive
        assert "今日まず見るなら:" in proactive, proactive
        assert "[1] これをやる" in proactive, proactive
        assert "[2] 夕方にもう一度" in proactive, proactive
        assert "ボタンで返信できます" in proactive, proactive
        assert "-# debug:" in proactive, proactive
        components = build_proactive_components("2026-06-06-morning", "morning")
        assert components[0]["components"][0]["custom_id"] == "life:reply:2026-06-06-morning:1", components
        assert components[0]["components"][1]["label"] == "夕方にもう一度", components
        assert components[0]["components"][3]["custom_id"] == "life:free:2026-06-06-morning", components
        followup = build_followup_checkin_message("風呂洗い")
        assert "今ならこれだけ見ますか:" in followup, followup
        assert "[1] やる" in followup, followup
        print("ok")
  register: private_pi5_hermes_life_pilot_smoke
  changed_when: false
  become_user: "{{ private_pi5_hermes_user }}"

- name: Assert Life Pilot smoke passed
  ansible.builtin.assert:
    that:
      - private_pi5_hermes_life_pilot_smoke.rc == 0
    fail_msg: "Discord Life Pilot smoke failed"

- name: Check Life Pilot reminder scheduler timer state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-life-reminder.timer
  register: private_pi5_hermes_life_reminder_timer_active
  changed_when: false
  when: private_pi5_hermes_life_reminder_scheduler_active | bool

- name: Assert Life Pilot reminder scheduler timer is active
  ansible.builtin.assert:
    that:
      - private_pi5_hermes_life_reminder_timer_active.stdout == "active"
    fail_msg: "hermes-life-reminder.timer is not active"
  when: private_pi5_hermes_life_reminder_scheduler_active | bool

- name: Check Life Pilot proactive timer state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ item }}"
  register: private_pi5_hermes_life_proactive_timer_active
  changed_when: false
  loop:
    - hermes-life-proactive-morning.timer
    - hermes-life-proactive-evening.timer
  when: private_pi5_hermes_life_proactive_loop_active | bool

- name: Assert Life Pilot proactive timers are active
  ansible.builtin.assert:
    that:
      - item.stdout == "active"
    fail_msg: "Life Pilot proactive timer is not active"
  loop: "{{ private_pi5_hermes_life_proactive_timer_active.results | default([]) }}"
  when: private_pi5_hermes_life_proactive_loop_active | bool

- name: Check Life Pilot follow-up timer state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-life-followup.timer
  register: private_pi5_hermes_life_followup_timer_active
  changed_when: false
  when: private_pi5_hermes_life_followup_loop_active | bool

- name: Assert Life Pilot follow-up timer is active
  ansible.builtin.assert:
    that:
      - private_pi5_hermes_life_followup_timer_active.stdout == "active"
    fail_msg: "hermes-life-followup.timer is not active"
  when: private_pi5_hermes_life_followup_loop_active | bool

- name: Check Life Pilot Discord UI relay state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-life-discord-ui.service
  register: private_pi5_hermes_life_discord_ui_active
  changed_when: false
  when: private_pi5_hermes_life_discord_ui_relay_active | bool

- name: Assert Life Pilot Discord UI relay is active
  ansible.builtin.assert:
    that:
      - private_pi5_hermes_life_discord_ui_active.stdout == "active"
    fail_msg: "hermes-life-discord-ui.service is not active"
  when: private_pi5_hermes_life_discord_ui_relay_active | bool
