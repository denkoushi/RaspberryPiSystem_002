---
# Retired on purpose. Release rollback is a coordinator-owned operation bound
# to one run-specific manifest. Timestamp discovery could select another run's
# files, so this legacy task file must never mutate a terminal.
- name: Reject retired timestamp-based terminal rollback
  ansible.builtin.fail:
    msg: >-
      Timestamp-based terminal rollback is retired and cannot be run directly.
      Use the rolling-release coordinator, which restores only the exact
      run-specific manifest captured before deployment.
