---
# Direct application deployment bypasses per-terminal maintenance, rollback and
# the Phase 3 gateway lifecycle.  Emergency rollout policy is enforced by the
# coordinator and must never become a direct-playbook escape hatch.
- name: Refuse an application deployment outside the rolling release coordinator
  ansible.builtin.assert:
    that:
      - release_orchestrated | default(false) | bool
    fail_msg: >-
      Direct application deployment is blocked. Use scripts/update-all-clients.sh
      so the Pi5 Phase 3 lifecycle and per-terminal maintenance are enforced.
