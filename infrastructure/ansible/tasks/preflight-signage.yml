---
# Read-only signage release preflight. Runtime quiescing belongs to the
# coordinator (release-only) or prestage-signage-runtime.yml (provisioning).

- name: Determine signage device type and load defaults
  ansible.builtin.set_fact:
    device_type: "{{ device_type | default('default') }}"
    device_config: >-
      {{
        device_type_defaults[device_type | default('default')]
        | default(device_type_defaults['default'])
      }}

- name: Expand signage preflight configuration
  ansible.builtin.set_fact:
    memory_required_mb: "{{ device_config.memory_required_mb }}"
    stop_lightdm: "{{ device_config.stop_lightdm }}"
    services_to_stop: "{{ device_config.services_to_stop }}"

- name: Check required signage unit files without changing service state
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - --property=LoadState
      - --value
      - "{{ item }}"
  loop: >-
    {{
      (
        services_to_stop
        + [
          'signage-lite-update.service',
          'signage-lite-watchdog.service',
          'signage-daily-reboot.service',
          'signage-daily-reboot.timer'
        ]
      ) | unique | list
    }}
  register: signage_unit_preflight
  changed_when: false
  failed_when: >-
    signage_unit_preflight.rc != 0
    or signage_unit_preflight.stdout | trim != 'loaded'

- name: Require daily reboot service to be inactive during release
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - signage-daily-reboot.service
  register: signage_daily_reboot_preflight
  changed_when: false
  failed_when: signage_daily_reboot_preflight.stdout | trim != 'inactive'

- name: Check available memory without stopping workloads
  ansible.builtin.shell: free -m | awk '/^Mem:/ {print $7}'
  register: available_memory_mb_raw
  changed_when: false

- name: Extract available memory value
  ansible.builtin.set_fact:
    available_memory_mb: "{{ available_memory_mb_raw.stdout | trim | int }}"

- name: Fail if signage release has insufficient memory
  ansible.builtin.fail:
    msg: >-
      CRITICAL: {{ inventory_hostname }} has {{ available_memory_mb }}MB available;
      the read-only release preflight requires at least {{ memory_required_mb }}MB.
      Quiesce the host through the coordinator or provision it separately.
  when: available_memory_mb | default(0) < memory_required_mb
