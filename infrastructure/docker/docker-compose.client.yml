# NFCエージェント: 運用時は Ansible が clients/nfc-agent/.env を配布する。
# 初回/手動セットアップ時は setup-nfc-agent.sh が .env 未存在なら .env.example をコピーして作成する。
services:
  nfc-agent:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.nfc-agent
    network_mode: host
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    env_file:
      - ../../clients/nfc-agent/.env
    volumes:
      - nfc-agent-data:/data
      - /run/pcscd:/run/pcscd:ro
    restart: unless-stopped

  # シリアル(CDC ACM)バーコードリーダー用。Ansible が clients/barcode-agent/.env を配布する。
  # profile=barcode のため、通常の `docker compose up -d` では起動しない（nfc-agent のみ）。
  barcode-agent:
    profiles:
      - barcode
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.barcode-agent
    network_mode: host
    privileged: true
    env_file:
      - ../../clients/barcode-agent/.env
    restart: unless-stopped

  torque-agent:
    profiles:
      - torque
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.torque-agent
    network_mode: host
    privileged: true
    env_file:
      - ../../clients/torque-agent/.env
    volumes:
      - torque-agent-data:/data
      - /dev/input:/dev/input
      - /run/torque-bluetooth-guard:/run/torque-bluetooth-guard
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:7073/health', timeout=3)); assert data.get('ok') is True"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  nfc-agent-data:
  torque-agent-data:
