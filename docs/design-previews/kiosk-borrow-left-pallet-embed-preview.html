<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キオスク持出 — 左ペインにパレット操作を併設（デザインプレビュー）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0f172a;
    }
    #design-canvas {
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      background: #1e293b;
    }
  </style>
</head>
<body>
  <div id="design-canvas" class="flex text-white">
    <!-- キオスク header 簡易 -->
    <header class="absolute left-0 right-0 top-0 z-10 flex h-14 shrink-0 items-center border-b border-white/10 bg-slate-900/90 px-4 backdrop-blur">
      <span class="text-sm font-semibold text-white/80">キオスク（プレビュー）</span>
      <span class="ml-4 text-xs text-emerald-300">/kiosk/tag — 左ペイン併設イメージ</span>
    </header>

    <main class="mt-14 flex min-h-0 flex-1 gap-4 p-4">
      <!-- 左ペイン w-80 = 320px -->
      <div class="flex w-80 shrink-0 flex-col gap-3 overflow-hidden">
        <!-- 既存: 持出フロー（高さはコンテンツ次第・shrink-0） -->
        <section class="shrink-0 rounded-xl border-2 border-slate-500 bg-white p-4 text-slate-900 shadow-lg">
          <h2 class="mb-3 text-lg font-bold">持出フロー</h2>
          <div class="grid grid-cols-2 gap-3 text-center">
            <div class="rounded-xl border-2 border-emerald-400 bg-emerald-600 p-3 text-white shadow">
              <p class="text-xs font-semibold">① アイテム</p>
              <p class="mt-1 text-lg font-bold">---</p>
            </div>
            <div class="rounded-xl border-2 border-white/20 bg-white/10 p-3 text-slate-600 shadow">
              <p class="text-xs font-semibold">② 社員</p>
              <p class="mt-1 text-lg font-bold">---</p>
            </div>
          </div>
          <div class="mt-3 flex justify-center">
            <button type="button" class="rounded-lg bg-slate-700 px-4 py-2 text-sm font-semibold text-white">リセット</button>
          </div>
        </section>

        <!-- 新規: パレット埋め込み（余白を使用 flex-1 min-h-0） -->
        <section class="flex min-h-0 flex-1 flex-col gap-3 overflow-hidden rounded-lg bg-slate-900/80 p-3 ring-1 ring-white/10">
          <p class="shrink-0 text-xs font-semibold uppercase tracking-wide text-emerald-200/90">パレット（簡易）</p>

          <!-- 1. パレット番号 10 -->
          <div class="shrink-0" role="group" aria-label="パレット番号1から10">
            <div class="grid grid-cols-5 gap-1.5">
              <button type="button" class="rounded-lg bg-amber-500 py-2 text-center text-lg font-bold tabular-nums text-slate-900">1</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">2</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">3</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">4</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">5</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">6</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">7</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">8</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">9</button>
              <button type="button" class="rounded-lg bg-slate-800 py-2 text-center text-lg font-bold tabular-nums hover:bg-slate-700">10</button>
            </div>
          </div>

          <!-- 2. 操作ボタン -->
          <div class="shrink-0 flex flex-wrap gap-2">
            <button type="button" class="rounded-lg bg-emerald-600 px-3 py-2 text-xs font-semibold text-white">追加</button>
            <button type="button" class="rounded-lg border border-white/20 bg-slate-700 px-3 py-2 text-xs font-semibold text-white">上書き</button>
            <button type="button" class="rounded-lg px-3 py-2 text-xs font-semibold text-white/90 hover:bg-white/10">部分削除</button>
            <button type="button" class="rounded-lg px-3 py-2 text-xs font-semibold text-red-200 hover:bg-red-900/40">全削除</button>
          </div>

          <!-- 3. イラスト -->
          <div class="shrink-0 flex justify-center">
            <div class="flex h-28 w-full max-w-[17rem] items-center justify-center rounded-md border border-dashed border-white/25 bg-slate-800/80 text-xs text-white/50">
              加工機イラスト（プレースホルダ）
            </div>
          </div>

          <!-- 4. 機種名（パレット画面で選んだ既定） -->
          <div class="shrink-0 border-l-2 border-amber-400/80 pl-2">
            <h3 class="text-base font-bold leading-snug text-white">立式マシニング FV-80</h3>
            <p class="font-mono text-xs text-white/60">資源CD: M-FV80-01</p>
            <p class="mt-1 text-xs text-white/75">パレット <span class="font-mono font-bold text-amber-200">1</span> を選択中</p>
          </div>

          <!-- 5. スキャン部品カード（スクロール） -->
          <div class="min-h-0 flex-1 overflow-y-auto overscroll-y-contain rounded-md bg-slate-950/50 p-2">
            <ul class="space-y-2">
              <li>
                <button type="button" class="w-full rounded-md border border-amber-400 bg-amber-500/20 px-3 py-2 text-left text-sm">
                  <div class="font-mono text-xs text-white/60">FHINCD-001</div>
                  <div class="font-semibold">シャフト A</div>
                  <div class="text-xs text-white/70">製番 25A-1001</div>
                </button>
              </li>
              <li>
                <button type="button" class="w-full rounded-md border border-white/10 bg-slate-800/80 px-3 py-2 text-left text-sm hover:border-white/30">
                  <div class="font-mono text-xs text-white/60">FHINCD-002</div>
                  <div class="font-semibold">ハウジング B</div>
                  <div class="text-xs text-white/70">製番 25A-1002</div>
                </button>
              </li>
              <li>
                <button type="button" class="w-full rounded-md border border-white/10 bg-slate-800/80 px-3 py-2 text-left text-sm hover:border-white/30">
                  <div class="font-mono text-xs text-white/60">FHINCD-003</div>
                  <div class="font-semibold">カバー C</div>
                  <div class="text-xs text-white/70">製番 25A-1003</div>
                </button>
              </li>
              <li>
                <button type="button" class="w-full rounded-md border border-white/10 bg-slate-800/80 px-3 py-2 text-left text-sm hover:border-white/30">
                  <div class="font-mono text-xs text-white/60">FHINCD-004</div>
                  <div class="font-semibold">プレート D</div>
                  <div class="text-xs text-white/70">製番 25A-1004</div>
                </button>
              </li>
            </ul>
          </div>
        </section>
      </div>

      <!-- 右ペイン（プレースホルダ — 実装対象外） -->
      <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden rounded-lg border-2 border-dashed border-white/20 bg-slate-800/40 p-6">
        <p class="text-sm font-semibold text-white/50">右ペイン（持出一覧など）</p>
        <p class="mt-2 text-xs text-white/40">本プレビューでは左ペインの併設イメージのみ。右は変更しません。</p>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var canvas = document.getElementById('design-canvas');
      function scale() {
        var sx = window.innerWidth / 1920;
        var sy = window.innerHeight / 1080;
        var s = Math.min(sx, sy);
        canvas.style.transform = 'scale(' + s + ')';
      }
      scale();
      window.addEventListener('resize', scale);
    })();
  </script>
</body>
</html>
