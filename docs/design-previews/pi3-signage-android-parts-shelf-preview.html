<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #333;
      --nw: #F59E0B; /* 北・西 黄 */
      --n:  #7C3AED; /* 北・中央 紫 */
      --ne: #DC2626; /* 北・東 赤 */
      --w:  #16A34A; /* 中央・西 緑 */
      --c:  #6B7280; /* 中央・中央 グレー */
      --e:  #78350F; /* 中央・東 茶 */
      --sw: #EA580C; /* 南・西 オレンジ */
      --s:  #2563EB; /* 南・中央 青 */
      --se: #EC4899; /* 南・東 ピンク */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      font-family: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      height: 100vh;
      height: 100dvh;
    }

    .zone {
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .zone[data-z="nw"] { background: var(--nw); }
    .zone[data-z="n"]  { background: var(--n); }
    .zone[data-z="ne"] { background: var(--ne); }
    .zone[data-z="w"]  { background: var(--w); }
    .zone[data-z="c"]  { background: var(--c); }
    .zone[data-z="e"]  { background: var(--e); }
    .zone[data-z="sw"] { background: var(--sw); }
    .zone[data-z="s"]  { background: var(--s); }
    .zone[data-z="se"] { background: var(--se); }

    /* ── ゾーンヘッダ（方位＋件数） ── */
    .zone-head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.6rem 0.3rem;
      background: rgba(0, 0, 0, 0.18);
    }
    .zone-title {
      display: flex;
      align-items: baseline;
      gap: 0.4em;
    }
    .zone-dir {
      font-size: clamp(0.65rem, 1.5vw, 0.95rem);
      font-weight: 800;
      opacity: 0.92;
      letter-spacing: 0.02em;
    }
    .zone-count {
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      font-weight: 700;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }

    /* ── アイテムリスト ── */
    .zone-items {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.15rem 0.35rem 0.25rem;
    }
    .zone-items::-webkit-scrollbar { width: 3px; }
    .zone-items::-webkit-scrollbar-track { background: transparent; }
    .zone-items::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }

    /* 左→右: 製番 / 品名 / 機種名（機種は文字数がばらつく想定で右列に収める） */
    .row {
      display: grid;
      grid-template-columns: minmax(4.8ch, 5.5ch) minmax(0, 1fr) minmax(7ch, 1.1fr);
      gap: 0.35em 0.45em;
      align-items: baseline;
      padding: 0.2rem 0.25rem;
      font-size: clamp(0.52rem, 1.3vw, 0.72rem);
      line-height: 1.3;
    }

    .r-serial {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-weight: 700;
      font-size: 0.92em;
      color: rgba(255, 255, 255, 0.72);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      text-align: left;
    }
    .r-part {
      min-width: 0;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .r-model {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-weight: 900;
      font-size: 1.02em;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      text-align: right;
      word-break: break-all;
      line-height: 1.2;
    }
  </style>
</head>
