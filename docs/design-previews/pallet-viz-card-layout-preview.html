<!doctype html>
<html lang="ja">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 p-3 text-slate-50">
    <div class="mx-auto flex max-w-5xl flex-col gap-4 md:flex-row">

        <div class="flex h-[22rem] min-h-0 flex-col rounded-lg bg-slate-900/60 p-2">

          >

                <button

                  aria-pressed="true"
                >

                    <div class="shrink-0 font-mono text-[1.6875rem] font-bold tabular-nums text-amber-200">12</div>
                    <div class="min-w-0 flex-1 truncate font-mono text-[1.125rem] text-white/70">VTC-200C 表示名</div>

                  </div>

                  </div>
                  <div class="flex min-w-0 items-start gap-3 text-[1.125rem] text-white/75">
                    <span class="shrink-0 font-mono tabular-nums">2026-04-20</span>
                    <span class="line-clamp-2 min-w-0 flex-1 text-left font-semibold leading-snug text-white/90"
                      >ブレーキディスク（左右セット）長い部品名の折返し例</span

                </button>
              </li>
              <li>

                  type="button"
