<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キオスク順位ボード 既存カード（本番相当）</title>
  <style>
    /**
     * 本番相当プレビュー（指示用ベースライン）
     * LeaderOrderResourceCard.tsx / LeaderOrderResourceRow.tsx
     * LeaderOrderRowClusterLine.tsx / LeaderOrderRowOrderSelect.tsx
     */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: rgb(2 6 23);
      color: rgba(255 255 255 / 0.92);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    .page { min-height: 100vh; padding: 12px 14px 20px; }

    .note {
      max-width: 56rem;
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255 255 255 / 0.12);
      background: rgba(15 23 42 / 0.55);
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255 255 255 / 0.72);
    }

    .note code {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: rgba(255 255 255 / 0.88);
    }

    /* LeaderBoardGrid 1セル相当 */
    .grid-mock {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-auto-rows: minmax(14rem, 1fr);
      gap: 10px;
      max-width: 22rem;
    }

    /* LeaderOrderResourceCard */
    .loc-card {
      display: flex;
      height: 100%;
      min-height: 12rem;
      flex-direction: column;
      border-radius: 8px;
      border: 1px solid rgba(103 232 249 / 0.7);
      background: rgba(15 23 42 / 0.6);
      padding: 10px;
      font-size: 12px;
      line-height: 1rem;
      box-shadow: 0 0 0 1px rgba(34 211 238 / 0.3);
    }

    .loc-head {
      margin-bottom: 6px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: 8px;
      row-gap: 2px;
      padding: 0 2px;
    }

    .loc-resource-cd {
      font-family: ui-monospace, monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255 255 255 / 0.95);
    }

    .loc-resource-jp {
      font-size: 12px;
      line-height: 1.375;
      color: rgba(255 255 255 / 0.78);
    }

    .loc-body {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
    }

    /* LeaderOrderResourceRow */
    .loc-row {
      border-radius: 4px;
      background: rgba(30 41 59 / 0.8);
      padding: 4px 8px;
      font-size: 11px;
    }

    .loc-row-top {
      margin-bottom: 2px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .btn-complete {
      display: flex;
      height: 28px;
      width: 28px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      border: 2px solid rgba(255 255 255 / 0.8);
      background: rgb(15 23 42);
      color: #fff;
      font-size: 11px;
      padding: 0;
    }

    .order-select {
      height: 28px;
      width: 56px;
      flex-shrink: 0;
      border-radius: 4px;
      border: 1px solid rgb(250 204 21);
      background: rgba(15 23 42 / 0.9);
      color: rgb(253 224 71);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .order-select--empty {
      border-color: rgba(255 255 255 / 0.25);
      color: #fff;
      font-size: 11px;
      font-weight: 400;
    }

    .fkojun-wrap { flex: 1; min-width: 0; display: flex; }

    .fkojun {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: rgba(255 255 255 / 0.88);
    }

    .due-btn {
      flex-shrink: 0;
      border: 0;
      border-radius: 4px;
      padding: 0 4px;
      background: transparent;
      font-family: ui-monospace, monospace;
      font-size: 20px; /* 本番 10px → 指示: 2倍 */
      line-height: 1.1;
      color: rgba(103 232 249 / 0.9);
    }

    .btn-note {
      display: flex;
      height: 28px;
      width: 28px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 2px solid rgb(250 204 21);
      background: linear-gradient(160deg, rgba(234 179 8 / 0.55), rgba(161 98 7 / 0.38));
      color: rgb(254 252 232);
      padding: 0;
    }

    /* LeaderOrderRowClusterLine */
    .cluster-customer-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      width: 100%;
    }

    .cluster-line {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.2em 0.35em;
      font-size: 11px;
      color: rgba(255 255 255 / 0.8);
    }

    .cluster-customer-row:has(.customer-line) .cluster-line {
      flex: 0 0 50%;
      max-width: 50%;
    }

    .cluster-customer-row:not(:has(.customer-line)) .cluster-line {
      flex: 1;
    }

    .cluster-sep { color: rgba(255 255 255 / 0.4); user-select: none; }

    .customer-line {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      color: rgba(255 255 255 / 0.7);
    }

    .part-fseiban-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      width: 100%;
    }

    .part-name {
      min-width: 0;
      font-size: 16.5px;
      line-height: 1.2;
      color: rgba(255 255 255 / 0.6);
    }

    .part-fseiban-row:has(.fseiban-inline) .part-name {
      flex: 0 0 50%;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .part-fseiban-row:not(:has(.fseiban-inline)) .part-name {
      flex: 1;
    }

    .fseiban-inline {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, monospace;
      font-size: 16.5px;
      line-height: 1.2;
      font-weight: 600;
      color: rgba(255 255 255 / 0.85);
    }

    .machine-line {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 16.5px; /* 本番 11px → 指示: 1.5倍 */
      line-height: 1.2;
      color: rgba(255 255 255 / 0.8);
    }

    /* KioskResourceProcessChips */
    .footer-chips {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(255 255 255 / 0.1);
      display: flex;
      flex-wrap: nowrap;
      gap: 2px;
      overflow-x: auto;
    }

    .chip {
      border-radius: 4px;
      border: 1px solid rgba(147 197 253 / 1);
      background: rgba(59 130 246 / 0.3);
      color: rgb(191 219 254);
      padding: 2px 4px;
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .chip--done {
      border-color: rgb(148 163 184);
      background: rgba(255 255 255 / 0.1);
      color: rgba(255 255 255 / 0.7);
      opacity: 0.5;
      filter: grayscale(1);
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="note">
      <strong>本番相当</strong> — <code>LeaderOrderResourceRow.tsx</code> と同期。<br />
      納期 20px / 品名·製番 16.5px / 機種名 16.5px。左右2列は<strong>右側要素がある時のみ</strong>左50%。
    </p>

    <div class="grid-mock">
      <div class="loc-card" role="group" aria-label="資源 200（選択中）">
        <div class="loc-head">
          <span class="loc-resource-cd">200</span>
          <span class="loc-resource-jp">旋盤 1号機</span>
        </div>
        <div class="loc-body">
          <div class="loc-row">
            <div class="loc-row-top">
              <button type="button" class="btn-complete" aria-label="完了にする">✓</button>
              <div class="order-select" aria-label="資源内の順位 2">2</div>
              <div class="fkojun-wrap">
                <span class="fkojun">010 / 切削</span>
              </div>
              <button type="button" class="due-btn">1/6(火)</button>
              <button type="button" class="btn-note" aria-label="備考を編集">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
            <div class="cluster-customer-row">
              <div class="cluster-line">
                <span>MD004433830</span>
                <span class="cluster-sep" aria-hidden="true">·</span>
                <span>8個</span>
              </div>
              <div class="customer-line">株式会社サンプル商事</div>
            </div>
            <div class="part-fseiban-row">
              <div class="part-name">ストッパー台 (1)</div>
              <div class="fseiban-inline">BA1S1319</div>
            </div>
            <div class="machine-line">L300KP-XY · 立マシンA</div>
            <div class="footer-chips">
              <span class="chip chip--done">305</span>
              <span class="chip">310</span>
            </div>
          </div>

          <div class="loc-row">
            <div class="loc-row-top">
              <button type="button" class="btn-complete" aria-label="完了にする">✓</button>
              <div class="order-select order-select--empty" aria-label="資源内の順位 未割当">-</div>
              <div class="fkojun-wrap">
                <span class="fkojun">020 / 仕上</span>
              </div>
              <button type="button" class="due-btn">1/8(木)</button>
            </div>
            <div class="cluster-customer-row">
              <div class="cluster-line">
                <span>MD004433831</span>
                <span class="cluster-sep" aria-hidden="true">·</span>
                <span>2個</span>
              </div>
            </div>
            <div class="part-fseiban-row">
              <div class="part-name">カバー板</div>
              <div class="fseiban-inline">BA1S1420</div>
            </div>
            <div class="machine-line">DAD3350 · 立マシンB</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
