<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>配膳スマホ UI プレビュー（モック）</title>
  <style>
    :root {
      --bg: #0c1222;
      --surface: #243146;
      --border: rgba(255, 255, 255, 0.28);
      --text: #ffffff;
      --muted: #cbd5e1;
      --accent: #7dd3fc;
      --ok: #6ee7b7;
      --ng: #fca5a5;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }
    /* 上半分：照合（コンパクト） */
    .verify-panel {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
      padding: 8px 10px 10px;
    }
    .verify-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
    }
    .slip-block {
      padding: 8px 10px;
      border-radius: var(--radius);
      border-left: 3px solid transparent;
    }
    .slip-block--transfer {
      border-left-color: #38bdf8;
      background: rgba(56, 189, 248, 0.06);
    }
    .slip-block--actual {
      border-left-color: #a78bfa;
      background: rgba(167, 139, 250, 0.06);
    }
    .slip-block h3 {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .slip-block--transfer h3 {
      color: #7dd3fc;
    }
    .slip-block--actual h3 {
      color: #c4b5fd;
    }
    .field-row {
      display: flex;
      align-items: stretch;
      gap: 6px;
      margin-bottom: 6px;
    }
    .field-row:last-child { margin-bottom: 0; }
    .field-wrap {
      flex: 1;
      min-width: 0;
    }
    .field-wrap input {
      width: 100%;
      height: 40px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
    }
    .field-wrap input::placeholder {
      color: #94a3b8;
      font-size: 13px;
    }
    .btn-scan {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      padding: 0;
      border: none;
      border-radius: var(--radius);
      background: transparent;
      color: #e0f2fe;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-scan:active {
      background: rgba(255, 255, 255, 0.22);
    }
    .btn-scan svg,
    .btn-scan-lg svg {
      width: 24px;
      height: 24px;
      display: block;
    }
    .verify-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      padding-top: 6px;
    }
    .btn-verify {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .result-pill {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .result-pill.ok { color: var(--ok); }
    .result-pill.ng { color: var(--ng); }

    /* ── 下半分：配膳登録（動線 = 棚→order→登録） ── */
    .register-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 10px 16px;
      gap: 10px;
    }
    /* 共通：各動線ブロック */
    .flow-block {
      padding: 10px 10px;
      border-radius: var(--radius);
      border-left: 3px solid transparent;
    }
    /* ❶ 棚選択 — アンバー */
    .flow-block--shelf {
      border-left-color: #fbbf24;
      background: rgba(251, 191, 36, 0.06);
    }
    /* ❷ スキャン＋登録 — ティール */
    .flow-block--order {
      border-left-color: #2dd4bf;
      background: rgba(45, 212, 191, 0.06);
    }

    .shelf-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      min-height: 48px;
      min-width: 72px;
      padding: 6px 10px;
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .chip.on {
      border-color: #fbbf24;
      border-width: 2px;
      background: rgba(251, 191, 36, 0.18);
      color: #fef9c3;
      font-weight: 600;
    }
    .chip .ico { font-size: 18px; line-height: 1; }

    /* 棚QRスキャン — サイズはチップと同じ、枠なし・通常は背景なし（上半 .btn-scan と同様） */
    .chip--qr {
      border: none;
      background: transparent;
      color: #cbd5e1;
    }
    .chip--qr .ico {
      color: #7dd3fc;
    }
    .chip--qr:active {
      background: rgba(255, 255, 255, 0.22);
    }

    .order-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      width: 100%;
    }
    .order-row > .field-wrap {
      flex: 0 0 auto;
      width: calc((100% - 10px) / 2 - 6px - 40px);
      min-width: 0;
      max-width: 100%;
    }
    .order-row input.order-input {
      width: 100%;
      height: 40px;
      padding: 0 10px;
      border: 1px solid rgba(45, 212, 191, 0.3);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .order-row input::placeholder { color: #94a3b8; font-size: 13px; }
    .btn-scan-lg {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid rgba(45, 212, 191, 0.3);
      border-radius: var(--radius);
      background: rgba(45, 212, 191, 0.10);
      color: #99f6e4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-submit {
      flex: 0 0 auto;
      width: auto;
      min-width: 5.5rem;
      height: 40px;
      padding: 0 16px;
      margin-top: 0;
      border: 1px solid rgba(45, 212, 191, 0.55);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(45, 212, 191, 0.40), rgba(20, 184, 166, 0.22));
      color: #ccfbf1;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-submit:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .hint-bar {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      padding: 2px 0 0;
    }
    .banner {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      padding: 6px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- 太めの塗りバーコード（5箇所で再利用） -->
  <svg class="svg-sprite" width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="mp-scan-barcode" viewBox="0 0 24 24">
        <g fill="currentColor">
          <rect x="1.5" y="4" width="2.8" height="16" rx="0.6" />
          <rect x="5.8" y="4" width="1.8" height="16" rx="0.5" />
          <rect x="9" y="4" width="3.2" height="16" rx="0.6" />
          <rect x="13.4" y="4" width="1.8" height="16" rx="0.5" />
          <rect x="16.4" y="4" width="2.8" height="16" rx="0.6" />
          <rect x="20.4" y="4" width="2.8" height="16" rx="0.6" />
        </g>
      </symbol>
      <!-- カメラ視野風（QRスキャン用） -->
      <symbol id="mp-icon-viewfinder" viewBox="0 0 24 24">
        <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3" />
          <rect x="8" y="8" width="8" height="8" rx="1" stroke-width="1.5" opacity="0.85" />
        </g>
      </symbol>
    </defs>
  </svg>
  <div class="shell">
    <div class="banner">モックプレビュー · 本番実装前のレイアウト確認用</div>

    <!-- 上半：照合（余白最小・欄＋右アイコン・プレースホルダ） -->
    <section class="verify-panel" aria-label="移動票・現品票の照合">
      <div class="verify-grid">
        <div class="slip-block slip-block--transfer">
          <h3>移動票</h3>
          <div class="field-row">
            <div class="field-wrap">
              <input type="text" readonly placeholder="製造order番号" value="" />
            </div>
            <button type="button" class="btn-scan" title="スキャン" aria-label="製造orderをスキャン">
              <svg aria-hidden="true"><use href="#mp-scan-barcode" /></svg>
            </button>
          </div>
          <div class="field-row">
            <div class="field-wrap">
              <input type="text" readonly placeholder="部品番号" value="" />
            </div>
            <button type="button" class="btn-scan" title="スキャン" aria-label="部品番号をスキャン">
              <svg aria-hidden="true"><use href="#mp-scan-barcode" /></svg>
            </button>
          </div>
        </div>
        <div class="slip-block slip-block--actual">
          <h3>現品票</h3>
          <div class="field-row">
            <div class="field-wrap">
              <input type="text" readonly placeholder="製造order番号" value="" />
            </div>
            <button type="button" class="btn-scan" title="スキャン" aria-label="製造orderをスキャン">
              <svg aria-hidden="true"><use href="#mp-scan-barcode" /></svg>
            </button>
          </div>
          <div class="field-row">
            <div class="field-wrap">
              <input type="text" readonly placeholder="部品番号" value="" />
            </div>
            <button type="button" class="btn-scan" title="スキャン" aria-label="部品番号をスキャン">
              <svg aria-hidden="true"><use href="#mp-scan-barcode" /></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="verify-actions">
        <button type="button" class="btn-verify">照合</button>
        <span class="result-pill ok" role="status">OK</span>
      </div>
    </section>

    <!-- 下半：配膳登録（ブロック色で区切り） -->
    <section class="register-panel" aria-label="部品配膳の登録">
      <!-- ❶ 棚 -->
      <div class="flow-block flow-block--shelf">
        <div class="shelf-row">
          <button type="button" class="chip on" aria-pressed="true"><span class="ico" aria-hidden>📦</span><span>TEMP-A</span></button>
          <button type="button" class="chip"><span class="ico" aria-hidden>📦</span><span>TEMP-B</span></button>
          <button type="button" class="chip"><span class="ico" aria-hidden>📦</span><span>TEMP-C</span></button>
          <button type="button" class="chip"><span class="ico" aria-hidden>📦</span><span>TEMP-D</span></button>
          <button type="button" class="chip chip--qr" title="棚のQRコードをスキャン" aria-label="棚をQRスキャン">
            <svg class="ico" width="18" height="18" aria-hidden="true"><use href="#mp-icon-viewfinder" /></svg>
            <span>QR</span>
          </button>
        </div>
      </div>

      <!-- ❷ スキャン＋登録 -->
      <div class="flow-block flow-block--order">
        <div class="order-row">
          <div class="field-wrap">
            <input
              class="order-input"
              type="text"
              readonly
              placeholder="製造order番号"
              value=""
              inputmode="numeric"
              autocomplete="off"
            />
          </div>
          <button type="button" class="btn-scan-lg" title="スキャン" aria-label="製造orderをスキャン">
            <svg aria-hidden="true"><use href="#mp-scan-barcode" /></svg>
          </button>
          <button type="button" class="btn-submit">登録</button>
        </div>
      </div>

      <p class="hint-bar">照合OK → 棚 → 製造order → 登録</p>
    </section>
  </div>
</body>
</html>
