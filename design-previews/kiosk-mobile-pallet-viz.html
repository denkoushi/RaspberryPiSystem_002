<!DOCTYPE html>
<!-- テンキー行の寸法・Tailwind 断片の正: apps/web/src/features/kiosk/pallet-visualization/palletVizMobileTenkeyTokens.ts -->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>プレビュー: 配膳スマホ パレット可視化</title>
  <style>
    /* KioskLayout: bg-slate-800 text-white; main px-4 py-4 */
    :root {
      --slate-800: #1e293b;
      --slate-950: #020617;
      --white: #fff;
      --amber-200: #fde68a;
      --amber-400: #fbbf24;
      --amber-500-20: rgba(245, 158, 11, 0.2);
      --teal-300: #5eead4;
      --teal-400: #2dd4bf;
      --teal-500: #14b8a6;
      --teal-600: #0d9488;
      --sky-400: #38bdf8;
      --sky-500: #0ea5e9;
      --red-300: #fca5a5;
      --emerald-500: #10b981;
      --blue-500: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--slate-800);
      color: var(--white);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* KioskLayout main: px-4 py-4 */
    .kiosk-main {
      padding: 1rem;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    /* KioskMobilePalletVisualizationPage: p-3（配膳トップの MobilePlacementRegisterSection と同じ横インセット） */
    .page {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 0.5rem;
      overflow: hidden;
      padding: 0.75rem;
    }
    .header-row {
      display: flex;
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .header-row-start {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }
    .btn-part-search {
      border-radius: 0.5rem;
      border: 2px solid var(--sky-400);
      background: #0c4a6e;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--white);
      cursor: default;
    }
    .page-title {
      margin: 0;
      min-width: 0;
      font-size: 1.125rem;
      line-height: 1.25;
      font-weight: 800;
      color: var(--amber-200);
    }
    /* 加工機ブロック: border-l-teal-400 bg-[#001a18] */
    .machine-panel {
      flex-shrink: 0;
      border-radius: 10px;
      border-left: 4px solid var(--teal-400);
      background: #001a18;
      padding: 0.625rem 0.625rem;
    }
    .machine-select {
      width: 100%;
      min-width: 0;
      border-radius: 0.375rem;
      border: 2px solid var(--teal-500);
      background: #000;
      padding: 0.5rem 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
    }
    .scroll-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    /* PalletVizMobileTenkeyPad */
    .tenkey-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .tenkey-wrap[aria-label] { }
    .tenkey-input-line {
      margin: 0;
      min-width: 0;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--amber-200);
    }
    .tenkey-input-line .mono {
      font-family: ui-monospace, monospace;
      font-size: 1.5rem;
      font-variant-numeric: tabular-nums;
      color: var(--white);
    }
    .tenkey-grid {
      display: grid;
      max-width: 24rem;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.375rem;
    }
    .tenkey-btn {
      min-height: 3rem;
      min-width: 0;
      width: 100%;
      border-radius: 0.5rem;
      border: 2px solid var(--sky-500);
      background: #042f2e;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--white);
    }
    .tenkey-row2 {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 0.375rem;
      width: 100%;
      max-width: 24rem;
    }
    .btn-order-intent {
      min-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      border: 2px solid var(--teal-600);
      background: #042f2e;
      padding: 0 0.75rem;
      font-size: 0.875rem;
      font-weight: 800;
      letter-spacing: 0.025em;
      color: var(--white);
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .btn-order-intent--clear {
      flex: 0 0 4.25rem;
      max-width: 4.25rem;
      padding-left: 0.25rem;
      padding-right: 0.25rem;
      font-size: 0.75rem;
    }
    .btn-order-intent--arrow {
      flex: 1 1 auto;
      min-width: 0;
      padding-left: 0;
      padding-right: 0;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
    }
    /* 製造orderスキャン（orderSubmitButton 相当・バーコードのみ）幅2倍・アイコン1.5倍・高さ3rem維持 */
    .btn-order-scan {
      flex: 0 0 9rem;
      min-height: 3rem;
      max-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.375rem;
      border: 2px solid var(--teal-300);
      background: #0f766e;
      padding: 0;
      color: var(--white);
      box-sizing: border-box;
      overflow: hidden;
    }
    .btn-order-scan svg {
      display: block;
      width: 2.625rem;
      height: 2.625rem;
    }
    /* PalletVizActionRow compact: grid-cols-4 */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.25rem;
      width: 100%;
    }
    .btn-action-primary {
      min-height: 2.5rem;
      height: 2.5rem;
      width: 100%;
      min-width: 0;
      padding: 0 0.25rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.25;
      border: none;
      background: var(--emerald-500);
      color: var(--white);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-action-secondary {
      min-height: 2.5rem;
      height: 2.5rem;
      width: 100%;
      min-width: 0;
      padding: 0 0.25rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.25;
      border: none;
      background: var(--blue-500);
      color: var(--white);
      opacity: 0.6;
    }
    .btn-action-ghost {
      min-height: 2.5rem;
      height: 2.5rem;
      width: 100%;
      min-width: 0;
      padding: 0 0.25rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.25;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.9);
      opacity: 0.6;
    }
    .btn-action-danger {
      min-height: 2.5rem;
      height: 2.5rem;
      width: 100%;
      min-width: 0;
      padding: 0 0.25rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.25;
      border: none;
      background: transparent;
      color: var(--red-300);
    }
    /* PalletVizItemList */
    .item-list-shell {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      border-radius: 0.375rem;
      background: rgba(2, 6, 23, 0.5);
      padding: 0.5rem;
    }
    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .item-btn {
      width: 100%;
      border-radius: 0.375rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(30, 41, 59, 0.8);
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-size: 0.875rem;
      color: var(--white);
      cursor: default;
    }
    .item-btn.selected {
      border-color: var(--amber-400);
      background: var(--amber-500-20);
    }
    .item-btn .code {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .item-btn .name {
      font-weight: 600;
    }
    .item-btn .sub {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 0.125rem;
    }
    .preview-banner {
      flex-shrink: 0;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      padding: 0.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    /* KioskLayout: header border-b border-white/10 bg-slate-900/80 px-4 py-3（沉浸式ではホバーで出し入れ・ここでは常時表示の近似） */
    .kiosk-header-strip {
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.8);
      padding: 0.75rem 1rem;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
    }
    .kiosk-header-strip span {
      font-weight: 400;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="preview-banner">静的プレビュー・横余白は配膳トップと同じ（KioskLayout main px-4 + ページ p-3＝登録セクションと同等）／kiosk/mobile-placement/pallet-viz</div>
  <div class="kiosk-header-strip">キオスク<span>（KioskHeader・支援・クライアント表示の帯・本番は画面上部）</span></div>
  <div class="kiosk-main">
    <div class="page">
      <div class="header-row">
        <div class="header-row-start">
          <button type="button" class="btn-part-search" aria-label="配膳に戻る">戻る</button>
          <p class="tenkey-input-line">入力 <span class="mono">3</span></p>
        </div>
        <h1 class="page-title">パレット可視化</h1>
      </div>

      <div class="machine-panel">
        <select id="pv-machine" class="machine-select" aria-label="加工機">
          <option>ロボドリル01 (RD01)</option>
        </select>
      </div>

      <div class="scroll-area">
        <div class="tenkey-wrap" aria-label="パレット番号テンキー">
          <div class="tenkey-grid">
            <button type="button" class="tenkey-btn">1</button>
            <button type="button" class="tenkey-btn">2</button>
            <button type="button" class="tenkey-btn">3</button>
            <button type="button" class="tenkey-btn">4</button>
            <button type="button" class="tenkey-btn">5</button>
            <button type="button" class="tenkey-btn">6</button>
            <button type="button" class="tenkey-btn">7</button>
            <button type="button" class="tenkey-btn">8</button>
            <button type="button" class="tenkey-btn">9</button>
            <button type="button" class="tenkey-btn">0</button>
          </div>
          <div class="tenkey-row2">
            <button type="button" class="btn-order-intent btn-order-intent--clear" aria-label="クリア">クリア</button>
            <button type="button" class="btn-order-intent btn-order-intent--arrow" aria-label="1つ戻る"><span aria-hidden="true">←</span></button>
            <button type="button" class="btn-order-scan" aria-label="製造orderをスキャン（確定）">
              <svg viewBox="0 0 24 24" width="42" height="42" aria-hidden="true">
                <rect x="3" y="5" width="1.2" height="14" rx="0.2" fill="currentColor" />
                <rect x="5" y="5" width="0.8" height="14" rx="0.2" fill="currentColor" />
                <rect x="8" y="5" width="1.4" height="14" rx="0.2" fill="currentColor" />
                <rect x="9.5" y="5" width="0.7" height="14" rx="0.2" fill="currentColor" />
                <rect x="12" y="5" width="1.1" height="14" rx="0.2" fill="currentColor" />
                <rect x="14" y="5" width="0.9" height="14" rx="0.2" fill="currentColor" />
                <rect x="16" y="5" width="1.3" height="14" rx="0.2" fill="currentColor" />
                <rect x="18" y="5" width="0.8" height="14" rx="0.2" fill="currentColor" />
                <rect x="20" y="5" width="1" height="14" rx="0.2" fill="currentColor" />
              </svg>
            </button>
          </div>
        </div>

        <div class="action-grid" aria-label="パレット操作">
          <button type="button" class="btn-action-primary">追加</button>
          <button type="button" class="btn-action-secondary">上書</button>
          <button type="button" class="btn-action-ghost">選択削除</button>
          <button type="button" class="btn-action-danger">全削除</button>
        </div>

        <div class="item-list-shell">
          <ul class="item-list">
            <li>
              <button type="button" class="item-btn" aria-pressed="false">
                <div class="code">P-10023</div>
                <div class="name">サンプル部品A（プレビュー）</div>
                <div class="sub">製番 MO-2026-001 ／ ロボドリル01</div>
              </button>
            </li>
            <li>
              <button type="button" class="item-btn selected" aria-pressed="true">
                <div class="code">P-10024</div>
                <div class="name">サンプル部品B（選択中）</div>
                <div class="sub">製番 MO-2026-002 ／ ロボドリル01</div>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
